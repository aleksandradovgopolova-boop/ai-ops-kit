statement: "BAAI/bge-m3 (MIT): ~560M параметров, контекст 8192 токена, 100+ языков; уникальность — dense + sparse + ColBERT retrieval в одной модели, что даёт гибридный поиск по русским документам без отдельного BM25-слоя. Альтернатива при потребности в максимальном качестве — Qwen3-Embedding 0.6B/4B/8B (Apache-2.0, топ открытых на MTEB multilingual ~70.6 у 8B). Исключить: jina-embeddings v3/v4 — CC-BY-NC-4.0, коммерческое использование без договора запрещено."

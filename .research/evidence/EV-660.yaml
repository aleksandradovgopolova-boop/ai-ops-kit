statement: "Единый open-source продукт, объединяющий execution + детерминированные gates + независимое ревью + evidence на точном SHA + durable lifecycle + delivery-транзакцию + evaluation + product/research governance, НЕ ОБНАРУЖЕН в проверенном охвате: Open SWE — validation prompt-driven по собственному признанию (EV-601, EV-602); OpenHands — control center без калиброванных gates/delivery-транзакции как ядра (EV-605, EV-606); SWE-ReX/SWE-agent — sandbox и benchmark, не governance (EV-608, EV-609); Continue checks — gates as code для существующего PR, проект поглощён (EV-631…EV-633); Cline/Aider/Goose — исполнение и UX (EV-634…EV-638); gstack — opinionated-скиллы без инвариантов/evidence-контура (EV-210, EV-211 из RR-003, отсутствовал в чужом скане). Охват: 9 проектов верифицированы первоисточниками 2026-07-24 + gstack из RR-003; «не обнаружено» ≠ «не существует»; OpenHands движется в сторону control plane — охват протухает быстро."

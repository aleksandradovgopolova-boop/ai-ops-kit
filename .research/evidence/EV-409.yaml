statement: "HF datasets совершил formats-first разворот: Python loading scripts жёстко удалены (с datasets 4.x, лето 2025, ошибка 'Dataset scripts are no longer supported') — датасет теперь только данные-файлы (parquet/csv/json) + метаданные; версионирование через git-модель Hub (revision = tag/branch/commit hash). Конвенции для golden sets кита: чистые data-файлы без кода + явные splits + revision-pinning; сам parquet/pyarrow не тянуть (YAML достаточен для сотен кейсов)."

statement: "lighteval (MIT, активен, v0.13.0) — актуальный eval-фреймворк HF на 1000+ задач, но задачи определяются исполняемым Python-кодом (prompt_function + LightevalTaskConfig с импортами из внутренностей библиотеки), не декларативно — формат непереносим без инструмента (lock-in). Собственных agentic-evals нет: для них lighteval сам рекомендует inspect-ai как бэкенд. Библиотека evaluate при этом стагнирует (последний релиз 09.2025, README перенаправляет на lighteval)."

statement: 'Собственная сторона сравнения (self-evidence, переоперто по judge-ревью на сильнейшее место CHANGELOG):
  цепочка кита подтверждена живым прогоном, а не только зелёным CI — CHANGELOG фиксирует «DeliveryReceipt sha_verified=True
  против реального remote head SHA, PR #1 открыт» (строка ~277) и детерминированную crash-матрицу reconciliation
  («PR совпал по SHA → reconciled+sha_verified; PR с другим SHA → mismatch», ~334). Честная оговорка: тот же CHANGELOG
  документирует инцидент маскировки — ранее «зелёный CI» скрывал реальный провал PQ8 (исправлено в v3.0.18), т.е.
  self-reported валидации кита уже ловились на ложной зелени; живой Phase B прогон сильнее CI-зелени, но независимого
  внешнего аудита цепочки не было. Там же зафиксирована находка Phase B: engine_floor=0 — узкое место не движок,
  а взаимодействие gate-policy с неопределённостью ревьюера (~стр. 107).'

statement: 'Onyx (бывш. Danswer, ~31k звёзд) — open-core: Community Edition под MIT
  покрывает ядро (Agentic RAG, 50+ коннекторов, кастомные агенты, sandbox code execution),
  но именно корпоративные jobs ИИ-среды — RBAC, SSO/SAML/SCIM, query audit history,
  whitelabel — вынесены в проприетарную Enterprise Edition; презентаций и дашбордов
  нет; inference — все основные провайдеры вкл. self-hosted vLLM/Ollama/LiteLLM. Вердикт:
  сильный референс/компонент для RAG-справок с цитатами, но как ОСНОВА проблематичен
  — аудит и RBAC за пределами MIT-части.'

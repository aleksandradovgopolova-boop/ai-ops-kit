statement: 'Open SWE: детерминированный backstop сознательно НЕ включён в поставку
  — customization-дока прямо говорит, что after-agent middleware для PR намеренно
  отсутствует, форкам предлагается свой @after_agent hook. Адаптационная цена: публичного
  стабильного API нет, интеграция = форк + middleware; жёсткая привязка к экосистеме
  LangChain (LangGraph, sandbox-провайдеры Modal/Daytona/E2B, LangSmith proxy). Вердикт:
  продуктовый референс, НЕ библиотека-адаптер.'

statement: "Предел судейских панелей: панель из 9 фронтир-судей 7 семейств несёт ~2 независимых голоса — модели ошибаются на одних и тех же кейсах; фактическая точность на 8–22 п.п. ниже теоретической при независимости, лучший одиночный судья не хуже панели. Следствие: множить судей-персон одной модели почти бесполезно против общих слепых пятен; некоррелированный 'голос' дают механические проверки (quote-check), не ещё один LLM."

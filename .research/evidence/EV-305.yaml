statement: "Verbalized confidence RLHF-моделей калибрована лучше внутренних логитов, но систематически завышена (overconfidence); агрегация со self-consistency (совпадение выводов при k независимых прогонах) улучшает калибровку (Xiong et al.). Практическое следствие для ординальной шкалы: расхождение выводов двух независимых прогонов синтеза — сигнал автоматического даунгрейда confidence на ступень."

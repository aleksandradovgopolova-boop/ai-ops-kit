statement: "Argilla (куплена HF, Apache-2.0, self-hosted через Docker/Spaces) — зрелый UI human-in-the-loop разметки: очереди записей, несколько аннотаторов, вопросы-рейтинги/лейблы — закрывает боль кита 'kappa требует human-меток'. КРИТИЧНО: проект официально заморожен по фичам (авторы ушли; только bug fixes/patches), последний релиз v2.8.0 (2025-03-11). Использовать только как opt-in декларацию с exit-стратегией: формат экспорта вердиктов кита не должен зависеть от Argilla-схемы."

statement: 'WrenAI (Canner, ~16.6k звёзд, релиз v0.13.1 от 21.07.2026) — GenBI-движок
  под job ''дашборд из данных'': natural language → governed SQL → interactive dashboard,
  22+ источников (PostgreSQL, ClickHouse, BigQuery, DuckDB и др.); лицензирование
  СМЕШАННОЕ — README заявляет Apache 2.0, но в репо присутствуют AGPL-3.0 компоненты,
  требуется покомпонентная проверка перед коммерческим использованием; LLM — OpenAI/Vertex
  явно, кастомные endpoints через SDK; self-hosted Docker. Вердикт: кандидат-КОМПОНЕНТ
  под дашборды с обязательной юридической проверкой AGPL-границ.'

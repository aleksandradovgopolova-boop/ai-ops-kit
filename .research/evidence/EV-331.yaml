statement: "В документации восьми проверенных кандидатов (promptfoo, openai/evals, inspect-ai, autoevals, deepeval, langfuse, agentevals, phoenix) на дату проверки НЕ ОБНАРУЖЕНА встроенная мета-оценка калибровки судей против golden-меток (kappa/ECE/position-swap как функции продукта). Обнаружены смежные механизмы, не являющиеся такой калибровкой: LLM-jury у phoenix (ансамбль без калибровки), DAG-декомпозиция судейских шагов у deepeval, alignment-подходы в отдельных доках. Негативное утверждение: проверялась документация, не код; функции могли быть не найдены или появиться позже."

statement: "Экономика приватности (расчёт для команды 50-200 сотрудников, ~100-500M токенов/мес): внешний API класса DeepSeek V4 (выход $0.28-0.87/M) стоил бы десятки—пару сотен долларов в месяц, тогда как dedicated GPU для self-hosting — $600-2500/мес. Self-hosting не даёт выигрыша ни в цене, ни в качестве — это осознанная премия исключительно за приватность корпоративных документов (~$500-2400/мес). Следствие: гибридная граница по данным экономически осмысленна."

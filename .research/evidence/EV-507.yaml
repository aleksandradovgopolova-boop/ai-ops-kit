statement: 'Presenton (~9k звёзд) — Apache-2.0, единственный найденный self-hosted
  open-source генератор ПРЕЗЕНТАЦИЙ: из промпта или загруженных документов → редактируемый
  PPTX/PDF, свои шаблоны, drag-and-drop редактор, REST API (/api/v1/ppt/presentation/generate)
  — встраивается как сервис; работает с любыми OpenAI-compatible провайдерами (значит
  vLLM), Docker one-command; язык генерации — параметр (русский явно не подтверждён).
  Вердикт: готовый КОМПОНЕНТ под job ''презентация'', закрывающий дыру всех шести
  основных кандидатов.'

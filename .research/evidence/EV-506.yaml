statement: 'Dify (~150k звёзд) — НЕ чистый Apache-2.0: ''Dify Open Source License''
  = Apache 2.0 + условия: запрет multi-tenant эксплуатации без письменного разрешения
  и запрет убирать LOGO/копирайт из консоли и приложений; функционально платформа-конструктор
  (visual workflow canvas, RAG-pipeline, агенты с 50+ инструментами, observability),
  OpenAI-compatible модели поддержаны, русский явно не заявлен; для одной компании
  self-hosted (single-tenant) допустимо, но брендинг-условие и отсутствие аудита/презентаций/дашбордов
  ограничивают. Вердикт: КОМПОНЕНТ (workflow/оркестрация) или референс архитектуры;
  как основа — лицензионные трения.'

statement: "Проверка фич OpenHands по документации (не по tagline, дособрано по замечанию judge): в docs.openhands.dev НЕ документированы (а) детерминированные/policy quality gates, (б) транзакционная доставка (delivery intent/receipt, SHA-верификация перед merge), (в) независимые reviewer-роли как инварианты. Документированы: multi-user, RBAC and permissions (Cloud), conversation sharing, usage reporting, budgeting enforcement, интеграции GitHub/GitLab/Slack/Jira/Linear. Негативное утверждение: «не документировано» на дату проверки ≠ «не существует» (Cloud/Enterprise-фичи могут быть недокументированы публично); roadmap не проверялся."

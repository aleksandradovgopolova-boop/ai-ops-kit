statement: 'LibreChat (~41k звёзд) — MIT целиком; из шести кандидатов ближе всех к
  корпоративному чат-контуру: OAuth2/LDAP, admin panel для users/groups/roles, moderation
  и token-spend инструменты, агенты + marketplace, code interpreter (sandbox, 9 языков),
  Artifacts (React/HTML/Mermaid в чате — зачаток ''дашборда''), явная поддержка русского
  (25+ языков), любой OpenAI-compatible API без прокси; но RAG вторичен (нет deep-parsing
  документов уровня RAGFlow), презентаций нет, полноценного аудит-журнала нет. Вердикт:
  кандидат в ОСНОВУ чат/оболочки при досборке RAG-слоя и генераторов артефактов, либо
  компонент.'

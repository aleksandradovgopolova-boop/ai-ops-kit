statement: "Self-preference bias: LLM-судьи систематически завышают оценки текстам своей же модели/семейства — судья той же модели склонен соглашаться с ошибками генератора. Митигаторы без смены модели: судья в чистом контексте без хода рассуждений автора; рубрика 'найди минимум N конкретных дефектов'; требование указать, какое evidence опровергло бы вывод."

statement: "system-prompts-and-models-of-ai-tools (x1xhlol, ~142.2k звёзд): промпты слиты из проприетарных продуктов без согласия вендоров; заявленная GPL-3.0 юридически ничтожна для чужого контента — текст промптов включать в дистрибутив кита НЕЛЬЗЯ, только изучать приёмы. Полезные приёмы по продуктам: Claude Code (краткость, TODO-дисциплина, параллельные tool-вызовы), Devin (planning/standard режимы, эскалация к человеку), Cursor (цитирование кода, запрет пересказа неизменённого), v0 (структурный вывод, дизайн-система, a11y), Manus (agent loop, todo.md как артефакт). Подлинность/актуальность извлечённых версий не гарантированы; README продвигает коммерческий сервис владельца."

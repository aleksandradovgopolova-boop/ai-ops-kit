statement: "Адверсариальные дебаты доказанно повышают качество суждений (Khan et al., ICML 2024 Best Paper): два эксперта аргументируют противоположные позиции перед неэкспертом-судьёй — точность судьи-LLM растёт 48%→76%, судьи-человека 60%→88%; единственный консультант без оппонента заметно хуже дебатов. Практический формат: пара 'защитник vs атакующий' + судья, три промпта."

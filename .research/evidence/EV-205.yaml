statement: "awesome-mcp-servers (punkpeye, ~91.2k звёзд, MIT, push в день проверки): рабочая навигация, но без курирования качества — промо и однодневки рядом с официальными. Официальные вендорские MCP, закрывающие стадии кита: microsoft/playwright-mcp (QA/verify через accessibility snapshots), github/github-mcp-server (PR/CI как evidence для release-gate), posthog/mcp (analytics + feature flags), getsentry/sentry-mcp (monitoring). Reference-серверы Anthropic (puppeteer, git) перенесены в servers-archived — как основу не брать. Официального Linear в списке нет — у Linear свой hosted MCP (mcp.linear.app)."

statement: "Сырой % agreement судьи с человеком завышает discrimination на 33–41 п.п. ('kappa deflation') — нужна chance-corrected метрика (Cohen's kappa); ranking судей не переносится между бенчмарками (сдвиги до 14 позиций). Следствие: agreement rate без коррекции на случайность (в т.ч. механика agreement из gstack/DP-103) — недостаточная метрика, kappa её уточняет."

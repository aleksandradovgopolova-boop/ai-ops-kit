statement: "Position-swap протокол контроля позиционного байаса судей (MT-Bench, Zheng et al. 2023; работа также установила планку ~80%+ agreement GPT-4 с людьми): каждое парное сравнение прогоняется дважды с перестановкой кандидатов; неконсистентные вердикты = tie или исключение. Реализуемо в CI кита stdlib-арифметикой: автоматическое дублирование кейсов со swap, consistency rate как метрика."

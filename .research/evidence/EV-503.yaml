statement: 'Open WebUI (~146k звёзд, самый популярный) — лицензионный красный флаг
  для white-label корпоративного продукта: BSD-3 с branding-клаузой, запрещающей убирать
  бренд ''Open WebUI'' при >50 конечных пользователей за 30 дней без enterprise-лицензии;
  функционально силён (granular RBAC и user groups, RAG на 9 векторных БД, i18n вкл.
  русский, любой OpenAI-compatible API, pip/Docker/K8s), но jobs ''презентации'' и
  ''дашборды'' не закрывает. Вердикт: НЕ основа для коммерческого продукта из-за branding-клаузы
  (внутреннее развёртывание >50 юзеров тоже под клаузой); максимум референс UX.'

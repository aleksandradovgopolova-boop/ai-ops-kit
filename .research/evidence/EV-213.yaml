statement: "Внешняя критика gstack: перегруз 35–40 командами (реально полезны ~6, по опыту европейской команды), SF-стартап-лексика чужда не-US командам, виральность частично от статуса YC-CEO ('a bunch of prompts in a text file'), кейс небезопасной автономии (агент вливал staging-URL в prod при зелёном exit code), ~25% команд зависят от проприетарных GBrain/GStack Browser, соло-мейнтейнер при 775 issues. Сильные стороны по тем же источникам: /qa с реальным браузером — самая ценная команда, /learn — рабочая межсессионная память, инструмент сформирован реальной практикой автора."

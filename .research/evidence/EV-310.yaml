statement: "LLM сами не замечают устаревшую память: детекция неявно устаревших воспоминаний ~55% точности даже у лучших моделей (особенно implicit conflict, когда новое наблюдение молча инвалидирует старое). Следствие: 'память как первый источник' обязана сопровождаться механическим правилом re-verify (возраст записи > N дней или volatile-тема ⇒ обязательный свежий поиск), а не LLM-оценкой свежести."

# DecisionPackage по RR-007 (build vs adopt для ИИ-среды). Первый продуктовый прогон.
# v2 по итогам judge-ревью (needs_work: раздутый анти-adopt аргумент против собственных EV;
# verifiability как tech-push вместо продуктовой гипотезы; несостоятельный порог интервью;
# preflight-заявка writer'а не подтвердилась по 8 пунктам — уроки внесены в чек-лист).
schema_version: 1
kind: research.decision-package
id: DP-107
request_id: RR-007
decision:
  question: "Строить backend ИИ-среды с нуля, взять открытую платформу как основу, или строить своё с компонентами — и что обязано быть в MVP?"
decision_brief: "Строим своё ядро (оркестратор триады + аудит-журнал + справка с источниками), но не с нуля: RAGFlow (Apache-2.0) как evidence/RAG-слой, Presenton (Apache-2.0) как сервис презентаций, WrenAI под дашборды — после юр-проверки AGPL. Подтверждённая дифференциация одна: триаду «справка→презентация→дашборд» единым конвейером не делает никто (проверено: 8 OSS + 5 коммерческих). Вторая — verifiability глубже документной ссылки — пока ГИПОТЕЗА, проверяется интервью. Аудит-журнал в открытой части OSS не обнаружен — пишем сами в любом сценарии (RBAC в OSS есть). Цена build-пути: спайк ~1 неделя, ядро MVP — грубо 4-8 человеко-месяцев при команде 2-3; топ-риски: окно дифференциации может закрыться за квартал; триада может быть не нужна пользователям (JTBD не проверены). Следующий шаг: спайк RAGFlow+Presenton на стеке DP-106 + 5 интервью (провал интервью — стоп-сигнал build-пути)."
cost_of_recommendation:
  one_time: "Спайк 1.5-2 недели инженера (скоуп вырос: +adopt-замер LibreChat и сетевая изоляция; при цейтноте adopt-замер — отдельный мини-спайк второй недели, не выбрасывать); юр-проверка WrenAI ~часы юриста; ядро MVP (оркестратор, аудит-журнал, каталог, интеграция 2-3 компонентов) — грубая вилка 4-8 человеко-месяцев при команде 2-3 (оценка writer'а без декомпозиции; спайк и сравнение с LibreChat-базой дадут первую фактическую точку). Adopt-путь короче на ядро (~1-2 ч-мес интеграции LibreChat), но требует достройки аудита и двух генераторов — разрыв путей меряется в спайке."
  recurring: "Эксплуатация: inference-стек DP-106 + RAGFlow (16GB RAM) + 1-2 компонент-сервиса — ориентир 10-20 человеко-часов/мес на обновления/мониторинг/дрейф лицензий и API компонентов (оценка, уточняется после спайка)."
  owner_required: "Команда ИИ-среды (backend, 2-3 человека); юрист на разовые проверки лицензий."
  note: "Все сроки — оценки writer'а, не измерения; помечены для проверки спайком."
recommendation:
  preferred_option: "build-with-components: своё ядро (оркестратор + аудит-журнал + справка) + OSS-компоненты под отдельные jobs (RAGFlow evidence-слой, Presenton презентации; WrenAI дашборды после юр-проверки); чужую платформу основой не брать"
  confidence: medium
  confidence_rationale: "Функции и лицензии кандидатов — с первичных README/LICENSE (ключевые лицензионные факты с verbatim-цитатами: EV-503, EV-506); цены Microsoft/GigaChat первичны, Glean/Gamma/ThoughtSpot — агрегаторы; главные слабости: JTBD не проверены интервью (продуктовое ядро решения — на непроверенном допущении), ни один кандидат не разворачивался, оценки трудоёмкости не декомпозированы. Направление поддержано evidence, калибровка деталей — за спайком и интервью."
rationale:
  - "Подтверждённая дифференциация: триада «справка→презентация→дашборд» единым конвейером не обнаружена ни у кого (EV-542: 8 OSS + 5 коммерческих, охват зафиксирован); триада — родные jobs продукта по JTBD (EV-543). ГИПОТЕЗА (не подтверждено): ценность verifiability глубже документной ссылки — JTBD требует «источники можно проверить», но достаточность документного цитирования уровня Glean/Copilot (EV-531, EV-534) против цепочки «утверждение→цитата→локатор» пользователями не проверялась; у RAGFlow при этом traceable citations чанк-уровня уже есть (EV-505) — «у всех только ссылка на документ» неверно для нашего же компонента. Вопрос вынесен в интервью (validation, часть 2)."
  - "Чужая платформа основой не годится по совокупности: Open WebUI — branding-клауза с порогом 50 пользователей/30 дней (EV-503, verbatim из LICENSE); Dify — запрет снятия лого и multi-tenant условия (EV-506, verbatim); Onyx — SSO/SCIM/audit history в проприетарной EE (EV-501); AnythingLLM/LibreChat — чистый MIT, но без генераторов артефактов (EV-502, EV-504). Аудит-журнал: в открытой части шести OSS-платформ не обнаружен (EV-544, с квалификаторами; RBAC как таковой в OSS ЕСТЬ — EV-503, EV-504) — аудит-журнал, требуемый MVP_SCOPE (EV-543), пишем сами в любом сценарии; оговорка градаций: MVP-журнал («журнал выполнения и ключевых действий») слабее комплаенс-грейда из EV-544 — достаточность имеющихся логов LibreChat (moderation/token-spend, EV-504) под MVP-грейд проверяется в adopt-замере спайка. Это ослабляет adopt-путь, но не убивает — сравнение трудоёмкости путей отложено до спайка."
  - "Компоненты под отдельные jobs существуют и лицензионно чисты: RAGFlow — evidence-слой под справку (traceable citations, Apache-2.0, README-ru; тяжёлый — 16GB RAM; EV-505); Presenton — единственный найденный OSS-генератор презентаций (Apache-2.0, REST API; русский не подтверждён; EV-507); WrenAI — NL→SQL→дашборд, лицензия смешанная — до юр-проверки не включать (EV-508). Совместимость с inference-слоем DP-106: OpenAI-compatible endpoint — стандарт всех 8 кандидатов (EV-501…EV-508)."
  - "Рыночная планка задаёт гигиену MVP: цитирование с правами доступа, генерация из документов, каталог/шаблоны, on-prem — для РФ стандарт предложения (GigaChat Enterprise ПАК/SaaS/гибрид — EV-536; Yandex AI Studio on-prem — EV-538, с оговоркой: официальная страница напрямую не прочитана). Ценовой контекст: Copilot $18-30/user/мес (EV-533), Glean ~$99k/год медиана (EV-532), ThoughtSpot $25-50/user/мес с лимитами (EV-541), Gamma ~$20/user/мес за один job (EV-539); российский рынок продаёт токены и CAPEX (EV-537) — ГИПОТЕЗА ценообразования: per-user 2-5 тыс. ₽/мес; равновероятная альтернатива — РФ-закупщики per-user не покупают; willingness-to-pay проверяется интервью/пилотом."
  - "Предостережение против распада на генераторы: Tome (standalone-презентации, $10/мес) закрыт 30.04.2025 — ценность дают корпоративный контекст и связка jobs (EV-540); аргумент за интегрированную среду."
assumptions:
  - "JTBD/MVP_SCOPE отражают реальные потребности — НЕ проверено интервью (главное продуктовое допущение)."
  - "Перенос механики quote-grounding из кита (DP-104) в продуктовый RAG на русских документах дешевле изобретения с нуля — допущение о переносимости между дизайнами; частично проверяется спайк-порогом «>=80% цитат верифицируемы»."
  - "Охват сканов (8 OSS + 5 коммерческих) покрывает значимых игроков; нишевые продукты могли быть пропущены."
  - "Компонентная архитектура не создаст неприемлемой эксплуатационной сложности против монолита."
alternatives:
  - option: "adopt-base — LibreChat (MIT) как оболочка + достройка генераторов и аудита"
    appropriate_when: "Если спайк-замер покажет, что разрыв трудоёмкости путей больше ожидаемого: LibreChat даёт auth/roles/чат/Artifacts (EV-504); фронт ИИ-среды уже свой — выигрыш оценочно сжимается до чат-бэкенда, но эта оценка не взвешена и меряется в спайке."
  - option: "buy/wait — дать сотрудникам GigaChat Enterprise / Yandex AI Studio"
    appropriate_when: "Если интервью опровергнут ценность триады: российские платформы дают агентов+RAG on-prem без разработки (EV-536, EV-538); теряется дифференциация deliverables."
risks:
  - "Окно дифференциации может закрыться за квартал-два: Glean уже генерирует деки (EV-531), Microsoft снижает порог Power BI Copilot (EV-535 — дата 30.04.2026 требует перепроверки, источник 403); повторный скан при freshness-истечении (2026-10)."
  - "Главный риск продуктовый: триада может быть не нужна (JTBD не валидированы) — build-решение оптимизирует несуществующий спрос; интервью — стоп-сигнальный гейт."
  - "Presenton молод (~9k звёзд), русская генерация не проверена; WrenAI лицензионно неоднороден — оба могут выпасть (fallback: свой генератор поверх шаблонов, дороже)."
  - "RAGFlow тяжёлый (16GB RAM); альтернатива — свой RAG на TEI+bge-m3 тоньше, но без deep document understanding."
  - "Лицензии OSS-компонентов дрейфуют (прецеденты Open WebUI/Dify): пиновать версии, проверять LICENSE при обновлениях."
constraints_addressed:
  corporate_data_privacy: "Частично: все компоненты self-hosted и OpenAI-compatible (совместимы с приватным стеком DP-106), но телеметрия/внешние вызовы компонентов НЕ проверены — сетевая изоляция включена в спайк-чек."
  russian_language: "LibreChat i18n и RAGFlow README-ru подтверждены (EV-504, EV-505); Presenton — параметризуем, не подтверждён (unknown, спайк)."
  license_compatible_commercial: "Per-candidate в EV-501…EV-508: рекомендованные компоненты Apache-2.0/MIT; исключения (Open WebUI, Dify, WrenAI до проверки) — по verbatim-цитатам лицензий."
  jtbd_grounded: "Сравнение против jobs из JTBD.md (EV-543, спот-чек judge пройден); сами JTBD не валидированы — это допущение №1."
unknowns:
  - "Реакция пользователей на триаду против «просто чата» и на глубину verifiability (документная ссылка vs локатор) — до интервью."
  - "Качество Presenton/RAGFlow на русском контенте; сетевая изоляция компонентов (телеметрия, внешние вызовы) — до спайка."
  - "Юридический статус WrenAI (границы AGPL)."
  - "Фактическая трудоёмкость своего оркестратора против LibreChat-базы — меряется в спайке, до тех пор отказ от adopt-base — невзвешенное суждение."
proposed_validation:
  experiment: "Три части: (1) спайк ~1 неделя: RAGFlow + Presenton поверх стека DP-106 (T-lite/vLLM), сквозной сценарий «документы → справка с локаторами → презентация из неё» на русском; ПОРОГИ: цепочка end-to-end проходит И >=80% цитат справки верифицируемы против исходников (quote-check скрипт) И презентация не требует ручной пересборки структуры (бинарно); ДОП: замер сетевой изоляции компонентов (телеметрия/внешние вызовы) И дешёвый замер adopt-разрыва — поднять LibreChat, оценить объём достройки до того же сценария; (2) интервью: ровно n=5, респонденты не участвовали в создании прототипа, >=2 разных ролей; вопросы включают триаду против текущего способа работы И «документная ссылка vs точная цитата с локатором»; РОЛЬ ПОРОГА: <3 из 5, называющих >=2 артефакта ценными, — СТОП-СИГНАЛ build-пути; прохождение порога НЕ подтверждает build (малое n отсеивает провал, не доказывает) — подтверждение даст только пилот с реальными пользователями; (3) юр-проверка WrenAI по дереву исходников (юрист). Сравнение «своё ядро vs LibreChat-база» — по данным замера в (1); willingness-to-pay — вопрос в (2)."

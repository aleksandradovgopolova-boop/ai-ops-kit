# Живой DecisionPackage первого боевого прогона (RR-001).
schema_version: 1
kind: research.decision-package
id: DP-101
request_id: RR-001
decision:
  question: "Какую модель использовать как основную для генерации Personal Cosmic Book (длинный русскоязычный текст)?"
recommendation:
  preferred_option: deepseek-v4-flash
  confidence: medium
  confidence_rationale: "Стоимость, контекст и ограничения API подтверждены первичными источниками; решающий фактор — качество длинной русской прозы — ни одним источником не измерен, поэтому выше medium подняться нельзя до собственного eval."
rationale:
  - "Единственная опция, закрывающая все три constraint запроса: ≈$0.06/книга (EV-106), контекст 1M и выход до 384K токенов — книга генерируется одним вызовом без склейки глав (EV-101)."
  - "Ценовой разрыв с качественным флагманом Kimi K3 ~35x (EV-106): при неизвестной разнице качества на русском дешёвый вариант — правильная точка старта для эксперимента, а не для капитуляции по качеству."
  - "Прежние имена моделей deepseek-chat/reasoner отключаются 24.07.2026 — пайплайн сразу строится на именах V4 (EV-102)."
alternatives:
  - option: kimi-k3
    appropriate_when: "Слепой eval покажет заметно лучшее качество русской прозы И юнит-экономика книги выдерживает ~$2.10/книга (EV-103, EV-105, EV-106). Кандидат на роль премиум-тира."
  - option: deepseek-v4-pro
    appropriate_when: "V4-flash провалит eval по качеству, а K3 не пройдёт по экономике: середина по цене (≈$0.17/книга) в той же линейке API (EV-101, EV-106)."
  - option: kimi-k2.6
    appropriate_when: "Практически доминируемая опция: дороже v4-pro при меньшем контексте (262K) и без подтверждённой первичной цены (EV-104). Рассматривать только если eval покажет неожиданное преимущество на русском."
assumptions:
  - "Профиль книги: ~100K токенов выхода и ~200K входа за генерацию, кэш не учтён (проверяется экспериментом)."
  - "Превосходство Kimi K3 на англоязычном EQ-Bench переносится на русскую прозу лишь частично или не переносится (проверяется слепым ревью)."
  - "Юнит-экономика книги допускает не более ~$0.5/книга для основной модели массового тира."
risks:
  - "Цены volatile: у EV-101/EV-103 freshness до 2026-10-22, у EV-104/EV-106 — до 2026-09-22; при истечении пересчитать EV-106."
  - "EQ-Bench англоязычный: экстраполяция превосходства K3 на русскую прозу может не подтвердиться (EV-105)."
  - "Цена K2.6 взята из агрегатора с противоречиями в обзорах (EV-104)."
unknowns:
  - "Качество художественного русского текста 50K+ токенов не сравнивалось напрямую ни одним доступным бенчмарком — главный пробел."
  - "Официальная цена K2.6 с платформы Kimi не получена."
  - "Деградация качества к финальным главам (longform-метрика) для конкретных кандидатов не извлечена."
  - "Фактический профиль токенов пайплайна книги (вход/выход/кэш) — допущение, не измерение."
proposed_validation:
  experiment: "Сгенерировать 20 одинаковых глав (русский, ~4K токенов каждая, единый промпт) на deepseek-v4-flash, deepseek-v4-pro и kimi-k3; слепое ревью качества + замер деградации к последним главам и фактической стоимости. По результату — подтвердить основную модель и решить, нужен ли премиум-тир на K3."

# DecisionPackage по RR-006 (Hugging Face для ИИ-среды и AI Ops Kit).
# v2: переработан по итогам judge-ревью (major: противоречие Team/Enterprise для среднего яруса;
# потерянная privacy-оговорка EV-402 у hf-router + несверенность с routing-policy кита;
# моно-риск базы Qwen; неучтённая эксплуатация; нефальсифицируемый порог пилота; smolagents/Spaces без ответа).
schema_version: 1
kind: research.decision-package
id: DP-106
request_id: RR-006
decision:
  question: "Какие строительные блоки Hugging Face взять для backend ИИ-среды и для AI Ops Kit?"
recommendation:
  preferred_option: "три слоя адопции: (1) ИИ-среда — приватный self-hosted стек vLLM+TEI с T-lite-8B/T-pro-33B и FRIDA/bge-m3, граница по данным; (2) кит — декларации hf-router (scope: только неконфиденциальные маршруты), hf-mcp-server, конвенция pinned_revision в существующем registry/models.yaml; (3) не брать: TGI, lighteval-формат, evaluate, Spaces для корп-контура; Argilla — opt-in с exit-стратегией; smolagents — не для кита, опционально для ИИ-среды"
  confidence: medium
  confidence_rationale: "Факты — с первичных источников, с verbatim-цитатами где возможно; но бенчмарки русских моделей self-reported вендорами (EV-413/414), экономика стоит на допущении о нагрузке и НЕ включает стоимость эксплуатации (только аренду GPU), ничего не разворачивалось — подтверждает пилот."
rationale:
  - "Инференс: TGI мёртв (архив 2026-03, EV-403) — self-hosted стек на vLLM (LLM) + TEI (эмбеддинги/реранк, живой Apache-2.0 проект — EV-404), оба нативно поддержаны в HF Inference Endpoints (EV-406): один контракт 'OpenAI-compatible endpoint' покрывает и своё железо, и managed-путь."
  - "Модели для русского: T-lite-it-2.1 8B (1x 24GB, Ru Arena Hard 83.9 self-reported, EV-414) + T-pro-it-2.1 33B (1x 48-80GB, 93.8, EV-413), оба Apache-2.0; эмбеддинги FRIDA (MIT, EV-416) и/или bge-m3 (MIT, 8192 токена, гибридный поиск, EV-417). ВАЖНО: оба яруса LLM — тюны Qwen (моно-база, см. risks); хедж — GigaChat-20B-A3B (MIT, русский с нуля, EV-422). Исключены по лицензиям: YandexGPT-5-Lite (порог 10M токенов/мес, EV-415), jina-embeddings (CC-BY-NC, EV-417)."
  - "Граница данных: self-hosting — премия за приватность, не за качество: аренда GPU $500-2400/мес против десятков—пары сотен долларов за API (EV-419, EV-420, EV-101); сверх аренды есть неоценённая стоимость эксплуатации (см. assumptions/unknowns). Граница по ДАННЫМ: корпоративные документы → только приватный контур; средний ярус — HF Private Endpoint (payload'ы не хранятся, PrivateLink, SOC2, EV-418) — юридически пригоден для корп-данных только при Enterprise-подписке (GDPR DPA — через Enterprise Hub, EV-418; от $50/user/мес, EV-401; технический тир-гейтинг Endpoints — проверить в юр-чеке пилота) и НЕсовместим с требованием ru-data-residency (регионы только AWS/GCP/Azure, EV-406); задачи без корпоративного контекста → внешние API (DeepSeek V4: веса открыты, но дата-центрового масштаба — его место здесь только как API, EV-421, EV-101). В UI приложения — явный флаг 'запрос уйдёт во внешний API'."
  - "Кит/инструменты: (а) hf-router (Inference Providers: OpenAI-совместимый роутер к ~17 провайдерам без наценки, один HF_TOKEN, EV-402) — декларация в registry/tools.yaml СО SCOPE-ограничением: только маршруты confidentiality public/internal, в согласии с routing-policy кита (confidential → gigachat/local) — сам EV-402 фиксирует, что данные уходят провайдерам разных юрисдикций; преимущество не 'zero lock-in', а проверяемое 'миграция = смена base_url' (OpenAI-совместимость); политика :cheapest фиксируется в декларации; (б) hf-mcp-server (MIT, hosted, EV-405) — поиск моделей/датасетов/статей агентам кита и research-модулю; (в) конвенции model card: минимальный additive-путь — поле pinned_revision (commit hash) в записях СУЩЕСТВУЮЩЕГО registry/models.yaml (EV-411); config/model-routing.yaml не трогать — routing по принципу 17 кита ссылается на классы, не на конкретные модели; новый markdown-формат не заводить; (г) Hub Team-план ($20/user/мес) достаточен ТОЛЬКО как реестр моделей (SSO/audit/storage regions, EV-401); путь Private Endpoints требует Enterprise — это разные решения с разной ценой."
  - "Кит/evals: у HF нет декларативного формата eval-задач (lighteval — Python lock-in, evaluate стагнирует, EV-408), а сам HF совершил formats-first разворот (loading scripts удалены, EV-409) — подтверждение DP-105; перенять конвенции golden set = данные-файлы + splits + revision-pinning (EV-409); Argilla — единственный зрелый self-hosted инструмент под human-метки для kappa, но заморожен по фичам — только opt-in с независимым форматом экспорта (EV-410); MERA — первичный ориентир выбора моделей для русского (EV-412)."
  - "Рассмотрено и не рекомендовано: Spaces для корпоративного контура — хостинг у HF вне контура, Gradio/Docker Spaces для организаций платные (EV-407); Gradio self-hosted (Apache-2.0) остаётся допустимым для внутренних прототипов UI; smolagents — киту не нужен (агентный рантайм кита — Claude Code), для ИИ-среды — опциональный embedded-рантайм аналитических пайплайнов с обязательным sandbox (EV-423)."
assumptions:
  - "Профиль нагрузки ИИ-среды ~100-500M токенов/мес на 50-200 сотрудников — допущение до появления backend (на нём стоит EV-420)."
  - "Self-reported метрики T-tech отражают реальное качество с точностью до слепого пилота."
  - "Есть инженер, готовый владеть self-hosted inference-стеком (обновления vLLM/TEI, патчи, мониторинг; порядка нескольких часов в месяц) — без владельца преимущество приватного контура съедается эксплуатацией."
  - "Оплата HF-планов и GPU-провайдеров из юрисдикции компании осуществима — НЕ проверялось (unknowns/юр-чек)."
alternatives:
  - option: "API-only — без self-hosting, всё через внешние API с DPA"
    appropriate_when: "Если юр-оценка допустит передачу документов процессору с DPA (HF Private Endpoint при Enterprise-подписке, EV-418, EV-401) — экономия аренды и эксплуатации; проверить до закупки железа."
  - option: "max-private — только собственное железо, без HF-облака"
    appropriate_when: "Если комплаенс запретит и PrivateLink-ярус, или требуется ru-data-residency (средний ярус его не даёт, EV-406): веса скачиваются с Hub однократно, дальше контур автономен (vLLM+TEI позволяют)."
risks:
  - "HF решительно бросает продукты (TGI архив, evaluate стагнация, Argilla заморожена; прецедент смены лицензии TGI→HFOIL — EV-403, EV-408, EV-410): версии пиновать, форматы держать независимыми."
  - "Моно-база Qwen: T-lite и T-pro — тюны Qwen3 (EV-413, EV-414), альтернативные эмбеддинги Qwen3-Embedding — тот же вендор (EV-417); смена лицензии/политики Alibaba бьёт по обоим ярусам сразу. Митигации: GigaChat-20B-A3B как диверсификация базы (EV-422); скачанные веса пинованной ревизии не отзываются ретроактивно."
  - "Внезапное прекращение доступа к HF-облаку (санкции/блокировка аккаунта): исчезают Private Endpoints и Hub-реестр — митигация: локальные копии весов пинованных ревизий + экспорт реестра; сценарий 'оплата из юрисдикции' — отдельный юр-чек до коммитмента."
  - "Бенчмарки русских моделей self-reported вендорами — слепой пилот обязателен до продакшена."
  - "Экономика EV-420 учитывает только аренду GPU: полная TCO с эксплуатацией не оценена (unknown); при росте нагрузки x10 сравнение сместится."
unknowns:
  - "Реальный профиль токенов/нагрузки ИИ-среды (backend не существует)."
  - "TCO эксплуатации self-hosted стека (человеко-часы/мес)."
  - "Юридический статус оплаты HF/GPU-провайдеров из юрисдикции компании."
  - "Фактическое качество T-lite/T-pro на задачах ИИ-среды против DeepSeek API и против GigaChat — не сравнивалось."
  - "Независимые (не self-reported) позиции T-pro/T-lite на MERA — не проверялись."
proposed_validation:
  experiment: "Пилот из трёх частей: (1) ИИ-среда — поднять T-lite-it-2.1 на vLLM + FRIDA на TEI (RunPod L4/L40S), RAG по 10 обезличенным документам, 10 справок; слепое парное сравнение с DeepSeek V4 API по рубрике из 5 критериев (точность по документам, полнота, русский язык, структура, отсутствие галлюцинаций), судья не знает источник; ПОРОГИ: T-lite проигрывает не более чем в 6/10 пар И средний балл рубрики >=0.8 от API-варианта И фактическая стоимость в пределах 2x от расчётной (проверка EV-420); замер человеко-часов на подъём стека — первая точка TCO-unknown; оговорка: пилот с n=10 отсеивает провал, но НЕ подтверждает превосходство — перед продакшеном расширенный сет; (2) кит — задекларировать hf-mcp-server и hf-router (со scope-ограничением и политикой :cheapest) в registry/tools.yaml; КРИТЕРИЙ: model_search возвращает валидный результат в живой сессии И один chat-вызов через hf-router с :cheapest успешен; (3) юр-чек (человек, не агент): оплата Team-плана и GPU-провайдера из юрисдикции компании; отдельным пунктом — нужен ли вообще средний ярус (если нет, Enterprise не нужен)."

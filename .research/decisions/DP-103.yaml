schema_version: 1
kind: research.decision-package
id: DP-103
request_id: RR-003
decision:
  question: "Что перенять из gstack и как позиционировать кит относительно него?"
recommendation:
  preferred_option: "selective-adaptation + positioning 'система, не стек'"
  confidence: medium
  confidence_rationale: "Для адаптационной части medium обоснован: механики сняты с первичного репо, MIT подтверждён raw LICENSE (EV-210, EV-212). Позиционная часть слабее — стоит на негативном утверждении «в публичном репо не обнаружено X» (EV-211, medium: негатив проверяем слабее позитива, проприетарные GBrain/Browser не просмотрены) — и без подтверждения пилотом сама по себе была бы low; сторона кита теперь подкреплена EV-214."
rationale:
  - "gstack подтверждает категорию (123.7k звёзд за 4 месяца, EV-210). В его публичном репозитории не обнаружены как инварианты/фреймворки: governance/policy gates, writer≠judge, eval-фреймворк, реестры-источник-истины, child-установки, research/decision-контракты (EV-211, с оговоркой о слабости негативных утверждений). Важно: частичные аналоги у gstack есть — /qa даёт health score с baseline (eval-подобный механизм), /codex — кросс-модельное ревью (EV-212); разница не в наличии, а в статусе: у gstack это опции по желанию пользователя, у кита — валидируемые инварианты (28 gates / 18 blocking, writer≠judge как правило валидатора, 51 агент с обязательными eval-кейсами, installer+migrations — EV-214). Позиционирование строится на разнице статусов, а не на «у них ничего нет»."
  - "Пять механик gstack адаптируемы аддитивно и лицензионно чисто: MIT (EV-210) — идеи переносимы свободно; при переносе текста промптов сохранить attribution 'Copyright (c) 2026 Garry Tan' в NOTICE (EV-212)."
  - "Внешняя критика gstack — перегруз командами, небезопасная автономия, соло-мейнтейнер при 775 issues (EV-213) — совпадает с зонами, где у кита есть проверяемые механизмы (EV-214). Обратное тоже верно: '30-second setup' gstack против installer-процедуры кита — вероятный DX-разрыв не в пользу кита; это гипотеза до замера (unknowns), а не факт."
assumptions:
  - "Категория 'структурированная команда поверх Claude Code' останется горячей минимум квартал; звёзды gstack — сигнал спроса, а не моды одного твита."
  - "Аудитория кита (команды с потребностью в governance/evals) отличается от ядра аудитории gstack (соло-фаундеры); проверяется дёшево — разбором профилей жалоб/похвал в HN-треде (EV-213)."
  - "Механики из EV-212 переносимы в русскоязычные markdown-контракты кита без потери сути."
alternatives:
  - option: "adopt-without-positioning — взять механики, не позиционироваться против gstack"
    appropriate_when: "Если кит не планирует публичную аудиторию в ближайший квартал ИЛИ если репутационная асимметрия (позиционирование против проекта YC-CEO) оценивается как чистый минус. Снимает самые слабые места пакета: негативное evidence и репутационный риск. Дефолтный fallback, если позиционная гипотеза не подтвердится."
  - option: "ignore — не реагировать на gstack"
    appropriate_when: "Если кит сознательно остаётся внутренним инструментом без внешней аудитории и ресурса на адаптацию нет вовсе."
  - option: "deep-integration — совместимость с gstack (hosts/-адаптер)"
    appropriate_when: "Если появится задача выхода в комьюнити gstack; сейчас преждевременно — формат нестабилен, соло-мейнтейнер, 775 issues."
risks:
  - "Перенос механик без контекста утяжелит кит: сила gstack — в дешёвом входе; копировать механики и не чинить онбординг — худший вариант."
  - "gstack с активным автором и огромным комьюнити может закрыть свои пробелы быстрее, чем кит — свой онбординг; позиционирование может устареть к истечению freshness EV-210/EV-211 (2026-10-22) — пересматривать при refresh."
  - "Репутационный риск: публичное позиционирование против проекта YC-CEO — асимметрия внимания не в пользу кита; виральность gstack частично от статуса автора (EV-213), споры с ней не выигрываются фактами."
  - "Оценка «не обнаружено в репо» может быть неполной: ~25% команд gstack зависят от проприетарных GBrain/Browser, их содержимое не просмотрено (EV-211, EV-213)."
unknowns:
  - "Реальное качество работы механик gstack в бою — читали промпты, не запускали."
  - "Онбординг кита в цифрах (шагов/минут до первой пользы) — не замерен; '30 seconds' gstack — их маркетинговая цифра, тоже не проверена."
  - "Состав аудиторий кита и gstack — допущение о непересечении не проверено."
proposed_validation:
  experiment: "Три части: (1) пилот механики fix-first — поля confidence 1–10 и обязательная цитата строки (pre-emit) в reviewer-result контракте кита, прогон на 3–5 реальных ревью (n=1 недостаточно); (2) замер онбординга собственным секундомером ОБЕИХ систем: git clone → первое полезное действие, кит против gstack (не верить '30 seconds' из README); (3) проверка допущения об аудиториях: разбор профилей в HN-треде (EV-213) — кто хвалит/жалуется, соло или команды. Позиционное решение принимать только после (2) и (3); адаптационное — после (1)."

  notes: "Раунд 1 (v1): needs_work — critical по лицензиям dev-browser/agnix, major по неподтверждённому Apache-2.0 и неадресованному no_new_python_deps. Раунд 2 (v2, после EV-208/EV-209 и правок): approved — 'правки содержательные, не косметические: critical и все major закрыты по существу; остаточные замечания — гигиена, не препятствуют принятию с confidence: medium'. Остаточные minor учтены: область лицензионного критерия уточнена в rationale; разнос EV-208 на две записи — при следующей правке."

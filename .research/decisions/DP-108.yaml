alternatives:
- option: монолит на базе OpenHands software-agent-sdk (MIT) — кит как надстройка над их Conversation/Agent/Workspace
  appropriate_when: 'Если поддержка собственного execution-движка станет дороже адаптации: SDK активен и MIT (EV-606),
    но цена — их модель абстракций, версионная нестабильность V0→V1 и зависимость от конкурента идеи (EV-605); триггер
    пересмотра — Bench-evidence, что свой движок ограничивает качество (сейчас evidence обратное: engine_floor=0
    EV-661).'
- option: форк Open SWE + свои gates как middleware (их README сам это предлагает — EV-601)
  appropriate_when: 'Если понадобится готовый Slack/Linear-вход и cloud-sandbox флот быстрее, чем строить свой:
    цена — LangChain-стек, отсутствие стабильного API (EV-602), перенос своих инвариантов в чужой lifecycle; сейчас
    неоправданно — вход из рабочих инструментов не является узким местом кита.'
- option: 'status-quo-no-borrowing: развивать всё внутри кита, ничего не заимствуя (ось заимствований; монолит —
    опция №1)'
  appropriate_when: Если внешняя аудитория не появится (assumption №1 падает) и DX-давление не подтвердится пилотом
    checks — тогда остаётся только квартальный watch.

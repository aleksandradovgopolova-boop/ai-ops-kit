# DecisionPackage по RR-008 (аналоги AI Ops: верификация внешнего анализа + стратегия).
# v2 по итогам judge-ревью (major: отсутствовал блок alternatives — стратегия без сравнения;
# асимметричный стандарт evidence к OpenHands — дособран EV-662; охват EV-660 наследовал выборку
# проверяемого источника — дособран независимый скан EV-663; нефальсифицируемые пороги пилота).
schema_version: 1
kind: research.decision-package
id: DP-108
request_id: RR-008
decision:
  question: Подтверждается ли стратегия «AI Ops = control plane + адаптеры к open-source» и какие проекты изучать/адаптировать
    первыми?
decision_brief: 'Стратегия «кит = control plane + адаптеры» подтверждается в границах проверенной выборки (9 проектов
  чужого анализа + gstack + независимый скан соседей): полного OSS-продукта с цепочкой execution→gates→evidence-on-SHA→delivery
  не найдено, но жанр рождается с нескольких сторон (OpenHands перепозиционировался в «developer control center»,
  Microsoft AGT, академический Rel(AI)Build) — окно ограничено. Порядок работ: (1) сейчас, без лицензионных обязательств
  и новых зависимостей (2-4 дня пилота) — формат Continue checks (.checks/*.md; проект куплен Cursor и архивирован)
  как DX-обёртка гейтов, компилируемая в gates.yaml (источник истины один); (2) référенсы без кода — Open SWE (сам
  признаёт validation prompt-driven), Cline Kanban (UX WorkItems), gstack; (3) адаптеры (SWE-ReX, OpenHands SDK)
  — только по реальной потребности. Топ-риски: OpenHands с 81.9k звёзд движется к control plane (в его доках gates/delivery
  пока НЕ документированы — проверено); стратегическая часть решения валидируется слабее верификационной (см. confidence).
  Следующий шаг: пилот checks-формата + квартальный re-scan (октябрь).'
cost_of_recommendation:
  one_time: 'Шаг 1 (пилот формата checks как DX-обёртки гейтов): 2-4 дня — конвертация 2-3 гейтов + компилятор checks→gates.yaml.
    Референсы — 0 (чтение сделано этим RR). Адаптеры — по 1-2 недели, ОТЛОЖЕНЫ до потребности.'
  recurring: Квартальный повторный скан ландшафта (~1 прогон центра, ландшафт протухает за недели); мониторинг позиционирования
    OpenHands.
  owner_required: Sasha/команда кита для решения о пилоте checks-формата; центр — для квартальных сканов.
  note: Оценки writer'а; пилот checks даст фактическую цену.
recommendation:
  preferred_option: 'confirm-strategy-with-amendments: кит остаётся control plane; заимствование тремя слоями (формат
    checks сейчас как DX-обёртка при единственном источнике истины gates.yaml; референсы бесплатно; адаптеры по
    потребности); OpenHands — в конкурент-мониторинг'
  confidence: medium
  confidence_rationale: 'РАЗДЕЛЬНАЯ калибровка: верификационная часть (факты о проектах, расхождения с чужим анализом)
    — уверенный medium: 24 EV, из них 17 scout-верификаций первоисточниками с verbatim-цитатами, спот-чек судьи
    прошёл. Стратегическая часть (control plane vs монолит/форк) — low-to-medium: альтернативы рассмотрены качественно
    (alternatives), но TCO-сравнение форка против собственного control plane не проводилось и в validation ОТЛОЖЕНО
    до триггера; негативные утверждения о конкурентах — «не документировано/не обнаружено» с охватом (EV-660, EV-662,
    EV-663), не «не существует».'
rationale:
- 'Главный тезис чужого анализа подтверждён В ГРАНИЦАХ выборки (его 9 проектов + gstack, которого в его скане не
  было) И откалиброван независимым сканом за пределами выборки (EV-663): полного OSS-продукта с цепочкой «execution
  → детерминированные gates → независимое ревью → evidence на SHA → durable lifecycle → delivery-транзакция → evaluation
  → governance» не найдено; найдены жанровые соседи (Microsoft AGT — runtime security; Galileo Agent Control; академический
  Rel(AI)Build без публичного репозитория) — жанр control plane рождается с нескольких сторон, окно связности как
  дифференциации ограничено (EV-660, EV-663). Своя сторона цепочки эвидентна живым прогоном Phase B (DeliveryReceipt
  sha_verified=True против реального remote SHA, PR #1 — EV-661), с честной оговоркой о прецеденте маскировки зелени
  и отсутствии внешнего аудита.'
- 'Поправка №1 — конкурент идеи: OpenHands перепозиционировался в «self-hosted developer control center» (EV-605,
  81.9k звёзд). Проверка его ДОКУМЕНТАЦИИ (не tagline, EV-662): policy-gates, транзакционная доставка и reviewer-инварианты
  не документированы; документированы RBAC/permissions, budgeting, интеграции — сегодня пересечение с китом по названию
  роли, не по механизмам, но это состояние на дату проверки. Его SDK (отдельный MIT-репозиторий, EV-606) — легитимный
  adapter-кандидат; enterprise/ — PolyForm Free Trial 30 дней/год (EV-604); harness бенчмарков заточен под их SDK
  (EV-607).'
- 'Поправка №2 — «главный референс gates as code» мёртв как проект: Continue поглощён Cursor, основной репозиторий
  архивирован (EV-631, EV-632). Формат checks жив и снят verbatim (EV-633): .checks/*.md, один файл = один стандарт
  = один агент = один GitHub-статус. Про источник истины: формат берём как DX-ОБЁРТКУ — checks-файлы компилируются
  в gates.yaml (registry остаётся единственным источником истины по инварианту кита), параллельного источника деклараций
  не создаём. Гипотеза DX-разрыва (в DP-103 — про онбординг и помечена гипотезой) распространяется нами на авторинг
  гейтов — это наше допущение, пилот его проверяет. Судьба Continue — подтверждение ценности ниши: gates-as-code
  купил Cursor.'
- 'Поправка №3 — адаптеры и масштабы: SWE-ReX подтверждён функционально (MIT, backends local/Docker/Fargate/Modal,
  EV-608), но 556 звёзд/одна команда — bus-factor; их же mini-swe-agent обходится без него (EV-609) — sandbox-абстракцию
  брать только при реальной мульти-backend потребности. Open SWE — референс, не библиотека (нет стабильного API,
  LangChain-стек, EV-602); его самопризнанный prompt-driven validation (EV-601) — прямой аргумент позиционирования
  кита.'
- 'Cline Kanban — отдельный продукт (per-card worktree+терминал, auto-commit, dependency chains — EV-635): лучший
  живой UX-референс интерфейса WorkItems; Aider в полу-maintenance (EV-636) — заимствовать паттерн lint/test-автофикса;
  Goose — в Linux Foundation/AAIF (EV-637, EV-638), вне первой очереди. Механизмы кита, против которых сверяем (28
  gates/18 blocking, writer≠judge как правило валидатора), эвидентны EV-214.'
assumptions:
- Позиционирование кита предполагает внешнюю аудиторию хотя бы в перспективе (иначе конкурентная часть не важна,
  остаётся заимствование + watch).
- Формат checks выразим как компилируемая обёртка над gates.yaml без потери policy-полей (проверяется пилотом с
  жёстким списком обязательных полей).
- Гипотеза DX-разрыва авторинга гейтов (перенос гипотезы DP-103 с онбординга) — наше допущение, проверяется пилотом.
- Квартальный ритм сканов достаточен при текущей скорости ландшафта (чужой анализ устарел за недели; если темп вырастет
  — пересмотреть).
constraints_addressed:
  license_compatible_commercial: 'Пофамильно в EV: MIT (Open SWE, SWE-ReX, SWE-agent/mini, OpenHands core/SDK),
    Apache-2.0 (Continue checks, Cline, Aider, Goose); исключение — OpenHands enterprise/ (PolyForm Free Trial,
    EV-604): не трогать; Dify/Open WebUI-класс ограничений в этом наборе не встретился.'
  fits_kit_declared_pattern: 'Соблюдён: рекомендация не добавляет зависимостей ядра — формат (checks) + референсы
    (чтение) + отложенные адаптеры как будущие декларации registry/tools.yaml.'
  evidence_over_reputation: 'Соблюдён: все ключевые утверждения чужого анализа перепроверены первоисточниками; найдено
    3 существенных расхождения (Continue/Cursor, OpenHands repositioning+PolyForm, канонический репозиторий goose)
    и 1 дыра охвата (gstack).'
risks:
- 'OpenHands как control-plane конкурент: 81.9k звёзд против нишевого кита; если их «control center» получит калиброванные
  gates и delivery-транзакции, дифференциация кита сожмётся до governance/product-слоя — мониторить в квартальном
  скане.'
- 'Ландшафт сверхподвижен: присланный анализ устарел по 3 пунктам за недели; наши EV живут до 2026-10 — решения
  на их основе после октября требуют re-scan.'
- Формат checks выразительно беднее модели гейтов кита (нет revision-binding/applicability/blocking нативно) — пилот
  с жёстким fail-списком может отклонить формат; тогда остаётся текущий gates.yaml без DX-обёртки.
- SWE-ReX bus-factor (556 звёзд, одна команда) — при адаптации пиновать и держать fallback на собственный Tool Broker.
- 'Self-reported цепочка кита (EV-661): для внешнего позиционирования потребуется независимая демонстрация (публичный
  quickstart/бенч), не только свой CI.'
- 'Стратегический выбор подтверждён качественно, не количественно: TCO форка/монолита не считался — при триггере
  (engine-ограничения по Bench, появление gates/delivery у OpenHands) вопрос возвращается отдельным RR.'
unknowns:
- Фактическая совместимость формата checks с gate_executor (пилот).
- Планы OpenHands по gates/delivery (следить, первоисточников о roadmap не собирали).
- Реальная потребность кита в мульти-backend sandbox (пока Tool Broker закрывает текущие нужды).
proposed_validation:
  experiment: 'Три части: (1) пилот формата checks как DX-обёртки: сконвертировать 2-3 гейта (security, documentation_drift)
    в .checks-стиль + компилятор checks→gates.yaml; ПОРОГ-А (жёсткий): revision-binding, applicability и blocking-статус
    обязаны сохраниться при компиляции — потеря ЛЮБОГО = fail пилота; ПОРОГ-Б (стоп-сигнал, НЕ подтверждение): время
    написания нового гейта в checks-стиле замеряется на ДВУХ авторах (не автор конвертера) — если у обоих дольше,
    чем в gates.yaml, формат отклоняем; если быстрее — формат НЕ доказан (малое n), накапливаем замеры в бою; fallback
    при недоступности двух не-конвертерных авторов: один автор + явная пометка «замер нерепрезентативен, только
    грубый стоп-сигнал»; (2) референс-карта Open SWE/Cline Kanban/gstack для дизайна UI WorkItems (deliverable без
    порога); (3) квартальный re-scan ландшафта как Watch (первый — октябрь 2026; туда же — повторная проверка фич
    OpenHands (EV-662) и верификация первоисточниками жанровых соседей из EV-663 (Microsoft AGT, Galileo Agent Control,
    ACS)). СТРАТЕГИЧЕСКАЯ ЧАСТЬ (control plane vs монолит/форк) — валидация ОТЛОЖЕНА явно: TCO-сравнение проводится
    отдельным RR по триггеру (Bench-evidence об ограничениях своего движка ИЛИ появление gates/delivery у OpenHands);
    до триггера решение остаётся качественным.'

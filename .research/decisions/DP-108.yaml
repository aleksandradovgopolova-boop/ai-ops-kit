# DecisionPackage по RR-008 (аналоги AI Ops: верификация внешнего анализа + стратегия).
# Writer-preflight (16 пунктов) пройден до отправки на ревью.
schema_version: 1
kind: research.decision-package
id: DP-108
request_id: RR-008
decision:
  question: "Подтверждается ли стратегия «AI Ops = control plane + адаптеры к open-source» и какие проекты изучать/адаптировать первыми?"
decision_brief: "Стратегия подтверждается с одной важной поправкой: главный тезис чужого анализа верен (единого OSS-продукта с цепочкой execution→gates→evidence→delivery не обнаружено в охвате 9 верифицированных проектов + gstack), но OpenHands с момента того анализа перепозиционировался в «self-hosted developer control center» — у идеи control plane появился прямой конкурент с 81.9k звёзд. Порядок работ: (1) немедленно и бесплатно — принять формат Continue checks (.checks/*.md; проект куплен Cursor и архивирован — формат берём, зависимость не создаём) как альтернативный вид gates-деклараций; (2) референсы без кода — Open SWE (его README сам признаёт validation prompt-driven — это козырь позиционирования кита), Cline Kanban (UX WorkItems), gstack (уже в DP-103); (3) адаптеры — только по реальной потребности: SWE-ReX как sandbox-backend (MIT, но 556 звёзд — bus-factor), OpenHands software-agent-sdk (MIT; НЕ enterprise/ — там PolyForm 30 дней/год). Цена: формат checks — дни; адаптеры — недели и отложены. Топ-риск: OpenHands как control-plane конкурент движется быстро; повторный скан в октябре. Чужой анализ устарел по 3 пунктам за недели — ландшафту нельзя верить дольше квартала."
cost_of_recommendation:
  one_time: "Шаг 1 (формат checks как альтернативный вид gate-деклараций): 2-4 дня — конвертация 2-3 существующих гейтов в .checks-стиль + расширение gate_executor чтением формата (пилот). Шаги референсов — 0 (чтение уже сделано этим RR). Адаптеры (SWE-ReX/SDK) — по 1-2 недели каждый, ОТЛОЖЕНЫ до реальной потребности."
  recurring: "Квартальный повторный скан ландшафта (~1 прогон центра, ландшафт протухает за недели); мониторинг позиционирования OpenHands."
  owner_required: "Sasha/команда кита для решения о пилоте checks-формата; центр — для квартальных сканов."
  note: "Оценки writer'а; пилот checks даст фактическую цену."
recommendation:
  preferred_option: "confirm-strategy-with-amendments: кит остаётся control plane (не монолитный агент и не форк чужого), заимствование в 3 слоя — формат сейчас (Continue checks), референсы бесплатно (Open SWE/Cline Kanban/gstack), адаптеры по потребности (SWE-ReX, OpenHands SDK); плюс новое: OpenHands учитывать как конкурента идеи, не только как runtime"
  confidence: medium
  confidence_rationale: "Все фактические утверждения верифицированы первоисточниками с verbatim-цитатами (2 разведчика, 17 EV); негативное утверждение оформлено с охватом (EV-660); слабости: цепочка кита — self-reported (EV-661, спот-чек судьи), ландшафт сверхподвижен (чужой анализ устарел за недели), ни один адаптер не пробовался в коде."
rationale:
  - "Главный тезис чужого анализа ПОДТВЕРЖДЁН с усилением охвата: единый OSS-продукт с цепочкой «execution → детерминированные gates → независимое ревью → evidence на SHA → durable lifecycle → delivery-транзакция → evaluation → governance» не обнаружен среди 9 верифицированных проектов + gstack, которого в чужом скане не было вовсе (EV-660); своя сторона цепочки эвидентна CHANGELOG'ом и CI кита с оговоркой self-reported (EV-661). Связность остаётся дифференциацией кита."
  - "Поправка №1 — конкурент идеи: OpenHands перепозиционировался в «self-hosted developer control center» (EV-605, 81.9k звёзд, активен) — чужой анализ записал его только в runtime-референсы. Его SDK (отдельный MIT-репозиторий, EV-606) остаётся легитимным adapter-кандидатом, но enterprise/ — PolyForm Free Trial с лимитом 30 дней/год (EV-604), а «source-available» из анализа — заниженная оценка ограничений; harness бенчмарков заточен под их SDK (EV-607)."
  - "Поправка №2 — «главный референс gates as code» мёртв как проект: Continue поглощён Cursor, основной репозиторий архивирован (EV-631, EV-632). Но сам формат checks жив и снят verbatim (EV-633): .checks/*.md = YAML-frontmatter + markdown-промпт, один файл = один стандарт = один агент = один GitHub-статус, при fail — committable suggestion. Это готовый образец ДЛЯ ФОРМАТА гейтов кита (наши gates.yaml мощнее по policy, но проигрывают в DX — что мы сами фиксировали в DP-103 про порог входа); заимствование формата у архивированного Apache-2.0 проекта — нулевой риск зависимости. Судьба Continue — предупреждение и подтверждение ценности ниши: gates-as-code купил Cursor."
  - "Поправка №3 — масштабы и рекомендации по адаптерам: SWE-ReX подтверждён функционально (MIT, backends local/Docker/Fargate/Modal, EV-608), но это 556 звёзд и одна академическая команда — bus-factor; показательно, что их же mini-swe-agent обходится без него (EV-609) — sandbox-абстракцию брать только при реальной мульти-backend потребности. Open SWE — референс, не библиотека: публичного стабильного API нет, интеграция = форк + LangChain-стек (EV-602); его самопризнанный prompt-driven validation (EV-601) — прямой аргумент позиционирования кита («мы — deterministic gates, которых у них нет by design»)."
  - "Cline Kanban подтверждён как отдельный продукт (npx kanban: per-card worktree+терминал, auto-commit, dependency chains — EV-635) — лучший живой UX-референс для будущего интерфейса WorkItems; Aider жив, но в полу-maintenance (релизов ~год, EV-636) — заимствовать паттерн lint/test-автофикса, не код; Goose — в Linux Foundation/AAIF (EV-637, EV-638) — референс нейтрального governance, вне первой очереди."
assumptions:
  - "Позиционирование кита предполагает внешнюю аудиторию хотя бы в перспективе (иначе конкурентная часть решения не важна, остаётся только заимствование)."
  - "Формат checks совместим с моделью gate_executor кита (проверяется пилотом; наши gates имеют policy-поля, которых нет в checks — потребуется маппинг)."
  - "Квартального ритма сканов достаточно при текущей скорости ландшафта (чужой анализ устарел за ~недели — если темп сохранится, ритм пересмотреть)."
constraints_addressed:
  license_compatible_commercial: "Пофамильно в EV: MIT (Open SWE, SWE-ReX, SWE-agent/mini, OpenHands core/SDK), Apache-2.0 (Continue checks, Cline, Aider, Goose); исключение — OpenHands enterprise/ (PolyForm Free Trial, EV-604): не трогать; Dify/Open WebUI-класс ограничений в этом наборе не встретился."
  fits_kit_declared_pattern: "Соблюдён: рекомендация не добавляет зависимостей ядра — формат (checks) + референсы (чтение) + отложенные адаптеры как будущие декларации registry/tools.yaml."
  evidence_over_reputation: "Соблюдён: все ключевые утверждения чужого анализа перепроверены первоисточниками; найдено 3 существенных расхождения (Continue/Cursor, OpenHands repositioning+PolyForm, канонический репозиторий goose) и 1 дыра охвата (gstack)."
risks:
  - "OpenHands как control-plane конкурент: 81.9k звёзд против нишевого кита; если их «control center» получит калиброванные gates и delivery-транзакции, дифференциация кита сожмётся до governance/product-слоя — мониторить в квартальном скане."
  - "Ландшафт сверхподвижен: присланный анализ устарел по 3 пунктам за недели; наши EV живут до 2026-10 — решения на их основе после октября требуют re-scan."
  - "Формат checks проще модели gates кита (нет revision-binding, applicability, blocking-политик) — пилот может показать несовместимость без потери силы гейтов; тогда checks остаётся только DX-обёрткой."
  - "SWE-ReX bus-factor (556 звёзд, одна команда) — при адаптации пиновать и держать fallback на собственный Tool Broker."
  - "Self-reported цепочка кита (EV-661): для внешнего позиционирования потребуется независимая демонстрация (публичный quickstart/бенч), не только свой CI."
unknowns:
  - "Фактическая совместимость формата checks с gate_executor (пилот)."
  - "Планы OpenHands по gates/delivery (следить, первоисточников о roadmap не собирали)."
  - "Реальная потребность кита в мульти-backend sandbox (пока Tool Broker закрывает текущие нужды)."
proposed_validation:
  experiment: "Три части: (1) пилот формата — сконвертировать 2-3 существующих гейта кита (например security, documentation_drift) в .checks-стиль markdown и научить gate_executor читать этот формат как альтернативный вид декларации; ПОРОГИ: конвертация без потери policy-семантики (revision-binding/applicability сохранены или явно перечислено потерянное) И время написания нового гейта в checks-стиле < времени в gates.yaml (замер на одном авторе); (2) референс-карта — свести Open SWE/Cline Kanban/gstack паттерны в один документ для дизайна UI WorkItems (вход в будущий VISUAL-контур; без порога — deliverable); (3) квартальный re-scan ландшафта как Watch центра (первый — октябрь 2026, совпадает с freshness EV); адаптеры SWE-ReX/OpenHands SDK — ОТЛОЖЕНЫ до реальной потребности, в validation не входят (честно: центральный выбор «когда нужен чужой runtime» этим RR не решается — нет потребности, нет спайка)."

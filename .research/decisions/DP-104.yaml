# DecisionPackage по RR-004 (методы верификации/калибровки для research-модуля v0.2).
# v2: переработан по итогам judge-ревью (major: цифры EV-307 не переносятся на одиночного
# судью; validation нефальсифицируем; противоречие optional/required у quote; цена двойного
# синтеза не посчитана).
schema_version: 1
kind: research.decision-package
id: DP-104
request_id: RR-004
decision:
  question: "Какие методы качества включить в research-модуль v0.2?"
recommendation:
  preferred_option: "verification-pack v0.2: 5 механик (quote-grounding + молекулярные claims + confidence-правила + адверсариальный судья с механическим со-судьёй + staleness re-verify с grep-протоколом памяти); триггер отката на minimal (только механика 1) — если ретро-эксперимент покажет полезность только quote-check"
  confidence: medium
  confidence_rationale: "Опоры: 3 рецензированные работы (EV-303 SAFE, EV-305 Xiong et al., EV-307 ICML Best Paper), 5 препринтов 2026 без рецензии (направления сходятся, точные цифры осторожно) и вендорская документация. Неравномерность внутри: механики 1-2 и 5 стоят на сходящихся независимых источниках (уверенный medium); механики 3-4 — наши адаптации, чьи цифры-прообразы на выбранный дизайн НЕ переносятся (low-to-medium, проверяются пилотом)."
rationale:
  - "Механика 1 — quote-grounding: поле quote (verbatim-цитата) в evidence — optional в v0.2 (required-статус нарушил бы additive_to_v01_schemas: ~30 существующих EV без quote стали бы невалидны), required для НОВЫХ evidence конвенцией промпта, required в схеме — с v0.3. Плюс stdlib-скрипт сверки при re-fetch (str/difflib). Обоснование: самоцитирование агентов массово нефейтфульно (EV-302), verbatim-цитаты с механической проверкой снижают галлюцинации атрибуции (EV-301); по EV-308 механическая проверка — единственный некоррелированный с LLM 'судья'."
  - "Механика 2 — молекулярные claims: правило в промпт извлечения — утверждение самодостаточно (кто/когда/где внутри) и верифицируемо по одному фрагменту источника; не атомизировать до потери контекста (EV-303, EV-304)."
  - "Механика 3 — калибровка confidence: (а) рубрика уровней через проверяемые признаки, не прилагательные (EV-306); (б) правило даунгрейда при расхождении двух независимых прогонов синтеза (EV-305) — наша адаптация с важной асимметрией: расхождение — валидный сигнал даунгрейда, но СОГЛАСИЕ прогонов одной модели малоинформативно (общие слепые пятна, EV-308) и confidence не повышает; применять только при workflow deep или required_confidence >= medium, т.к. удваивает стоимость синтез-стадии; (в) калибровочный леджер (сверка заявленного confidence с фактическими outcome/superseded) — внутренняя инженерная практика вне evidence-базы, включается при накоплении >=10 DP с заполненным outcome."
  - "Механика 4 — ревью: адверсариальная рамка направленно полезна (EV-307), но наша конфигурация 'одиночный судья-атакующий' — дешёвая адаптация, чьи цифры прироста (+28 п.п.) измерены для ДВУСТОРОННИХ дебатов и на неё не переносятся; сам EV-307 показывает, что консультант без оппонента заметно хуже дебатов. Утешающая специфика нашего сеттинга: де-факто оппонент существует — rationale пакета и есть аргументы защитника, хотя судья их не видит (чистый контекст по EV-309). Защита от self-preference: судья в чистом контексте, рубрика 'минимум N конкретных дефектов', требование указать опровергающее evidence (EV-309). Панель персон одной модели не строить (EV-308); второе семейство моделей — небольшой и не гарантированный прирост независимости (тот же EV-308: 7 семейств ≈ 2 голоса), главный некоррелированный голос — механические проверки."
  - "Механика 5 — память: не доверять LLM-детекции устаревания (~55%, EV-310) — механический триггер re-verify по возрасту/volatile поверх существующего freshness; memory_check как многошаговый grep-протокол (индекс → 2-3 запроса с синонимами → чтение кандидатов), векторная БД не нужна (EV-311); SQLite FTS5 (stdlib) — отложенный кандидат при росте объёма."
assumptions:
  - "Ретро-проверка на собственных ~30 EV репрезентативна для будущих прогонов."
  - "Цена механики 1 ≈ +1 fetch на evidence; цена механики 3б — удвоение синтез-стадии deep-прогонов (самая дорогая механика пакета), приемлема при её условном применении."
  - "Выводы препринтов 2026 (EV-302, EV-308, EV-310) переживут рецензирование в главном."
alternatives:
  - option: "minimal — только quote-grounding (механика 1)"
    appropriate_when: "Если ресурс v0.2 мал ИЛИ ретро-эксперимент покажет полезность только quote-check: максимум прироста на единицу затрат по совокупности evidence."
  - option: "full-academic — двусторонние дебаты (защитник vs атакующий + судья) и NLI-шаги RAGChecker-стиля"
    appropriate_when: "Когда стоимость ошибок превысит стоимость двойных LLM-проходов; дебат-формат — первый кандидат на апгрейд механики 4, именно для него доказаны цифры EV-307."
risks:
  - "Verify-стадия удорожает прогон; смягчение — проверять quote у evidence с reliability high и у всех, на которые ссылается рекомендация."
  - "До v0.3 механика 1 защищает только новые evidence — старые ~30 EV остаются без quote-проверки (осознанная цена additive-констрейнта)."
  - "stdlib re-fetch (urllib) систематически не работает на JS-rendered и анти-бот источниках — механика 1 может деградировать именно на ценных внешних источниках; доля таких источников — unknown, меряется ретро-экспериментом раздельным учётом fetch-fail."
  - "Ложное спокойствие при согласии двух прогонов (коррелированные слепые пятна, EV-308) — согласие не повышает confidence по конструкции правила."
  - "Совокупная сложность 5 механик может быть избыточной для маленького модуля — см. триггер отката в preferred_option."
  - "Часть источников — свежие препринты; при провале рецензирования пересмотреть механики 4-5."
unknowns:
  - "Доля существующих evidence, не проходящих quote-check, и раздельно — доля недоступных stdlib-фетчу источников."
  - "Сохраняется ли прирост качества адверсариального ревью в формате одиночного атакующего без оппонента (EV-307 измерял другой дизайн)."
  - "Информативность правила двух прогонов на практике (частота расхождений, доля ложных срабатываний)."
proposed_validation:
  experiment: "Фальсифицируемый пилот из трёх частей: (1) механика 1 — ретро-прогон verify_quotes.py по ~30 EV с РАЗДЕЛЬНЫМ учётом fetch-fail vs quote-mismatch; порог полезности: quote-mismatch при успешном fetch >=10%; при провале порога v0.2 выходит без verify-скрипта (quote остаётся optional-полем на будущее) — ветка 'minimal' в этом случае пуста и это осознано; (2) механика 4 — судья-атакующий на 2 отревьюированных DP (DP-102, DP-103) против спот-чека человека; два порога: >=2 подтверждённых дефекта суммарно И доля подтверждённых findings >=50% (контроль precision); при <2 суммарных дефектов результат трактуется как 'неопределён', не как провал судьи; (3) механика 5 — 5 проб grep-протокола memory_check по known-items из существующих EV: recall >=4/5. Механики 2 и 3б — валидация ОТЛОЖЕНА осознанно (следующий deep-прогон замеряет частоту расхождений двух синтезов и долю claims, верифицируемых по одному фрагменту при спот-чеке; пороги зададим по первым данным). Леджер — отложен до >=10 DP с outcome."

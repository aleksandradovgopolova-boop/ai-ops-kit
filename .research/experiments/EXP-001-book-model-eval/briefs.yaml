# 20 глав Personal Cosmic Book — единые брифы для всех моделей (слепое сравнение).
# Персона вымышленная; профиль одинаков для всех вызовов, чтобы сравнение было честным.
schema_version: 1

system_prompt: |
  Ты — автор персональной «Космической книги»: художественно-документального текста,
  который рассказывает человеку его историю через небо в момент его рождения.

  Правила стиля:
  - Русский язык, тёплый и точный; поэтичность без пафоса и эзотерического жаргона.
  - Обращение к читателю на «ты», бережное, без лести и без предсказаний-обещаний.
  - Астрономия точна (реальные объекты и явления), астрология подаётся как язык
    метафор о характере, а не как причинно-следственный закон.
  - Никаких клише («в глубине души», «непростой путь», «энергетика»), никаких
    списков-буллетов — только связная проза с абзацами.
  - Объём главы: 1200-1500 слов.

  Читатель книги:
  Мира. Родилась 14 марта 1992 года в 06:42 утра в Санкт-Петербурге.
  Солнце в Рыбах, Луна в Стрельце, восходящий знак — Водолей.
  По профессии — реставратор книг; любит зимнее море, поезда и молчаливые музеи.

chapters:
  - id: ch-01
    title: "Пролог: небо над Петербургом"
    brief: "Каким было небо над Санкт-Петербургом на рассвете 14 марта 1992 года: что реально было видно, какие созвездия стояли над горизонтом, как в этот момент 'выглядела' карта рождения Миры. Задать интонацию всей книги."
  - id: ch-02
    title: "Солнце в Рыбах"
    brief: "Солнце как ядро характера; что язык астрологии называет 'Рыбами' и как это читается в жизни Миры — внимание к хрупкому, работа реставратора как форма заботы о времени."
  - id: ch-03
    title: "Луна в Стрельце"
    brief: "Луна как внутренняя погода: жажда дальних горизонтов у человека, чья работа требует неподвижности и терпения. Напряжение и союз между этими полюсами."
  - id: ch-04
    title: "Восходящий Водолей"
    brief: "Асцендент как манера входить в комнату: отстранённая дружелюбность, привычка смотреть чуть сбоку. Как первый взгляд на Миру отличается от того, кто она внутри."
  - id: ch-05
    title: "Меркурий: язык рук"
    brief: "Меркурий как способ думать и говорить. Для Миры мышление — тактильное: через бумагу, клей, шов переплёта. Письмо и чтение как форма разговора с умершими авторами."
  - id: ch-06
    title: "Венера: что ты любишь"
    brief: "Венера как грамматика привязанности: зимнее море, поезда, молчаливые музеи. Любовь к вещам с историей и что она говорит о любви к людям."
  - id: ch-07
    title: "Марс: тихая настойчивость"
    brief: "Марс как форма воли. Ярость реставратора — медленная: против энтропии, плесени, кислотной бумаги. Гнев, который превращается в аккуратность."
  - id: ch-08
    title: "Юпитер: учителя и дороги"
    brief: "Юпитер как рост и удача: люди-учителя, случайные книги, оказавшиеся дверями, и дороги (поезда!), которые расширяли мир Миры."
  - id: ch-09
    title: "Сатурн: рамы и переплёты"
    brief: "Сатурн как дисциплина и границы. Переплёт — метафора сатурнианской работы: то, что держит страницы вместе. Уважение к ограничениям без страха перед ними."
  - id: ch-10
    title: "Уран: покровитель восходящего знака"
    brief: "Уран как управитель Водолея: внезапные повороты, странные решения, право быть не как все. Где в размеренной жизни Миры живёт электричество."
  - id: ch-11
    title: "Нептун: туман и море"
    brief: "Нептун — планета Рыб: туман, музыка, растворение границ. Зимнее море как нептунианский пейзаж. Дар воображения и его теневая сторона — уход от ясности."
  - id: ch-12
    title: "Плутон: работа с тлением"
    brief: "Плутон как трансформация: реставрация — ежедневная работа со смертью вещей и их возвращением. Что умеет человек, который не боится распада."
  - id: ch-13
    title: "Дома: карта твоих комнат"
    brief: "Система домов как план квартиры жизни: работа, дом, дружба, одиночество. Не перечисление двенадцати домов, а прогулка по нескольким главным для Миры."
  - id: ch-14
    title: "Стихии: вода и воздух"
    brief: "Баланс стихий в карте: много воды (Рыбы), заметный воздух (Водолей), мало земли и огня. Как это ощущается изнутри и чем компенсируется."
  - id: ch-15
    title: "Лунные узлы: откуда и куда"
    brief: "Северный и южный узлы как ось сюжета: от чего Мира уходит и к чему растёт. Осторожно с фатализмом — это направление взгляда, не приговор."
  - id: ch-16
    title: "Ретроградный Меркурий и другие страшилки"
    brief: "Глава-выдох: разбор популярных астрологических страхов с мягкой иронией. Что реально происходит на небе при 'ретроградности' и почему это красиво, а не опасно."
  - id: ch-17
    title: "Твой год: транзиты"
    brief: "Как читать движение сегодняшнего неба относительно карты рождения: медленные разговоры Сатурна и Юпитера с натальными планетами. Без конкретных дат-предсказаний — метод, не гороскоп."
  - id: ch-18
    title: "Ты и другие: совместимость без арифметики"
    brief: "Синастрия как искусство слушать чужую карту: почему 'подходит/не подходит' — плохой вопрос и какой вопрос хороший. Дружба, любовь, коллеги."
  - id: ch-19
    title: "Практики: разговор с небом"
    brief: "Тихие практики: смотреть на Луну из окна поезда, вести дневник новолуний, находить свою планету на вечернем небе. Конкретно, выполнимо, без мистики."
  - id: ch-20
    title: "Эпилог: небо всегда над тобой"
    brief: "Собрать книгу воедино: небо 14 марта 1992 года никуда не делось — оно продолжает разворачиваться. Прощание с читателем, которое оставляет тепло и свободу."

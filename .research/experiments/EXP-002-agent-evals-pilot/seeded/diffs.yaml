  - id: d07
    context: "хелпер пагинации"
    diff: |
      +def paginate(items, page, per_page=20):
      +    if page < 1:
      +        raise ValueError('page must be >= 1')
      +    start = (page - 1) * per_page
      +    return items[start:start + per_page]
      +
      +def test_paginate():
      +    assert paginate(list(range(50)), 1) == list(range(20))
      +    assert paginate(list(range(50)), 3) == list(range(40, 50))
      +    with pytest.raises(ValueError):
      +        paginate([], 0)

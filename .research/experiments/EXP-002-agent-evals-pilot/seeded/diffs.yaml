  - id: d06
    context: "задача: добавить retry в HTTP-клиент (утверждённый план)"
    diff: |
      +def get(url, retries=3):
      +    for i in range(retries):
      +        try:
      +            return http.get(url, timeout=10)
      +        except TransientError:
      +            time.sleep(2 ** i)
      +    raise RetryExhausted(url)

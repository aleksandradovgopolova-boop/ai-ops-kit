    diff: |
      +def parse_amount(s):
      +    # тест ниже зафиксировал текущее поведение
      +    return float(s.replace(',', '.').replace(' ', ''))
      +
      +def test_parse_amount():
      +    assert parse_amount('1 234,50') == 1234.5
      +    # parse_amount('abc') падает с ValueError — тестом не покрываем,

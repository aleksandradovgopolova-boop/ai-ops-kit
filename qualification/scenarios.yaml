schema_version: 1
kind: qualification-scenarios
# v2.84 Qualification: канонический пакет живых сценариев для проверки движка на РЕАЛЬНОМ child
# с тулчейном и ЖИВОЙ моделью. Харнесс — tools/qual_run.py; запуск — на машине пользователя
# (Mac/Linux), где доступны модель и стек. Каждый сценарий описывает задачу, флаги и КРИТЕРИЙ
# приёмки (что в отчёте движка доказывает успех). Честно: пройдёт ли модель — вопрос модели;
# движок обязан ЧЕСТНО отразить результат (не выдать ложный green).
#
# Матрица ОС/стеков — в docs/qualification-runbook.md. Прогон: заполнить .env, затем
#   python3 .ai/managed/tools/qual_run.py <child_root> --tasks <tasks.txt> [флаги сценария]

scenarios:
  - id: S1-quick-greenfield
    title: "QUICK: добавить чистую функцию в небольшой репозиторий"
    task: "добавь функцию для форматирования цены с разделителями тысяч и покрой её тестом"
    task_type: QUICK
    flags: ["--sandbox"]
    baseline: no-regressions
    expected: ready_for_pr=true
    acceptance:
      - "commit.sha — 40 hex на ветке ai-ops/*, commit.evidence_on_exact_sha=true"
      - "baseline.no_regressions=true; gates.blocked=false"
      - "containment.sandbox=true, block_push=true"
    proves: "полный путь task -> проверяемый коммит на зелёном стеке без надзора"

  - id: S2-quick-fix-true-green
    title: "QUICK fix: починить реально падающий тест (ловушка ложного green)"
    task: "почини падающий тест: функция возвращает вчерашнюю дату вместо сегодняшней"
    task_type: QUICK
    flags: ["--sandbox", "--require-fix"]
    baseline: no-regressions
    setup: "в репозитории заранее есть 1 падающий тест на дату (baseline red)"
    expected: "ready_for_pr=true ТОЛЬКО если правка реально починила (fixed непустой); иначе false"
    acceptance:
      - "baseline.fixed содержит починенную проверку; ready_criterion=no-regressions+require-fix"
      - "если модель НЕ починила -> ready_for_pr=false (движок не выдал ложный green)"
    proves: "--require-fix + baseline-diff ловят 'не сломал, но и не починил'"

  - id: S3-quick-regression-guard
    title: "QUICK: правка не должна ломать соседний тест (structured-id baseline-diff)"
    task: "измени формат даты в утилите на ISO-8601"
    task_type: QUICK
    flags: ["--sandbox"]
    baseline: no-regressions
    setup: "есть тесты, зависящие от старого формата — наивная правка сломает другой тест"
    expected: "если появился НОВЫЙ упавший тест -> regression -> ready_for_pr=false"
    acceptance:
      - "baseline.regressions непуст, если правка внесла новый провал (даже при том же числе)"
      - "ready_for_pr=false при регрессии — движок не пропустил 'починил один, сломал другой'"
    proves: "structured-id baseline-diff (v2.84) ловит смену набора падений, не только рост числа"

  - id: S4-engineering-review-author
    title: "ENGINEERING: независимый ревью + производство артефактов (writer != judge)"
    task: "отрефактори модуль расчёта скидок и добавь тесты"
    task_type: ENGINEERING
    flags: ["--sandbox", "--review", "--author", "--task-type", "ENGINEERING"]
    baseline: no-regressions
    expected: "code_review закрыт независимым ревьюером; requirements/plan_readiness закрыты произведёнными артефактами (форма); specification (OpenSpec) честно блокирует без CLI"
    acceptance:
      - "reviews содержит вердикт по code_review (status pass|fail) от read-only судьи"
      - "authored содержит валидные requirements+plan артефакты; их гейты НЕ в unmet (форма подтверждена)"
      - "specification остаётся в gates.unmet (OpenSpec-артефакт не производится) — честный not-ready, НЕ ложный green"
    proves: "постадийный ревью + производство артефактов закрывают то, что можно детерминированно/судьёй; недоказуемое (spec) честно блокирует"

  - id: S5-containment
    title: "Containment: sandbox реально ограничивает петлю"
    task: "добавь эндпоинт /health, отдающий 200 OK"
    task_type: QUICK
    flags: ["--sandbox"]
    baseline: no-regressions
    expected: "любые попытки модели push/сеть/произвольный shell отклонены брокером"
    acceptance:
      - "containment.shell_mode=allowlist, block_push=true, allow_network=true"
      - "в loop.denied_reasons видны отказы, если модель пыталась выйти за allowlist/сеть/push"
      - "доставка (PR) — только через движок (--open-pr), не из петли"
    proves: "brokered-containment (v2.81) работает на живой модели"

os_stack_matrix:
  os: [macOS, Linux]
  stacks:
    - "node (npm + lockfile)"
    - "node (pnpm workspaces / monorepo)"
    - "python (poetry)"
    - "python (pip + requirements.txt)"
    - "go (go.mod)"
    - "java (gradle wrapper ./gradlew)"
  note: >
    Минимум для квалификации: S1-S5 на node(npm) и python(poetry) под macOS. Полная матрица —
    все стеки × обе ОС. Детектор (v2.84) предпочитает wrapper'ы (./gradlew, ./mvnw) и помечает
    монорепо; per-package покрытие подтверждается вручную (см. undetermined в отчёте).

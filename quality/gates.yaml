# quality/gates.yaml — единый gate registry (package v0.2.0)
# Каждый gate возвращает machine-readable результат (schemas/gate-result.schema.json):
# status/blocking/tested_revision/artifact_hashes -> stale-detection.
# responsible_role read-only относительно проверяемого артефакта (write_scope ∩ reviewed = ∅).
# Расширяет config/quality-gates.yaml (фазовые списки остаются рабочими).
schema_version: 1
registry_type: quality-gates

mvp_blocking_gates:
  - intake_completeness
  - requirements
  - specification
  - plan_readiness
  - implementation_verification
  - code_review
  - security
  - spec_synchronization

gates:
  intake_completeness:
    id: intake_completeness
    purpose: Полнота intake и классификации до старта.
    stage: intake
    blocking: true
    responsible_role: intake-classifier
    review_mode: writer
    validator: validate-intake
    human_approval: false
    bypass_policy: forbidden
    applicability: [QUICK, ENGINEERING, PRODUCT, RESEARCH, VISUAL, ANALYTICS, INSIGHTS, ADOPTION, AI_FEATURE]
    stale_detection: {bind_to: intake_hash}
    required_evidence: [classified_type, size, risk]

  requirements:
    id: requirements
    purpose: Требования проверяемы, полны, тестируемы.
    stage: requirements-review
    blocking: true
    responsible_role: requirements-reviewer
    review_mode: read-only
    validator: validate-requirements
    human_approval: false
    bypass_policy: forbidden
    override_policy: {allowed: true, requires: human, records: override_reason}
    applicability: [ENGINEERING, PRODUCT]
    stale_detection: {bind_to: artifact_hashes}
    required_evidence: [testable_requirements, acceptance_scenarios]

  specification:
    id: specification
    purpose: Спецификация полна и тестируема (delta specs валидны).
    stage: specification
    blocking: true
    responsible_role: final-verifier
    review_mode: read-only
    validator: openspec-validate-strict
    human_approval: false
    applicability: [ENGINEERING, PRODUCT]
    stale_detection: {bind_to: artifact_hashes}
    required_evidence: [openspec_valid, requirements_covered]

  plan_readiness:
    id: plan_readiness
    purpose: План исполним; зависимости и write-scope определены.
    stage: plan-critique
    blocking: true
    responsible_role: plan-reviewer
    review_mode: read-only
    validator: validate-plan
    human_approval: false
    applicability: [ENGINEERING, PRODUCT]
    stale_detection: {bind_to: artifact_hashes}
    required_evidence: [work_packages, dependencies, write_scope]

  implementation_verification:
    id: implementation_verification
    purpose: Сборка/линт/тесты пройдены на конкретной ревизии.
    stage: verify
    blocking: true
    responsible_role: final-verifier
    review_mode: read-only
    validator: validate-evidence
    human_approval: false
    bypass_policy: forbidden
    applicability: [QUICK, ENGINEERING, PRODUCT, AI_FEATURE]
    stale_detection: {bind_to: tested_revision}
    required_evidence: [build_passed, lint_passed, tests_passed, tested_revision]

  code_review:
    id: code_review
    purpose: Независимое ревью кода (judge != writer).
    stage: review
    blocking: true
    responsible_role: code-reviewer
    review_mode: read-only
    human_approval: false
    applicability: [ENGINEERING]
    stale_detection: {bind_to: tested_revision}
    required_evidence: [reviewed_revision, blockers_closed]

  security:
    id: security
    purpose: Проверка безопасности; блокирует рискованные/необратимые изменения.
    stage: review
    blocking: true
    responsible_role: security-reviewer
    review_mode: read-only
    human_approval: {required_when: [privileged, destructive, secret_boundary_change]}
    applicability: [ENGINEERING, CRITICAL, INCIDENT]
    stale_detection: {bind_to: tested_revision}
    required_evidence: [no_secrets, no_injection_surface, deps_approved]

  spec_synchronization:
    id: spec_synchronization
    purpose: Delta specs синхронизированы с main specs (детерминированный CLI).
    stage: sync
    blocking: true
    responsible_role: documentation-steward
    review_mode: writer
    validator: openspec-validate-and-guard
    human_approval: false
    applicability: [ENGINEERING, PRODUCT]
    stale_detection: {bind_to: specs_hash}
    required_evidence: [openspec_valid, no_parallel_conflict]

  # --- non-blocking / для будущих workflow (объявлены) ---
  evidence:
    id: evidence
    purpose: Каждый существенный вывод имеет источник и статус.
    stage: fact-check
    blocking: true
    responsible_role: final-verifier
    review_mode: read-only
    applicability: [RESEARCH, INSIGHTS]
    required_evidence: [source_per_claim, capability_status]
  stakeholder_readiness:
    id: stakeholder_readiness
    purpose: Материал готов к передаче стейкхолдерам.
    stage: stakeholder-handoff
    blocking: false
    responsible_role: product-manager
    review_mode: read-only
    applicability: [PRODUCT]
  documentation_drift: {id: documentation_drift, blocking: false, responsible_role: documentation-steward, review_mode: writer, applicability: [all]}
  archive_readiness:
    id: archive_readiness
    purpose: Изменение архивируется только если проверено.
    stage: archive
    blocking: true
    responsible_role: final-verifier
    review_mode: read-only
    validator: validate-archive-readiness
    applicability: [all]
    required_evidence: [all_blocking_gates_pass, no_stale_gate]

  # --- Ф1 roadmap (v1.3): gates полного продуктового цикла ---
  # Ф3 (v1.5): discovery_completeness / ux_review / design_system_usage / analytics_readiness
  # переведены в blocking (их applicability целиком в PRODUCT/VISUAL/ANALYTICS).
  # documentation_updated / release_safety / observability_readiness остаются non-blocking:
  # они применимы и к QUICK/ENGINEERING — перевод после обкатки в этих workflow.
  discovery_completeness:
    id: discovery_completeness
    purpose: Discovery завершён — проблема, аудитория, гипотезы и метрики успеха зафиксированы.
    stage: discovery-review
    blocking: true
    responsible_role: product-reviewer
    review_mode: read-only
    applicability: [PRODUCT]
    stale_detection: {bind_to: artifact_hashes}
    required_evidence: [problem_statement, target_users, hypotheses, success_metrics]

  ux_review:
    id: ux_review
    purpose: UX проверен — flow, состояния Empty/Loading/Error/Success, responsive, copy.
    stage: design-review
    blocking: true
    responsible_role: ux-reviewer
    review_mode: read-only
    checklist: rules/design/ux-heuristics.yaml
    applicability: [PRODUCT, VISUAL]
    stale_detection: {bind_to: artifact_hashes}
    required_evidence: [ux_flow, screen_states, responsive_checked, copy_reviewed]

  design_system_usage:
    id: design_system_usage
    purpose: Использована дизайн-система — существующие компоненты и токены; новые обоснованы.
    stage: design-system-review
    blocking: true
    responsible_role: design-system-reviewer
    review_mode: read-only
    checklist: rules/design/design-system-checklist.yaml
    source_of_truth: context/product/DesignSystem.md
    applicability: [PRODUCT, VISUAL]
    stale_detection: {bind_to: artifact_hashes}
    required_evidence: [components_from_design_system, new_components_justified]

  analytics_readiness:
    id: analytics_readiness
    purpose: Аналитика описана — tracking plan, event schema, метрики и dashboard-спецификация.
    stage: analytics-review
    blocking: true
    responsible_role: analytics-reviewer
    review_mode: read-only
    source_of_truth: context/product/MetricCatalog.md
    applicability: [PRODUCT, ANALYTICS, ADOPTION]
    stale_detection: {bind_to: artifact_hashes}
    required_evidence: [tracking_plan, event_schema, product_metrics, dashboard_spec, events_verified_live]

  documentation_updated:
    id: documentation_updated
    purpose: Документация обновлена вместе с изменением (Definition of Done).
    stage: result
    blocking: false
    responsible_role: documentation-steward
    review_mode: writer
    applicability: [QUICK, ENGINEERING, PRODUCT, VISUAL, ANALYTICS, ADOPTION]
    stale_detection: {bind_to: tested_revision}
    required_evidence: [docs_updated_or_explicit_none, release_notes_entry]

  release_safety:
    id: release_safety
    purpose: Релиз безопасен — feature flag предусмотрен, rollback описан, rollout спланирован.
    stage: release
    blocking: false
    responsible_role: release-manager
    review_mode: read-only
    applicability: [ENGINEERING, PRODUCT]
    stale_detection: {bind_to: tested_revision}
    required_evidence: [feature_flag_or_justified_absence, rollback_strategy, rollout_plan]

  ai_eval:
    id: ai_eval
    purpose: AI-фича прошла eval'ы против success criteria; guardrails и регрессии проверены.
    stage: verify
    blocking: true
    applies_when: "функция содержит LLM/агентный компонент, видимый пользователю; иначе гейт неприменим"
    responsible_role: ai-evaluator
    review_mode: read-only
    checklist: rules/ai/EvalPolicy.md
    applicability: [ENGINEERING, PRODUCT, VISUAL, AI_FEATURE]
    stale_detection: {bind_to: artifact_hashes}
    required_evidence: [success_criteria, eval_dataset, offline_results, guardrails, regression_checked]

  ai_red_team:
    id: ai_red_team
    purpose: AI-фича проверена адверсариально — инъекции, jailbreak, утечки PII/промпта, границы агентности.
    stage: red-team
    blocking: false
    applies_when: "LLM/агентный компонент, доступный пользователю; иначе гейт неприменим"
    responsible_role: ai-red-teamer
    review_mode: read-only
    checklist: rules/ai/red-team-checklist.yaml
    applicability: [AI_FEATURE, ENGINEERING, PRODUCT]
    stale_detection: {bind_to: tested_revision}
    required_evidence: [attack_scenarios_run, injection_resistance, pii_leak_checked, blockers_closed]

  observability_readiness:
    id: observability_readiness
    purpose: Мониторинг определён — логи, метрики, алерты, SLO для нового поведения.
    stage: release
    blocking: false
    responsible_role: observability-reviewer
    review_mode: read-only
    applicability: [ENGINEERING, PRODUCT]
    stale_detection: {bind_to: tested_revision}
    required_evidence: [logging_defined, metrics_defined, alerts_defined, slo_defined]

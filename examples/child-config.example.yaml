# .ai-ops.yaml — заготовка child-конфига (создаётся ai-ops init, отредактируйте под проект)
schema_version: 1
kind: ai-ops-child-config
parent:
  source: git+<ai-ops-kit-repo-url>
  installed_version: 0.7.0
  allowed_version_range: ">=0.7.0 <1.0.0"
  update_channel: stable
  update_policy: pr
  auto_update: false
project:
  name: <project-name>
  documentation_language: ru
  confidentiality_policy: internal
presets: {enabled: []}
adapters: {enabled: [claude-code, codex, generic]}
providers:
  default: anthropic
  configured:
    - {id: anthropic, credentials_ref: "env:ANTHROPIC_API_KEY"}
    - {id: openai, credentials_ref: "env:OPENAI_API_KEY"}
  fallback_chain: [anthropic, openai]
runtimes: {default: claude-code, configured: [claude-code, codex, generic-orchestrator]}
openspec: {enabled: false, profile: core, schema: spec-driven}
agents: {source: parent-package, disabled: [], custom: []}
workflows:
  mappings: {bug: QUICK, feature: ENGINEERING, discovery: PRODUCT, research: RESEARCH}
quality_gates:
  blocking: [intake_completeness, requirements, specification, plan_readiness, implementation_verification, code_review]
  overrides: []
routing_policy: default
approval_policy: {human_approval_required_for: [protected_paths, destructive]}
overlays: {project: .ai/project/, custom: .ai/custom/}
protected_paths: [.github/workflows/]
confidentiality_policy: {send_code_to_external_provider: allowed}

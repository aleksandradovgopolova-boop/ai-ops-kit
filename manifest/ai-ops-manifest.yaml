      - "остальная live RC (v2.122): sanity 7/7; провайдер-гэп v2.120 закрыт (model==deepseek-chat везде); v2.121 approval_recheck.ok + review exit-код подтверждены вживую; S1/S2/S4/S6/S7/S9 PASS (S9 — реальный draft PR, base=default_branch)"
    fixed_v2_121_spec_and_approval_binding:
      - "P1.1 спека обязательна ДО tool loop для heavy (ENGINEERING/PRODUCT/CRITICAL): preflight.assess получил author-параметр и правило author-or-spec — heavy без spec.yaml и без --author блокируется (spec-first ДО реализации, не только доставки); с --author движок авторизует спеку пре-стадией, а артефакт-гейты specification/requirements всё равно проверят её готовность; QUICK остаётся light. Тесты: heavy без спеки/без author -> blocked; c author -> spec-гейт пройден; QUICK -> не блокирует. Ripple: review_branch/executor/PQ9 heavy-прогоны переведены на author=True"

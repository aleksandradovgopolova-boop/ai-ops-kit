      - "P1.3 review как lifecycle-событие (раньше — диагностика, слово ревьюера ни на что не влияло). review_branch.review пере-считывает готовность к merge (readiness.ready_for_merge: True только при вердикте pass / no-ai-review-gates) и ФИКСИРУЕТ вердикт артефактом features/<wid>/branch-review.yaml (verdict/statuses/changed_files/readiness/created_at). Exit-код review (CLI и модуль) = ready_for_merge -> needs-reviewer/needs-changes теперь non-zero (раньше needs-reviewer считался ok)"

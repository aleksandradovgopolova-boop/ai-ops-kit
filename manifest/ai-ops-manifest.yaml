    fixed_v2_118_prepare_false_negative:
      - "FINDING ЖИВОГО ПРОГОНА (DeepSeek/Mac, S1/S2): движок отработал ЧЕСТНО (модель написала код, test=pass, evidence на точном SHA, регрессий нет, все гейты пройдены), но ready_for_pr=false держал ЕДИНСТВЕННО provale install-команды стека. prepare: `pip install -e .` -> exit 1 'Failed to build editable' (фикстура/репо не является устанавливаемым пакетом), при этом pytest прошёл. P0.6-инвариант блокировал ready по экзит-коду install, хотя окружение доказанно рабочее (проверки отработали) — false-negative"

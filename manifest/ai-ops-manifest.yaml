    fixed_v2_98_adaptive_spec_first:
      - "этап 2 Adaptive Spec-First: tools/spec_levels.py выбирает глубину спецификации L0 QUICK / L1 ENGINEERING / L2 PRODUCT / L3 CRITICAL детерминированно из сигналов (базовый уровень по task_type + эскалация по риску/необратимости/secret_boundary/измеримому польз.изменению). Разделы КУМУЛЯТИВНЫ (уровень N включает всё <= N)"

# ai-ops-manifest.yaml — central manifest пакета AI-first системы
# Bootstrap v0.1.0 (первый change package: structured registry + manifest).
# Аддитивно: тела агентов/workflow не менялись, файлы не перемещались.
# Полная целевая архитектура — audit/ai-ops-target-v2/.
schema_version: 1
kind: ai-ops-manifest

ai_ops:
  package_version: 2.18.0
  schema_version: 1
  minimum_runtime_contract: 1

spec_protocol:
  engine: openspec
  version_range: ">=1.5.0 <2.0.0"          # проверено на 1.5.0 (openspec validate --strict)
  dependency_strategy: cli-and-protocol      # вызываем CLI + читаем markdown; не импорт
  status: integrated
  enabled_by_default: true                   # включено по умолчанию; выключается в child флагом openspec.enabled
  opt_out_flag: ".ai-ops.yaml -> openspec.enabled: false"
  requires_runtime: node                      # для не-Node репо — контейнер/вложенный CLI
  deterministic_operations: [validate, archive, sync]   # выполняет CLI, не LLM
  extension_schemas: [openspec/schemas/product, openspec/schemas/research]
  change_template: openspec/change-template/
  example: examples/openspec-demo/            # проходит openspec validate --all --strict
  parallel_merge_guard: validation/validate_openspec_change.py
  fallback: [pin-version, fork-mit, our-format-validator]

registries:
  agents: registry/agents.yaml
  workflows: registry/workflows.yaml          # MVP: QUICK/ENGINEERING/PRODUCT/RESEARCH
  quality_gates: quality/gates.yaml           # единый gate registry
  capability_index: registry/capability-index.yaml
  routing: config/model-routing.yaml          # расширяется на Ф6
  entities: registry/entities.yaml            # Knowledge Graph: типы и связи (v2.0)
  skills_catalog: registry/skills-catalog.yaml # v2.12: внешние скиллы (declared), ставятся на уровне child

workflows:
  mvp: [QUICK, ENGINEERING, PRODUCT, RESEARCH]
  extended: [VISUAL, ANALYTICS, INSIGHTS, ADOPTION, AI_FEATURE, DECISION, CRITICAL]   # v1.3 + v2.0 + v2.1 + AI Product Pack (v2.4) + Decision Intelligence (v2.10) + CRITICAL (цель critical-эскалации)

skills:
  # Скиллы, которые поставляет сам кит (грузятся в .claude/skills/ у child).
  # Первый — v2.7. Внешний deep-research остаётся встроенным скиллом раннера.
  shipped:
    - id: product-session-review        # v2.7, opt-in; used_by INSIGHTS.data-collection, user-researcher
      path: skills/product-session-review/SKILL.md
      opt_in: true
      checklist: rules/research/session-review.yaml
    - id: system-constraint-analysis    # v2.8, opt-in; used_by INSIGHTS.insight-synthesis, product-analyst
      path: skills/system-constraint-analysis/SKILL.md
      opt_in: true
      checklist: rules/thinking/constraint-analysis.yaml
    - id: contradiction-resolution      # v2.8, opt-in; used_by PRODUCT.specification, solution-architect
      path: skills/contradiction-resolution/SKILL.md
      opt_in: true
      checklist: rules/thinking/contradiction-resolution.yaml
    - id: decision-support              # v2.10, opt-in; used_by workflow DECISION, product-manager/product-reviewer
      path: skills/decision-support/SKILL.md
      opt_in: true
      checklist: rules/thinking/decision-support.yaml
    - id: frontend-design               # v2.11, opt-in; used_by VISUAL (ux-flow/implementation), ui-ux-designer
      path: skills/frontend-design/SKILL.md
      opt_in: true
      checklist: rules/design/frontend-design.yaml
    - id: e2e-browser-testing           # v2.11, opt-in; used_by verify (VISUAL/PRODUCT/ENGINEERING/AI_FEATURE)
      path: skills/e2e-browser-testing/SKILL.md
      opt_in: true
      checklist: rules/quality/e2e-baseline.yaml
    - id: user-documentation            # v2.13, opt-in; used_by ADOPTION.user-docs, documentation-steward
      path: skills/user-documentation/SKILL.md
      opt_in: true
      checklist: rules/documentation/user-docs.yaml
    - id: product-demo-video            # v2.13, opt-in; used_by ADOPTION.adoption-plan; захват на Playwright
      path: skills/product-demo-video/SKILL.md
      opt_in: true
      checklist: rules/content/demo-video.yaml
  authoring_convention: rules/meta/skill-authoring.yaml   # v2.11: конвенция авторинга (из skill-creator)

quality_gates:
  mvp_blocking: [intake_completeness, requirements, specification, plan_readiness,
                 implementation_verification, code_review, security, spec_synchronization]
  mvp_blocking_max: 8

agents:
  registered: 51             # 38 (v1.0) + 7 ревьюеров (v1.4) + 3 research-pack (v2.1) + 3 AI Product Pack (v2.4)
  core_target: 12            # целевой минимальный CORE после merge (Ф2-3)
  core_target_note: >
    В реестре 16 файлов с target_layer=core: 10 сохраняемых + 3 новых (create) + 3 merge-источника
    (repository-explorer, system-analyst, business-analyst). После merge источники схлопываются
    в context-builder и requirements-writer, давая итоговые 12 core-агентов.

providers:
  status: integrated          # Ф6: реестры + декларативный routing + self-test
  registry: registry/providers.yaml
  models: registry/models.yaml
  runtimes: registry/runtimes.yaml
  tools: registry/tools.yaml
  capability_index: registry/capability-index.yaml
  routing_policy: registry/routing-policy.yaml
  routing_engine: validation/ai_route.py
  capability_selftest: validation/ai_capability_selftest.py
  first_class: [anthropic, openai]
  planned: [gigachat]         # опциональный провайдер на будущее (config-switch, без ключей сейчас)
  no_secrets: true            # только имена env-переменных / secret-reference

knowledge_integrity:
  # v2.9: drift-control (идея team-os-toolkit), наведённый сначала на сам пакет.
  status: integrated
  references_validator: validation/validate_references.py    # uses_skills/checklist/owner/gate резолвятся
  claims: knowledge/claims.yaml                              # утверждения документации о коде
  claims_validator: validation/validate_claims.py            # типы: file-exists, symbol-exists, enum-values
  freshness_policy: rules/core/FreshnessPolicy.md            # классы stable/evolving/volatile
  freshness_validator: validation/validate_freshness.py
  gates: [knowledge_integrity, knowledge_freshness]           # non-blocking до обкатки
  child_claims_path: ".ai/project/knowledge/claims.yaml"      # где child хранит свои claims

governance:
  information_boundaries: governance/information-boundaries.md   # что можно/нельзя хранить (v2.9)

unified_product_path:
  # v2.17: единый продуктовый путь — одна сущность связывает два прежде раздельных
  # контура (прогон workflow и Feature Blueprint) одним id и одним статусом.
  status: integrated
  entity: tools/workitem.py                    # start (routing->blueprint->run) + status
  schema: schemas/workitem.schema.json
  entry_point: commands/task/ai-start-task.md  # единственная точка входа -> создаёт WorkItem
  record: "features/<id>/workitem.yaml"        # в child; один id = id фичи
  single_status: [done, blocked, needs_human_decision, needs_more_evidence]
  status_source: [tools/gate_executor.py, tools/run_report.py]   # детерминированный вывод

decision_intelligence:
  # v2.10: Decision Intelligence (идея team-os-toolkit init-team-decisions).
  status: integrated
  registry: decisions/registry.yaml                    # принципы + эпизоды + исходы
  schema: schemas/decisions-registry.schema.json
  validator: validation/validate_decisions.py
  skill: skills/decision-support/SKILL.md              # recommendation-first + one-way-door
  workflow: DECISION
  gate: decision_quality                                # non-blocking до обкатки
  child_registry_path: ".ai/project/decisions/registry.yaml"

security_policies:
  permission_levels: security/permission-levels.yaml   # 6 уровней
  protected_paths: config/protected-paths.yaml
  boundary_model: security/boundary-model.md
  secrets_in_repo: forbidden

update_policy:
  silent_update: forbidden
  updater: installer/ai_ops.py            # ai-ops status/diff/update/init/validate/doctor/migrate/verify-capabilities
  managed_set:                             # что копируется в .ai/managed при install/update
    - "registry/*.yaml"
    - "quality/gates.yaml"
    - "schemas/*.json"
    - "security/permission-levels.yaml"
    - "security/boundary-model.md"
    - "manifest/ai-ops-manifest.yaml"
    # полные контракты, на которые ссылаются реестры: тела агентов, правила/чек-листы,
    # шаблоны артефактов, контекст, прозаические workflow/команды — иначе registry
    # ссылается на файлы (agents/core/*.md, rules/**, templates/**), которых в child нет.
    - "agents/**/*.md"
    - "rules/**/*"
    - "templates/**/*"
    - "context/**/*"
    - "workflows/*.md"
    - "commands/**/*.md"
  managed_paths: [".ai/managed/**"]
  protected_paths: [".ai/project/**", ".ai/custom/**"]
  generated_paths: [".ai/generated/**"]
  runtime_paths: [".ai/runtime/**"]
  provenance: ".ai/managed/.provenance.json"
  checksums: ".ai/managed/.checksums.json"
  update_lock: ".ai/managed/.update-lock"
  drift_detection: "validation/ai_managed_checksums.py verify"
  example_install: "examples/child-install/"

package_migrations:
  chain: []                  # первый релиз; цепочка появится с 0.1.0-to-0.2.0

contracts_dir: schemas/
compatibility_check: python3 validation/validate_ai_first_registry.py

# ai-ops-manifest.yaml — central manifest пакета AI-first системы
# Bootstrap v0.1.0 (первый change package: structured registry + manifest).
# Аддитивно: тела агентов/workflow не менялись, файлы не перемещались.
# Полная целевая архитектура — audit/ai-ops-target-v2/.
schema_version: 1
kind: ai-ops-manifest

ai_ops:
  package_version: 2.74.0
  schema_version: 1
  minimum_runtime_contract: 1

spec_protocol:
  engine: openspec
  version_range: ">=1.5.0 <2.0.0"          # проверено на 1.5.0 (openspec validate --strict)
  dependency_strategy: cli-and-protocol      # вызываем CLI + читаем markdown; не импорт
  status: integrated
  enabled_by_default: true                   # включено по умолчанию; выключается в child флагом openspec.enabled
  opt_out_flag: ".ai-ops.yaml -> openspec.enabled: false"
  requires_runtime: node                      # для не-Node репо — контейнер/вложенный CLI
  deterministic_operations: [validate, archive, sync]   # выполняет CLI, не LLM
  extension_schemas: [openspec/schemas/product, openspec/schemas/research]
  change_template: openspec/change-template/
  example: examples/openspec-demo/            # проходит openspec validate --all --strict
  parallel_merge_guard: validation/validate_openspec_change.py
  fallback: [pin-version, fork-mit, our-format-validator]

registries:
  agents: registry/agents.yaml
  workflows: registry/workflows.yaml          # MVP: QUICK/ENGINEERING/PRODUCT/RESEARCH
  quality_gates: quality/gates.yaml           # единый gate registry
  capability_index: registry/capability-index.yaml
  routing: config/model-routing.yaml          # расширяется на Ф6
  entities: registry/entities.yaml            # Knowledge Graph: типы и связи (v2.0)
  skills_catalog: registry/skills-catalog.yaml # v2.12: внешние скиллы (declared), ставятся на уровне child

workflows:
  mvp: [QUICK, ENGINEERING, PRODUCT, RESEARCH]
  extended: [VISUAL, ANALYTICS, INSIGHTS, ADOPTION, AI_FEATURE, DECISION, CRITICAL]   # v1.3 + v2.0 + v2.1 + AI Product Pack (v2.4) + Decision Intelligence (v2.10) + CRITICAL (цель critical-эскалации)

skills:
  # Скиллы, которые поставляет сам кит (грузятся в .claude/skills/ у child).
  # Первый — v2.7. Внешний deep-research остаётся встроенным скиллом раннера.
  shipped:
    - id: product-session-review        # v2.7, opt-in; used_by INSIGHTS.data-collection, user-researcher
      path: skills/product-session-review/SKILL.md
      opt_in: true
      checklist: rules/research/session-review.yaml
    - id: system-constraint-analysis    # v2.8, opt-in; used_by INSIGHTS.insight-synthesis, product-analyst
      path: skills/system-constraint-analysis/SKILL.md
      opt_in: true
      checklist: rules/thinking/constraint-analysis.yaml
    - id: contradiction-resolution      # v2.8, opt-in; used_by PRODUCT.specification, solution-architect
      path: skills/contradiction-resolution/SKILL.md
      opt_in: true
      checklist: rules/thinking/contradiction-resolution.yaml
    - id: decision-support              # v2.10, opt-in; used_by workflow DECISION, product-manager/product-reviewer
      path: skills/decision-support/SKILL.md
      opt_in: true
      checklist: rules/thinking/decision-support.yaml
    - id: frontend-design               # v2.11, opt-in; used_by VISUAL (ux-flow/implementation), ui-ux-designer
      path: skills/frontend-design/SKILL.md
      opt_in: true
      checklist: rules/design/frontend-design.yaml
    - id: e2e-browser-testing           # v2.11, opt-in; used_by verify (VISUAL/PRODUCT/ENGINEERING/AI_FEATURE)
      path: skills/e2e-browser-testing/SKILL.md
      opt_in: true
      checklist: rules/quality/e2e-baseline.yaml
    - id: user-documentation            # v2.13, opt-in; used_by ADOPTION.user-docs, documentation-steward
      path: skills/user-documentation/SKILL.md
      opt_in: true
      checklist: rules/documentation/user-docs.yaml
    - id: product-demo-video            # v2.13, opt-in; used_by ADOPTION.adoption-plan; захват на Playwright
      path: skills/product-demo-video/SKILL.md
      opt_in: true
      checklist: rules/content/demo-video.yaml
    - id: repo-onboarding               # v2.22, opt-in; первичный онбординг репо -> черновики context/*
      path: skills/repo-onboarding/SKILL.md
      opt_in: true
      checklist: rules/meta/repo-onboarding.yaml
  authoring_convention: rules/meta/skill-authoring.yaml   # v2.11: конвенция авторинга (из skill-creator)

quality_gates:
  mvp_blocking: [intake_completeness, requirements, specification, plan_readiness,
                 implementation_verification, code_review, security, spec_synchronization]
  mvp_blocking_max: 8
  # Честность пути исполнения (self-audit v2.67): 7 из 8 MVP-blocking гейтов enforced per-task
  # gate_executor'ом через workflow.quality_gates/треки; spec_synchronization — детерминированный
  # OpenSpec-гейт, enforced OpenSpec CLI + validation/validate_openspec_change.py в CI
  # (gate.enforced_by=openspec-ci-guard), НЕ per-task прогоном. validate_workflow_gates теперь
  # ERROR'ит недостижимый MVP-blocking гейт (orphan-guard), так что этот класс дрифта не повторится.
  enforced_by_ci_guard: [spec_synchronization, archive_readiness]
  count_pinned_by_claims: [gate-count, mvp-blocking-count]   # knowledge/claims.yaml (тип count)

agents:
  registered: 51             # 38 (v1.0) + 7 ревьюеров (v1.4) + 3 research-pack (v2.1) + 3 AI Product Pack (v2.4)
  core_target: 12            # целевой минимальный CORE после merge (Ф2-3)
  core_target_note: >
    В реестре 16 файлов с target_layer=core: 10 сохраняемых + 3 новых (create) + 3 merge-источника
    (repository-explorer, system-analyst, business-analyst). После merge источники схлопываются
    в context-builder и requirements-writer, давая итоговые 12 core-агентов.

providers:
  status: integrated          # Ф6: реестры + декларативный routing + self-test
  registry: registry/providers.yaml
  models: registry/models.yaml
  runtimes: registry/runtimes.yaml
  tools: registry/tools.yaml
  capability_index: registry/capability-index.yaml
  routing_policy: registry/routing-policy.yaml
  routing_engine: validation/ai_route.py
  capability_selftest: validation/ai_capability_selftest.py
  first_class: [anthropic, openai]
  live_executor_providers: [anthropic, openai, openai-compatible]  # v2.39: openai-compatible (DeepSeek/local) через OPENAI_COMPATIBLE_BASE_URL+ключ
  planned: [gigachat]         # опциональный провайдер на будущее (config-switch, без ключей сейчас)
  no_secrets: true            # только имена env-переменных / secret-reference

knowledge_integrity:
  # v2.9: drift-control (идея team-os-toolkit), наведённый сначала на сам пакет.
  status: integrated
  references_validator: validation/validate_references.py    # uses_skills/checklist/owner/gate резолвятся
  claims: knowledge/claims.yaml                              # утверждения документации о коде
  claims_validator: validation/validate_claims.py            # типы: file-exists, symbol-exists, enum-values, count (v2.67)
  python_compat_validator: validation/validate_python_compat.py  # v2.69: PEP 604 union без future-import ломает <3.10
  freshness_policy: rules/core/FreshnessPolicy.md            # классы stable/evolving/volatile
  freshness_validator: validation/validate_freshness.py
  gates: [knowledge_integrity, knowledge_freshness]           # non-blocking до обкатки
  child_claims_path: ".ai/project/knowledge/claims.yaml"      # где child хранит свои claims

execution_engine:
  # v2.31 Ф0 (correctness&safety) + v2.32 Ф1 (RunPlan + base_workflow/tracks).
  status: partial
  phase0_done: [ai-start-task-drift, security-in-engineering, ai_red_team-blocking, audit-log-redaction, per-workitem-state]
  run_plan:
    schema: schemas/run-plan.schema.json
    tool: tools/run_plan.py                 # plan (base_workflow + tracks -> gates) / validate
    tracks_registry: registry/tracks.yaml   # трек -> signal -> gates (Design/Analytics/Docs by Default)
    child_path: "features/<id>/run-plan.yaml"
  phase1_done: [run-plan-tracks, structured-reviewer-outputs, per-gate-evidence-schema]
  reviewer_result_schema: schemas/reviewer-result.schema.json   # источник истины вместо regex
  reviewer_result_validator: validation/validate_reviewer_result.py
  project_detector:                         # v2.41 (P0#5 аудита): stack-aware evidence
    tool: tools/project_detector.py          # detect -> RepositoryProfile (стек, команды build/lint/test)
    schema: schemas/repository-profile.schema.json
    child_path: ".ai/project/RepositoryProfile.yaml"
    note: "детерминированно из манифестов; неопределённое -> undetermined; status draft (человек подтверждает)"
  evidence_collector:                       # v2.44: детерминированный stack-aware сбор evidence
    tool: tools/evidence_collector.py        # RepositoryProfile -> прогон команд через Broker -> gate evidence
    feeds_gate: implementation_verification  # по evidence_schema (build/lint/typecheck/tests)
    invariant: "вердикт = exit_code реальной команды (не LLM); в provided только реально прошедшие проверки"
    honesty: "команда не определена (None) -> not_run, флаг НЕ выдаётся; деструктивное отклоняет Policy"
  run_controller:                           # v2.34 Фаза 2 срез 1: единый вход задачи
    tool: tools/ai_ops_run.py                # route -> RunPlan -> WorkItem -> active-work -> exec -> report
    command: commands/task/ai-run.md
    execution: {claude-code: planned+scaffold (рантайм исполняет), generic-orchestrator: orchestrated}
  dogfood_findings:                         # v2.35: из обкатки 2.34 в ии-среде
    - planned-run НЕ материализует .ai/runtime/workitems/<id>/ (run_state — обещание пути; папку создаёт рантайм при исполнении) -> run_state_materialized в run-report
    - concurrency_preflight слеп к открытым PR без gh/токена (open_prs.status: unavailable) -> ЗАКРЫТО v2.43 REST-фоллбэком (токен из env)
    - child-CI пин kit в protected ci.yml давал трение на каждом update -> ai-ops-validate.yml: пин = installed_version из .ai-ops.yaml
  dogfood_findings_2026_07_16:              # из отчёта обкатки (кит 2.26->2.50, baseline_ready достигнут)
    - "#5 claude-code не копил историю (ad-hoc wi-<hash>) -> ЗАКРЫТО v2.51: ai-run --feature + честный док (авто только у generic-orchestrator)"
    - "#4 unknown task_type -> тяжёлый ENGINEERING для мелкой правки -> ЗАКРЫТО v2.52: size xs/small + low risk -> QUICK (ai_route)"
    - "#6 released без доказательства поставки (blueprint/reality дрейф) -> ЗАКРЫТО v2.52: validate_feature_blueprint требует хотя бы один done-артефакт при status=released"
  tool_broker:                              # v2.36 Фаза 2 срез 2: контролируемое исполнение
    tool: tools/tool_broker.py               # Policy(level/write_scope/protected) + execute + Evidence
    rule: rules/ai/ToolBrokerPolicy.md
    invariant: "execute() всегда через decide(); модель предлагает, политика решает"
    status: component-ready                  # компонент готов+тестирован; петля с живой моделью — след. шаг
    protected_paths_source: "MERGE: config/protected-paths.yaml (дефолт) + child .ai-ops.yaml protected_paths (v2.37)"
  execution_budget:                         # v2.38: жёсткий потолок прогона
    tool: tools/budget.py                    # Budget.from_dict(RunPlan.execution_budget); charge_call перед вызовом
    enforced: [max_model_calls]              # детерминировано
    declared_only: [max_cost, max_duration]  # нужен учёт токенов/времени на рантайме
    wired_into: tools/orchestrator.py        # превышение -> blocked + budget_exceeded
  tool_loop:                                # v2.42 Фаза 2 срез 3: tool-calling петля (механика)
    tool: tools/tool_loop.py                 # proposer -> Policy решает (Broker) -> Evidence -> обратно в контекст
    stop_conditions: [done, budget, max_steps]
    invariant: "запрещённое не исполняется, а возвращается модели как DENIED (само-коррекция)"
    status: component-ready                  # МЕХАНИКА детерминирована и тестируется offline (mock-предложитель)
    verified_offline: true                   # selftest: write в scope / denied вне scope / shell / done / budget / max_steps
    live_mechanics_verified: true            # v2.42 живой прогон на DeepSeek (openai-compatible): реальные JSON-предложения
    live_verified_evidence:                  #   распарсились и исполнились, denied=0 (scope соблюдён)
      provider: openai-compatible
      model: deepseek-chat
      run_v2_42_0: "task=создать src/add.py; 6/6 write, denied=0, stopped=budget — модель зациклилась на write"
      fix: "v2.42.1 усилил промпт предложителя (не повторять сделанное; после записи -> проверка -> done)"
      run_v2_42_2: "тот же task после фикса: write -> shell(проверка) -> done; steps=3, executed=2, denied=0, stopped=done"
    live_proposal_quality: verified          # v2.42.2: живая модель сходится (write->verify->done), не зацикливается
    live_path: "make_model_proposer(make_provider('openai-compatible', <model>)) — swap провайдера"
  phase2_done: [run-controller, tool-broker, execution-budget, tool-loop-live-verified]  # v2.42.2: петля подтверждена живьём
  phase3_done: [preflight-github-rest, stack-aware-evidence-collector]  # v2.43 + v2.44
  release_3_0:                              # docs/3.0-design.md; запускается по явному решению
    design: docs/3.0-design.md
    packages_declared: packages/            # v2.46 (срез 0): 5 деклараций границ, БЕЗ переноса файлов
    boundary_validator: validation/validate_package_boundaries.py  # DAG + непересечение + резолв
    slice0_done: true                       # границы объявлены и стережутся валидатором
    slice1_done: true                       # v2.47: ai-run — канонический вход; ai-start-task — совместимый алиас
    canonical_entry: commands/task/ai-run.md  # генерируется в раннтайм (generate_runtime.render_ai_run)
    alias_retained: commands/task/ai-start-task.md  # снятие не раньше 4.0
    slice2_done: true                       # v2.48: по-пакетная установка (installer фильтрует managed_set)
    per_package_install:
      config_field: ".ai-ops.yaml -> packages: [список]"   # отсутствует -> все (обратная совместимость)
      rule: "неназначенный пакету файл ставится всегда (до физразноса); аддитивно"
    additive_complete: true                 # v2.49: срезы 0–2 дают всю пользу пакетов без переноса
    physical_split_deferred_to: "3.1"       # решение decisions ep-2026-07-16-tree-split
    deferral_reason: "перенос ломает CI-контракт установленных child (/tmp/ai-ops-kit/installer|validation пути); польза (гранулярная установка) уже дана; разнос оправдан только раздельной дистрибуцией (3.1)"
  not_yet:                                  # 3.1 (breaking) — при раздельной дистрибуции пакетов
    - "3.1: физический разнос дерева по packages/<name>/ + энтрипойнт-шимы + миграция child-CI + MIGRATION_GUIDE"
  execution_audit_2026_07_16:               # внешний аудит исполнения (решение ep-2026-07-16-execution-audit)
    honest_status: >
      Execution engine СОБРАН (execution_pipeline: detect->tool-loop->commit->evidence на точном
      SHA->RunPlan-гейты->draft PR), подключён к контроллеру (ai-ops run --engine pipeline) и
      экспериментально подтверждён живьём на ОГРАНИЧЕННОМ QUICK-сценарии (DeepSeek, пустой репо).
      Канонический путь task -> безопасный проверяемый draft PR для РЕАЛЬНЫХ child-репозиториев
      (с тулчейном, живым draft PR, standalone-установкой движка) ещё НЕ готов — см. p0_backlog.
      Trust boundary усилена (v2.66): shell timeout + честная граница «shell не песочница»,
      валидация WorkItem ID и containment worktree-путей, полный SHA + tree-clean-проверка,
      строгий ready_for_pr (только реальный коммит), рабочий print_human/exit-code для pipeline.
    fixed_v2_53:
      - "SECURITY path traversal в Tool Broker: decide() запрещает ../ и абсолютный путь; execute() containment-guard (resolve под root)"
      - "tool-loop слепота: содержимое read и вывод shell (output_tail) теперь идут обратно в контекст модели"
    fixed_v2_54:
      - "RunPlan-гейты исполняются в прогоне: gate_executor.evaluate(gate_ids=...) + orchestrator/ai_ops_run передают plan['gates'] (base+треки) -> треки VISUAL/ANALYTICS/SECURITY/DOCS реально оцениваются"
    fixed_v2_55:
      - "условный human_approval: classify(gate, signals) оценивает required_when -> security не блокирует безусловно; approval нужен только при privileged/destructive/secret_boundary (или security_surface_changed)"
    fixed_v2_56:
      - "shell env scrub: секреты (TOKEN/SECRET/KEY/AWS_/GH_/OPENAI_/ANTHROPIC_…) не попадают в окружение shell-команд Broker; PATH/NODE_ENV сохранены"
    fixed_v2_57:
      - "reviewer.json от оркестратора: judge-стадии просят структурный reviewer-result (JSON) и пишут валидный stage-<sid>.reviewer.json -> gate_executor берёт источник истины, а не regex по прозе"
    fixed_v2_58:
      - "единый execution-pipeline (spine): tools/execution_pipeline.py собирает detect->tool-loop->evidence collector->RunPlan-гейты в ОДИН прогон; offline-проверено mock-предложителем"
    fixed_v2_59:
      - "commit+reverify на точном SHA: pipeline(commit=True) коммитит применённые изменения на ветке ai-ops/<id> (не main) и собирает evidence на зафиксированном SHA (evidence_on_exact_sha), а не по грязному дереву"
    live_verified_v2_60:
      note: "ЖИВОЙ прогон pipeline на DeepSeek (openai-compatible) в ии-среде: движок отработал end-to-end"
      evidence: "task=создать src/strutil.py; loop.stopped=done, applied_writes=1, denied=0, commit на ветке ai-ops/slugify, evidence_on_exact_sha=True; гейты честно blocked (нет тестов/intake) -> ready_for_pr=False, не соврал"
      fixed_from_run:
        - "intake_completeness закрывается evidence из сигналов (классификация уже есть) — execution_pipeline._intake_evidence"
        - "pytest exit 5 (нет тестов) -> warn, не fail; tests_passed не выдаётся, hard-fail не ставится — evidence_collector"
    fixed_v2_61:
      - "умное ослабление implementation_verification: build/lint/typecheck освобождаются, если инструмента НЕТ в ДЕТЕКТИРОВАННОМ (draft) стеке — детерминированно из манифестов, не фабрикация; записано в warnings; tests освобождаются по умолчанию + warn, allow_missing_tests=False -> блок. Честно: подтверждение профиля человеком рекомендуется, но не enforced в offline-pipeline (adversarial-review). Решение ep-2026-07-16-smart-loosening"
    fixed_v2_62:
      - "worktree-изоляция прогона: pipeline(isolate=True) гоняет весь движок в .ai/worktrees/<id> на ветке ai-ops/<id> — основное дерево не тронуто"
      - "draft PR — механизм: tools/pr_open.py (GitHub REST, токен из env, draft:true); pipeline(open_pr=True) вызывает его когда ready_for_pr; нет токена -> honest unavailable (не имитируется)"
    live_pipeline_verified_v2_64:
      note: "ЖИВОЙ прогон ВСЕГО движка на DeepSeek (openai-compatible) с мака: end-to-end до ready_for_pr"
      evidence: "task=создать src/strutil.py slugify; loop.stopped=done, applied=2, denied=0, isolation=.ai/worktrees/slugify, commit fc87de5 on_exact_sha=True, gates.blocked=False, ready_for_pr=True"
      honest_caveat: "репо был пустой (без тулчейна) -> все build/lint/typecheck/tests ОСВОБОЖДЕНЫ умным ослаблением (штатно); подтверждена МЕХАНИКА цепи и сходимость к ready_for_pr, но НЕ прохождение реальных build/lint/test — это на репо с тулчейном (см. p0_backlog: 3 реальные задачи)"
    adversarial_review_v2_63:
      note: "workflow-ревью всего диффа аудита (efeab38..HEAD): 3 ревьюера x adversarial-verify; 6 подтверждённых дефектов -> исправлены"
      fixed:
        - "SECURITY: scrub_env denylist был дыряв (голый _KEY, DATABASE_URL/DSN/JWT/PAT доходили до shell модели) -> перевод на ALLOWLIST + passthrough"
        - "evidence_collector: pytest exit5 в полиглот-репо ронял весь test-check -> по-руновая обработка (реальный тест рядом с pytest-exit5 засчитывается)"
        - "execution_pipeline: isolate=True при сбое worktree.add молча уходил в основное дерево -> теперь честная ошибка, прогон остановлен"
        - "ai_ops_run: engine=pipeline — собранный движок подключён к контроллеру (был только в selftest)"
        - "honesty: 'профиль подтверждает человек' -> уточнено (детектированный draft; подтверждение рекомендуется, не enforced)"
        - "pr_open: мусор type('e',(),{}) в сообщении об ошибке push -> rc"
    fixed_v2_66:                               # Trust Boundary (следующий аудит: P0.1/P0.2-contained/P0.5/P1.1)
      - "P0.1 контроллер: print_human ветвится по kind (pipeline-отчёт больше не роняет KeyError на status/execution/required_tracks); CLI --engine pipeline --model --open-pr проброшены; exit_code(): 2 при error, 1 при not ready_for_pr / blocked, 0 при ready/planned — CI видит провал, а не считает любой прогон успешным"
      - "P0.2 (contained) shell trust boundary: subprocess timeout (SHELL_TIMEOUT_DEFAULT=300, action.timeout переопределяет) — shell больше не висит вечно; честный module-comment: shell НЕ security boundary (write_scope/protected только для read/write; полный jail = контейнер, в backlog)"
      - "P0.5 evidence<->revision: _commit_on_branch и _revision дают ПОЛНЫЙ SHA (не --short); pipeline проверяет tree_clean до/после checks (git status --porcelain); ready_for_pr ТРЕБУЕТ реального коммита + evidence на точном SHA + чистого дерева (dry-run commit=False НИКОГДА не ready)"
      - "P1.1 path safety: validate_workitem_id (slug ^[a-z0-9][a-z0-9._-]{0,63}$, без ../,/,\\, абсолютных) в run_plan.build_plan; worktree.add/remove — _safe_target с containment внутри <root>/<wt_dir> (traversal ../ и абсолютные отвергнуты)"
    engine_status: "СОБРАН + подтверждён живьём на ОГРАНИЧЕННОМ QUICK-сценарии (v2.64, DeepSeek, пустой репо, ready_for_pr=True). Подключён к контроллеру (ai-ops run --engine pipeline); trust boundary усилена (v2.66). Канонический путь task -> проверяемый draft PR для РЕАЛЬНОГО child (тулчейн + живой PR + standalone-движок в child) — ещё НЕ готов, см. p0_backlog"
    frozen: [новые агенты, lifecycle-стадии, Knowledge Graph, Robin, Decision Intelligence, физразнос пакетов]
    p0_epic: "одна обычная задача на реальном репо -> проверяемый draft PR"
    p0_backlog:                              # честно: подтверждено по коду, НЕ сделано (остаток после v2.66)
      - "P0.2 (полное) shell FS/сеть-изоляция: сделаны env-скраб секретов (v2.56/2.63 allowlist), timeout + честная граница (v2.66). ОСТАЛОСЬ: полный jail (writable-mount только worktree, HOME изолирован, сеть off, allowlist команд, лимиты ресурсов) — требует контейнера, НЕ сделано. Не давать pipeline с живой моделью доступ к ценному приватному репо без надзора"
      - "P0.3 standalone-движок в child: managed_set не содержит каталоги инструментов и валидаторов — child зависит от внешнего клона кита; нужен устанавливаемый пакет с движком внутри child"
      - "P0.4 полный RunPlan в pipeline: сейчас pipeline гоняет tool-loop + один срез evidence (implementation_verification) + оценку гейтов; ПОСТАДИЙНОЕ исполнение треков RunPlan (VISUAL/ANALYTICS/SECURITY/DOCS как отдельные стадии с артефактами) — НЕ реализовано"
      - "P1.2 усиление детектора стека: сейчас определяет базовые команды build/lint/typecheck/test по манифестам; edge-случаи (монорепо, нестандартные скрипты) требуют доработки"
      - "P1.4 CI: покрыть канонический пользовательский путь (ai-ops run --engine pipeline --execute на репо с тулчейном), а не только selftest-модули"
      - "живой draft PR: механизм готов (pr_open, open_pr=True), нужен GITHUB_TOKEN + remote — эмпирически не прогнан"
      - "квалификация: харнесс ГОТОВ (tools/qual_run.py: прогон N задач -> JSON-отчёты + сводка pass/fail по критериям; offline-selftest в CI). ОСТАЛОСЬ (нужен Mac+DeepSeek): реально прогнать 3–5 задач на репо С тулчейном и приложить отчёты"
  self_audit_2026_07_17:                     # собственный аудит на соответствие видению (решение ep-2026-07-17-vision-audit)
    scope: "VISION.md/ROADMAP.md vs код (агент-ревьюер + ручная верификация); НЕ execution-engine backlog"
    fixed_v2_67:
      - "P0 orphan-гейт: spec_synchronization (MVP-blocking) и archive_readiness были применимы, но не запускались ни в одном workflow/треке. Честная модель: оба — детерминированные OpenSpec-гейты, enforced OpenSpec CLI + validate_openspec_change.py в CI. Зафиксировано gate.enforced_by=openspec-ci-guard"
      - "orphan-guard: validate_workflow_gates стал track-aware (перестал сыпать ложными WARN про track-гейты ux_review/ai_eval/...) и enforced_by-aware; недостижимый MVP-blocking гейт теперь ERROR (был WARN) — класс дрифта «8 blocking, а реально 7» не повторится; applicability на несуществующий workflow тоже ERROR"
      - "P1 intake_completeness добавлен в ENGINEERING (per-run гейт, реально пропускался; QUICK/PRODUCT/... его имели)"
      - "P1 счётчик gates: ROADMAP говорил «26 gates», фактически 28. Исправлено + запиннено claim'ами gate-count(28)/mvp-blocking-count(8) новым типом claim `count` в validate_claims"
      - "P2 security.applicability ссылалась на несуществующий workflow INCIDENT -> убран (инциденты идут через CRITICAL)"
      - "P2 documentation_drift развёрнут из one-liner в полную форму (stage/purpose) как у соседних гейтов"
    kept_deliberately:
      - "phase-3 non-blocking гейты (documentation_updated, release_safety, observability_readiness, stakeholder_readiness, knowledge_*, decision_quality) оставлены non-blocking: baseline_ready на ОДНОМ child; критерий промоушена — стабильный зелёный на >=2 child (ep-2026-07-17-vision-audit)"
    clean_areas: "51 агент, 14 ревьюеров, workflow-декларации, AGENTS.md checklist ⊆ CI, reference/claim integrity — расхождений нет"
    fixed_v2_69:                              # первый реальный finding квалификационного харнесса
      - "PORTABILITY: generate_artifacts.py и run_report.py использовали `X | None` (PEP 604) в аннотациях без future-import -> на Python 3.9 (дефолт macOS CommandLineTools) весь движок падал TypeError при импорте (ai_ops_run->workitem->run_report->generate_artifacts). Пойман попыткой живого qual-прогона с Mac. Фикс: `from __future__ import annotations` (ленивые аннотации, PEP 563)"
      - "guard: validation/validate_python_compat.py (AST) — union-аннотация `X | Y` без future-import = ERROR в CI; класс «падает на 3.9» больше не пройдёт. Документированный floor понижен 3.10+ -> 3.9+ (честно: дефолтный python3 macOS подходит)"
    live_qual_run_2026_07_17:                 # первый живой прогон qual-харнесса на реальном child (ii-sreda, DeepSeek)
      result: "движок отработал на ii-sreda: изолированный worktree создан, петля прошла. Для ENGINEERING-класса гейты ЧЕСТНО заблокировали (unmet: requirements/specification/plan_readiness/code_review — pipeline не производит для них evidence). Это подтверждает backlog P0.4, а не баг: движок не подделывает pass"
      fixed_v2_70: "qual_run завышал класс задачи до ENGINEERING по умолчанию -> любая задача блокировалась гейтами, для которых pipeline не даёт evidence. Дефолт -> QUICK (реально поддерживаемый класс: tool-loop + intake + implementation_verification) + флаг --task-type для осознанного выбора класса"
      honest_boundary: "квалифицируется ПОДДЕРЖИВАЕМЫЙ сегодня QUICK-путь; полный ENGINEERING/PRODUCT-путь заблокирован до P0.4 (постадийное исполнение RunPlan с производством evidence для upstream-гейтов)"
      fixed_v2_71: "второй finding живого прогона: в изолированном worktree не было node_modules -> build/typecheck/test падали exit 127 (command not found), implementation_verification блокировал. Добавлен stack-aware шаг подготовки: project_detector отдаёт install_command (npm ci/poetry install/pip install...), execution_pipeline ставит зависимости в worktree ПЕРЕД сбором evidence (только в изоляции; основное дерево не трогаем). node_modules в .gitignore -> дерево остаётся чистым для evidence-на-SHA"
      fixed_v2_72: "третий finding живого прогона: с установленными deps ii-sreda оказался КРАСНЫМ САМ ПО СЕБЕ (build+typecheck: коллизия регистра Markdown.ts/markdown.ts; 1 из 532 тестов: recentTimeGroup дата). Движок честно не дал ready_for_pr поверх красного. Добавлен baseline-diff: прогон проверок на БАЗЕ до правок + критерий 'no-regressions' (правка не должна вносить НОВЫХ провалов; пред-существующие красные репо чинят отдельно). execution_pipeline baseline_diff=True (regressions/fixed/no_regressions, ready_criterion); ai-ops run --baseline-diff; qual_run по умолчанию baseline-diff (--strict-green для all-green)"
      qualification_status: "движок ПОДТВЕРЖДЁН на реальном child (ii-sreda, DeepSeek) end-to-end: detect -> tool-loop (живая модель) -> npm ci -> commit в worktree -> evidence на точном SHA -> реальные build/typecheck/test -> гейты. Верификация настоящая (вскрыла 3 реальных бага репо). Остаётся эмпирика: прогон 3–5 задач с зелёным вердиктом (нужна либо зелёная база, либо baseline-diff, либо задачи-починки)"
      fixed_v2_73: "четвёртый finding живого прогона: живая модель (DeepSeek) недетерминирована — иногда отдаёт невалидный JSON, и ОДНА кривая реплика обрывала весь прогон (loop.stopped=bad-proposal: bad-json). tool_loop.run_loop: до max_bad_proposals=3 подряд КОРРЕКТИРУЮЩИХ переспросов (модели показывают её ошибку + просят чистый JSON), счётчик сбрасывается на валидном действии. Прогон переживает случайные срывы парсинга"
  cross_platform_2026_07_17:                 # патч Windows-совместимости (внешний отчёт установки на Win11/py3.11)
    problem_1_paths: "str(Path.relative_to()) давал 'a\\b' на Windows -> ложный провал валидатора реестра и ложный дрейф managed-слоя (.checksums.json с '\\'-ключами непереносим). Фикс: все 18 сайтов -> .relative_to().as_posix(); detect_drift нормализует старые '\\'-ключи при чтении (миграция без ложного дрейфа)"
    problem_2_encoding: "installer печатал рамки/галочки/кириллицу -> UnicodeEncodeError на cp1251/cp866-консоли Windows. Фикс: _force_utf8_stdio() (sys.stdout/stderr.reconfigure utf-8, errors=replace) в начале main()"
    acceptance: "selftest инсталлера: ключи checksums только '/'; Windows-стиль '\\'-ключей не даёт ложного дрейфа. Все проверки AGENTS.md PASS. POSIX-установки не ломаются (sha256 те же, меняется только форма ключей)"
  live_qual_green_2026_07_17:                 # ПЕРВЫЙ ЗЕЛЁНЫЙ qual-прогон на реальном child
    result: "README-задача на ii-sreda (DeepSeek, класс QUICK, baseline-diff): [PASS] 1/1, ready_for_pr=True, no_regressions=True. Полный путь detect->tool-loop(живая модель)->npm ci->commit в worktree->evidence на точном SHA->baseline-diff подтверждён ЖИВЬЁМ на реальном репозитории"
    fix_tasks_findings: "2 задачи-починки вскрыли ещё два: (1) на реальной починке модель крутилась до max_steps с 0 правок — не знала ЧТО чинить -> v2.74 подаёт в контекст ФАКТИЧЕСКИЙ вывод падающих проверок базы (_baseline_failure_summary); (2) SSL-handshake timeout оборвал задачу -> v2.74 _http_post_json ретраит транзиентные сетевые сбои и 5xx/429 (не 4xx) с бэкоффом"
    remaining: "модель (DeepSeek) на сложных fix-задачах может не сходиться даже с выводом ошибок — это предел модели/подсказки, не крэш движка; квалификация зелёного вердикта на задачах-починках — эмпирика, требует ещё прогонов (возможно с более сильной моделью)"

effect_metrics:
  # v2.30: автонакопление истории эффекта — чтобы baseline закрывался сам.
  status: integrated
  history_dir: ".ai/project/report-history"
  recorder: tools/run_report.py                      # --record: срез в историю
  metrics: tools/effect_metrics.py                   # baseline_ready при 3 фичах x >=3 срезов
  auto_record:
    in_session: [commands/task/ai-plan-task.md, commands/task/ai-implement.md, commands/task/ai-verify.md, commands/task/ai-finish-task.md]  # процедуры, где рантайм пишет срез
    ci_net: templates/ci/ai-ops-record.yml           # на push фиксирует срез по затронутым фичам
    feature_binding: "ai-run --feature <имя> (v2.51) — иначе wi-<hash>, срезы не копятся на фичу"
  by_runtime:                                        # ЧЕСТНО (finding обкатки): «авто» зависит от рантайма
    generic-orchestrator: "оркестратор кита пишет срезы сам при прогоне стадий"
    claude-code: "срез пишется, когда рантайм исполняет finish (run_report --record); автозаписи 'за стадию' нет — процедура, не магия"
  note: >
    Запись срезов даёт >=3 на фичу; полностью автоматично — только в generic-orchestrator.
    В claude-code история копится, когда рантайм честно исполняет finish на ИМЕНОВАННОЙ фиче
    (ad-hoc wi-<hash> baseline не двигает). CI-часть исполняет GitHub Actions; из среды
    разработки кита не проверялась.


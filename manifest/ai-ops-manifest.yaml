      - "встроено в lifecycle: features/<wid>/work-package.yaml + report['work_package'] (atomic/should_decompose/оси/причины); в checklist, CI и e2e-харнессе. Артефакт WorkPackagePlan"
    fixed_v2_99_context_lifecycle_resume:
      - "этап 3 Context Lifecycle и Resume: tools/run_handoff.py — артефакт RunHandoff (что сделано, changed_files, verification passed/failed, open_questions, known_risks, next_action, resume_from_revision) собирается из отчёта прогона. Сущности Feature->WorkItem->Run->Stage->Step->Handoff. Встроено в lifecycle: features/<wid>/run-handoff.yaml + report['handoff']"
      - "resume: run_handoff.resume_preflight(child, wid, base) детерминированно проверяет — есть ли handoff, на месте ли ветка/worktree, УШЁЛ ЛИ base вперёд с момента прогона (revalidation_needed: старый evidence не действителен для нового состояния), устарели ли решения. CLI `ai-ops resume <child> <feature>` печатает preflight + указывает, как продолжить (worktree/ветка переиспользуются, не начиная заново)"

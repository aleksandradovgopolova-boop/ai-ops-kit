    fixed_v2_115_preflight_truth:
      - "ГЛАВНЫЙ дефект аудита закрыт: Spec-First блокировал ДОСТАВКУ, а не РЕАЛИЗАЦИЮ. Раньше pipeline гонял tool loop, писал код+коммит и лишь ПОТОМ проверял полноту спеки (delivery-gate). Теперь tools/preflight.py выполняется в контроллере ДО run_pipeline: classification -> ContextPayload собран -> spec достаточна -> атомарна ИЛИ декомпозиция подтверждена -> context budget не превышен -> human approvals присутствуют. Блок -> tool loop НЕ запускается, правок/коммита НЕТ (status=blocked, loop=None, commit.sha=None). Доказано PQ2/PQ4/PQ5: ноль вызовов proposer, worktree не создан"
      - "fail-closed для heavy (ENGINEERING/PRODUCT/CRITICAL): ошибки Context Compiler/Spec/Planner (lifecycle_errors) и несобранный ContextPayload -> preflight блокирует (не 'продолжаем молча'); для QUICK — не блокирует (light). context overflow -> блок ДО исполнения. Неатомарная задача -> блок, пока не decomposition_confirmed ИЛИ не выбран work_package_id"
      - "human-approval стал настоящим ApprovalRecord (tools/approvals.py): kind/approval/approved_by/scope/revision/created_at/reason на диске (features/<wid>/approvals/*.yaml), а не boolean, который мог передать любой код. Доменные human_approval_conditions security-доменов РЕАЛЬНО исполняются: secret_boundary->secrets, dependency_addition->dependencies, auth_change->authentication+authorization_idol, multi_tenant->data_isolation, deploy_change->deployment_config, ai_component->ai_prompt_injection; destructive требует отдельный ApprovalRecord. Невалидная запись (без approved_by/scope/reason) НЕ засчитывается. preflight/approvals selftest в CI+AGENTS.md"
    fixed_v2_114_product_qualification:

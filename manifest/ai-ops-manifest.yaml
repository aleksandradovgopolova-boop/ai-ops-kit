      - "проверки: decompose-сценарии в atomic_planner selftest (атомарный -> пусто; by-subsystem -> 4 пакета с deps; by-result -> 3; size -> 2; scope ⊆ сигналов); Q2b в qualification (конкретные пакеты с id/scope/deps); v2.111 в ai_ops_run selftest (атомарный QUICK -> work_packages пуст)"
    fixed_v2_110_real_spec_first:

      - "остальная live RC (v2.122): sanity 7/7; провайдер-гэп v2.120 закрыт (model==deepseek-chat везде); v2.121 approval_recheck.ok + review exit-код подтверждены вживую; S1/S2/S4/S6/S7/S9 PASS (S9 — реальный draft PR, base=default_branch)"
    fixed_v2_121_spec_and_approval_binding:
      - "P1.1 спека обязательна ДО tool loop для heavy (ENGINEERING/PRODUCT/CRITICAL): preflight.assess получил author-параметр и правило author-or-spec — heavy без spec.yaml и без --author блокируется (spec-first ДО реализации, не только доставки); с --author движок авторизует спеку пре-стадией, а артефакт-гейты specification/requirements всё равно проверят её готовность; QUICK остаётся light. Тесты: heavy без спеки/без author -> blocked; c author -> spec-гейт пройден; QUICK -> не блокирует. Ripple: review_branch/executor/PQ9 heavy-прогоны переведены на author=True"
      - "P1.2 ApprovalRecord связан (раньше — слабо: хватало непустых author/scope/reason). Теперь запись связывается с: (1) хэшем плана+спеки (binds_to / bind_to_plan -> plan_binding_hash) — при смене run-plan.yaml/spec.yaml одобрение перестаёт покрывать новую ревизию; (2) сроком (expires_at) — просроченное невалидно; (3) типом риска (risk). check() авто-берёт plan_hash с диска и реальное время. Связывание АДДИТИВНО: старые записи без binds_to/expires_at валидны как раньше (нет регрессии)"
      - "P1.2 п.4 recheck после диффа: recheck_after_diff проверяет, что scope одобрения ПОКРЫВАЕТ реально изменённые пути (covers_paths — путь/префикс). execution_pipeline после коммита считает _committed_changed_files и вызывает recheck; scope не покрывает изменения -> approvals_cover_ok=False -> НЕ ready + not_yet + report.approval_recheck. Preflight проверяет наличие одобрения ДО правок, recheck — что одобрено ИМЕННО изменённое"
      - "P1.3 review как lifecycle-событие (раньше — диагностика, слово ревьюера ни на что не влияло). review_branch.review пере-считывает готовность к merge (readiness.ready_for_merge: True только при вердикте pass / no-ai-review-gates) и ФИКСИРУЕТ вердикт артефактом features/<wid>/branch-review.yaml (verdict/statuses/changed_files/readiness/created_at). Exit-код review (CLI и модуль) = ready_for_merge -> needs-reviewer/needs-changes теперь non-zero (раньше needs-reviewer считался ok)"
      - "P1.4 строгий install-фикс: провал install игнорируется ТОЛЬКО если окружение ДОКАЗАННО рабочее — _env_proven_ok требует ≥1 реально отработавшей проверки (pass или честный fail без env-симптома). Нет проверок вовсе ИЛИ все падения — env-симптомы (exit 127 / 'command not found' / 'No module named' ...) -> НЕ квалифицировано (закрыта дыра v2.118, где install-fail + ноль проверок трактовался как qualified)"
      - "проверки: approvals/preflight/review_branch/workpackage_executor/execution_pipeline selftest расширены (срок/binding/recheck/covers_paths/readiness/env-proven), PQ1-PQ9 зелёные. Аддитивно в 2.x. Осталось до v3.0-rc1: v2.122 живая RC-квалификация (S1/S2/S4/S6/S7/S8/S9/S10 + живой sequential) — на машине пользователя, не фабрикуем"
    fixed_v2_120_canonical_runtime_wiring:
      - "P0.1 канонический вход провязан: ai_ops_cli `run --execute` теперь передаёт provider_name/model/base/open_pr/max_steps/require_fix в ai_ops_run.run (раньше уходил в mock, model=None, без пути до draft PR). Добавлены CLI-флаги --open-pr, --max-steps. Тест: run --execute --model MARKER -> report.model==MARKER"
      - "P0.2 sequential наследует безопасность/окружение: execute_sequence получил sandbox/install_deps/open_pr/max_steps/write_scope_for и передаёт их в per-package run (containment больше не теряется молча). open_pr — только на финальном пакете (интегрированная ветка). CLI exit-код sequential: 0 при ready_all, 1 при executed_all-но-не-ready, 2 при блокировке/ошибке (раньше 0 при executed_all даже с незакрытыми гейтами)"
      - "P0.3 цепочка стоп на настоящем блокере: _hard_stop(rep) различает «awaiting evidence» (нет author/review -> исполнен, не ready, цепочка идёт) от deterministic/security/reviewer FAIL, регрессии, нет-коммита, scope-violation (write вне write_scope), preflight-блок — эти ОСТАНАВЛИВАЮТ последовательность (зависимый пакет не строится поверх). Тесты: reviewer FAIL на пакете 1 -> стоп; заблокированный push != scope-violation"
      - "P0.4/P0.6 обход декомпозиции закрыт: preflight валидирует work_package_id против плана (авторитетный _sequence_plan_ids от исполнителя + work_pkg прогона); вымышленный id -> блок; голый decomposition_confirmed БОЛЬШЕ не пускает неатомарную задачу одним tool loop — только sequential executor ИЛИ конкретный существующий пакет. PQ5c: вымышленный id -> blocked"
      - "P0.7 package write-scope провязан: write_scope проходит run -> run_pipeline -> tool_broker.Policy/sandbox_policy; execute_sequence(write_scope_for) задаёт scope пакета; брокер отклоняет запись вне scope, executor трактует это как scope-violation (стоп). Roadmap: разведён двойной v3.1 (v3.0-rc1 live-qualified -> v3.0 stable -> v3.1 Sequential как веха -> v3.2/v4.0 физический package split). Осталось (P1) в v2.121: spec до tool loop для heavy, binding ApprovalRecord, review как lifecycle-evidence, строгий install-фикс"
    fixed_v2_119_live_polish:
      - "#2 честность отчёта: заметка not_yet «живой предложитель (swap провайдера)» уместна только на mock-прогоне — на ЖИВОМ провайдере (DeepSeek и т.п.) она вводит в заблуждение (предложитель уже живой). Контроллер убирает её из not_yet при provider != 'mock'. Регрессия в ai_ops_run selftest (mock -> есть, anthropic -> убрана)"
      - "#3 (finding живого прогона): тул-кэши (untracked __pycache__/.pytest_cache/.mypy_cache/node_modules/target/dist/... ) делали дерево 'грязным после проверок' (tree_after=False) в репо БЕЗ .gitignore -> ложный not-ready, хотя checks реально прошли (тот же класс, что prepare-false-negative). _tree_clean_after_checks игнорирует ТОЛЬКО untracked тул-кэши; модификации TRACKED-файлов и прочий untracked по-прежнему = грязь (evidence-целостность P0.5 сохранена). Проверено end-to-end: фикстура без .gitignore в baseline-diff теперь tree_after=True, ready=True (до фикса — False)"
      - "оба — из живой обкатки на Mac (после зелёного S1/S2). 4 юнит-теста _tree_clean_after_checks (чисто / только кэши -> clean; не-кэш untracked / tracked-правка -> грязь) + 2 теста not_yet в ai_ops_run selftest. PQ7/PQ8/e2e не задеты"
    fixed_v2_118_prepare_false_negative:
      - "FINDING ЖИВОГО ПРОГОНА (DeepSeek/Mac, S1/S2): движок отработал ЧЕСТНО (модель написала код, test=pass, evidence на точном SHA, регрессий нет, все гейты пройдены), но ready_for_pr=false держал ЕДИНСТВЕННО provale install-команды стека. prepare: `pip install -e .` -> exit 1 'Failed to build editable' (фикстура/репо не является устанавливаемым пакетом), при этом pytest прошёл. P0.6-инвариант блокировал ready по экзит-коду install, хотя окружение доказанно рабочее (проверки отработали) — false-negative"
      - "фикс: провал install блокирует ready ТОЛЬКО если он реально оставил проверки нерабочими (симптомы неподготовленного окружения: exit 127 / 'command not found' / 'No module named' / нет тулчейна). _env_unqualified(checks) детектит симптом среди УПАВШИХ проверок; env_qualified = prepare_ok OR not _env_unqualified. base_ok использует env_qualified вместо prepare_ok. Честный fail проверки (exit 1, код сломан) и exit 127 (нет тулчейна) по-прежнему блокируют — P0.6 сохранён (сломанное окружение ≠ зелёное). report['env_qualified'] + not_yet при реальном env-провале"
      - "проверки: 4 юнит-теста _env_unqualified в execution_pipeline selftest (test=pass -> qualified; exit 127 -> unqualified; 'No module named' -> unqualified; честный AssertionError exit 1 -> qualified). PQ7/PQ8 (install_deps=False) и e2e не задеты. Интеграционное подтверждение — повторный живой прогон на Mac"
    fixed_v2_117_sequential_workpackage_executor:
      - "закрыт аудит #2 (WorkPackages создаются, но не исполняются): tools/workpackage_executor.py исполняет пакеты ПОСЛЕДОВАТЕЛЬНО — пакет 1 -> commit -> evidence -> gates -> handoff -> пакет 2 -> ... на общей ветке ai-ops/<wid> (resume поверх предыдущего, v2.109). У каждого пакета СВОЙ коммит/SHA, свои гейты, свой RunHandoff, своя точка resume. per-package отчёт features/<wid>/work-packages/<id>/report.json + агрегат sequence-report.yaml. Раньше пакеты были только планом — задача шла одним общим tool loop"
      - "инварианты: пакеты в порядке order; зависимый пакет НЕ стартует, пока depends_on не подтверждены (completed); блок пакета ОСТАНАВЛИВАЕТ последовательность (следующие не стартуют) — стоп на hard preflight-блоке / отсутствии коммита / регрессии базы; «гейты требуют evidence» (нет author/review) — НЕ стоп (пакет исполнен, но не ready). Исполнитель = подтверждение декомпозиции (work_package_id пакета -> preflight атомарности пройден)"
      - "доказано детерминированно: executor selftest (3 пакета by-subsystem, уникальные SHA, цепочка коммитов merge-base --is-ancestor, стоп на secret_boundary-пакете -> пакет 3 не стартовал, с author+review+openspec -> ready_all) + PQ9 в product-qualification. CLI: ai-ops run … --sequential (неатомарную задачу исполнить по пакетам). АДДИТИВНО в 2.x (новый модуль, opt-in флаг — ничего не ломает); тег v3.1 — после v3.0-rc1 (живой квалификации)"
    fixed_v2_116_rc_qualification_deterministic:
      - "`ai-ops review` стал НАСТОЯЩИМ intent (аудит #4: раньше падал в preview, движок реально запускался только для run --execute). tools/review_branch.py: независимый ревьюер под READ-ONLY политикой над worktree ветки ai-ops/<wid>, БЕЗ tool loop/правок/коммита; вердикт по ai-review гейтам плана (writer≠judge); диф ветки против базы — контекст. verdict pass|needs-changes|no-branch|needs-reviewer. ai_ops_cli проксирует review (+ --provider/--model); mock -> needs-reviewer (честно, вердикт не фабрикуется)"
      - "доказаны ДЕТЕРМИНИРОВАННО положительные ЗЕЛЁНЫЕ пути (аудит #5: раньше не было теста, что корректная задача РЕАЛЬНО даёт ready=true). PQ7: корректная QUICK (task_type+size+risk закрывают intake, зелёный тест) -> ready_for_pr=true, overall=delivered, гейты закрыты, run-report.json на диске. PQ8: ENGINEERING с author+review -> ready_for_pr=true при доступном openspec CLI (security-reviewer v2.106 закрывает security на чистом скане); без openspec -> спек-гейт честно блокирует (fail-closed, conditional-тест портируем)"
      - "актуализированы устаревшие живые сценарии: S4 (security больше НЕ 'нет производителя evidence' — security-reviewer v2.106 закрывает на чистой правке; секреты/deps требуют ApprovalRecord v2.115); S8 переименован в S8-resume-and-rerun и описывает настоящий resume v2.109 (продолжение поверх коммита, блок на устаревшей базе без --force), а не только rerun/discard. review_branch selftest в CI+AGENTS.md. ГРАНИЦА: живые прогоны S1/S2/S4/S6/S7/S9 и настоящий draft PR — на машине пользователя (не фабрикуем); тег v3.0-rc1 после зелёных живых прогонов"
    fixed_v2_115_preflight_truth:
      - "ГЛАВНЫЙ дефект аудита закрыт: Spec-First блокировал ДОСТАВКУ, а не РЕАЛИЗАЦИЮ. Раньше pipeline гонял tool loop, писал код+коммит и лишь ПОТОМ проверял полноту спеки (delivery-gate). Теперь tools/preflight.py выполняется в контроллере ДО run_pipeline: classification -> ContextPayload собран -> spec достаточна -> атомарна ИЛИ декомпозиция подтверждена -> context budget не превышен -> human approvals присутствуют. Блок -> tool loop НЕ запускается, правок/коммита НЕТ (status=blocked, loop=None, commit.sha=None). Доказано PQ2/PQ4/PQ5: ноль вызовов proposer, worktree не создан"
      - "fail-closed для heavy (ENGINEERING/PRODUCT/CRITICAL): ошибки Context Compiler/Spec/Planner (lifecycle_errors) и несобранный ContextPayload -> preflight блокирует (не 'продолжаем молча'); для QUICK — не блокирует (light). context overflow -> блок ДО исполнения. Неатомарная задача -> блок, пока не decomposition_confirmed ИЛИ не выбран work_package_id"
      - "human-approval стал настоящим ApprovalRecord (tools/approvals.py): kind/approval/approved_by/scope/revision/created_at/reason на диске (features/<wid>/approvals/*.yaml), а не boolean, который мог передать любой код. Доменные human_approval_conditions security-доменов РЕАЛЬНО исполняются: secret_boundary->secrets, dependency_addition->dependencies, auth_change->authentication+authorization_idol, multi_tenant->data_isolation, deploy_change->deployment_config, ai_component->ai_prompt_injection; destructive требует отдельный ApprovalRecord. Невалидная запись (без approved_by/scope/reason) НЕ засчитывается. preflight/approvals selftest в CI+AGENTS.md"
    fixed_v2_114_product_qualification:
      - "закрыт последний пункт аудита: product-qualification. validate_product_qualification.py проверяет сквозные ГАРАНТИИ продукта ДЕТЕРМИНИРОВАННО через РЕАЛЬНЫЙ контроллер ai_ops_run.run (не юнит-механику компонентов): PQ1 ContextBundle реально в prompt (=== [ header + задача + fed_to_model); PQ2 неполная спека -> ready=False+spec_first.incomplete; PQ3 resume поверх коммита (обе фазы в worktree, resumed); PQ4 secret_boundary без человека -> security в unmet + ready=False; PQ5 крупная задача -> should_decompose + конкретные WorkPackages; PQ6 нет ложного green (dry-run никогда не ready; честный прогон -> реальный коммит+evidence на SHA+петля done, но ready=False с названным блокером, т.к. движок не фабрикует зелёное без authoring-evidence)"
      - "граница честности: ЖИВЫЕ прогоны с моделью (качество правок) остаются на машине пользователя — qualification/scenarios.yaml + tools/qual_run.py (DeepSeek/стек, docs/qualification-runbook.md); мы НЕ фабрикуем живые прогоны. Детерминированный харнесс проверяет МЕХАНИКУ гарантий, живой — качество. Шаг добавлен в CI (package-quality) и AGENTS.md чек-лист"
    fixed_v2_113_container_delivery_scope:
      - "P0 аудита закрыт: контейнерная доставка забирает ТОЛЬКО ветки текущего прогона. Раньше run-sandboxed.sh делал force-fetch ВСЕХ refs/heads/ai-ops/* из одноразового клона обратно в основной репо -> параллельная ai-ops/* ветка (другой прогон/сессия) МОГЛА быть перезаписана устаревшей версией из клона (клон снят раньше). Теперь: снимок ai-ops/* клона ДО прогона + доставка только НОВЫХ или ИЗМЕНЁННЫХ веток (диф SHA) -> нетронутые прогоном ветки не трогаются"
      - "логика вынесена в containers/deliver-run-branches.sh (снимок-диф + точечный fetch по refspec), run-sandboxed.sh её вызывает. validate_container_delivery.py проверяет ДЕТЕРМИНИРОВАННО на настоящем git (без docker): ai-ops/new доставлена, изменённая прогоном ai-ops/old доставлена, а concurrent-продвинутая в основном репо ai-ops/untouched НЕ затёрта; 'нечего доставлять' если прогон ничего не менял. validate_container_assets требует deliver-run-branches.sh + scoping-маркеры; шаг добавлен в CI и AGENTS.md"
    fixed_v2_112_real_intent_ux:
      - "P0 аудита закрыт: намерения стали настоящими действиями, а не только execution preview. _run_intent в ai_ops_cli: onboard -> project_detector.detect + запись .ai/repository-profile.yaml; status -> active_work.list_cmd (реальное чтение); health -> product_health.compute из product/product-health.yaml (или ЧЕСТНЫЙ отказ без метрик, не фабрикует score); plan -> пишет features/<wid>/{run-plan,context-bundle,spec-coverage,work-package}.yaml БЕЗ правок кода; new -> workitem.start + spec-каркас; discuss -> features/<wid>/discovery-draft.md"
      - "run/resume/specify уже реальны (v2.34/2.109/2.110). preview <intent> ПО-ПРЕЖНЕМУ только показывает превью (preview_mode гейтит спец-действия) — не выполняет побочных эффектов. v2.112-сценарии в ai_ops_cli selftest: каждое действие проверено на РЕАЛЬНЫЙ артефакт на диске + preview onboard НЕ пере-создаёт профиль"
    fixed_v2_111_atomic_workpackages:
      - "P0 аудита закрыт: Atomic Planner создаёт КОНКРЕТНЫЕ WorkPackages, а не только называет оси. atomic_planner.decompose(signals, wid): при should_decompose строит пакеты {id, title, axis, scope, depends_on, acceptance, order} по ОСНОВНОЙ оси (приоритет: subsystem>result>commit>verifiable>context-budget>size). by-subsystem -> пакет на подсистему с цепочкой зависимостей; by-result -> N независимых; size/commit/бюджет -> 2 последовательных part-1/part-2 (человек уточняет)"

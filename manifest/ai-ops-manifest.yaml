      - "фикс: в ветке fail->fail считаем ПОЧИНЕННЫЕ узлы симметрично регрессиям — fixed_ids = _failure_ids(baseline) - _failure_ids(after); чек добавляется в fixed при непустом множестве. Только чистое улучшение (elif после регрессии): swap «починил один — сломал другой» уже уходит в regressions. Fail-safe: требуется непустой a_ids (id извлечены ПОСЛЕ правки), иначе не фабрикуем fixed на непарсибельном выводе (build-fail без node-id)"

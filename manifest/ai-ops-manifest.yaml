      - "#3 context-budget enforcement: ContextBundle overflow (контекст задачи > бюджета) -> ready_for_pr=False + причина декомпозиции в not_yet (аудит: 'при превышении context budget выполнение блокируется или дробится'). Мягкие оси (подсистемы/размер) остаются advisory. report['context_overflow']"
      - "все три с регрессиями в execution_pipeline selftest; enforcement — надмножество гейтов (не ломает существующие зелёные потоки: QUICK L0 -> intake закрывает spec-depth, дефолтный бюджет 120k не переполняется)"
    fixed_v2_105_resume_selfaudit:

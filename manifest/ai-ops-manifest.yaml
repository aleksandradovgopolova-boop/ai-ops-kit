      - "ЧЕСТНО (осталось): (1) полный ENGINEERING-to-ready требует ещё wiring security-reviewer на no_injection_surface (тогда чистый скан + вердикт судьи закроют security) — сознательно не спешим с авто-pass самого острого гейта; (2) применение plan.write_scope к Policy: в плане пока НЕТ write_scope (вывод путей из affected_areas не детерминирован между репо) — нужен слой area->paths; (3) quality-review артефактов с привязкой к artifact hash. PRODUCT-evidence (discovery/stakeholder) — тоже 2.95-остаток"
    fixed_v2_94_one_run_transaction:
      - "One Run Transaction (аудит #2): pipeline-путь БОЛЬШЕ НЕ обходит lifecycle. Раньше `engine=pipeline` вызывал run_pipeline и возвращал отчёт, пропуская WorkItem/RunPlan/active-work/run-report — 'два мира' (Product OS lifecycle отдельно от Execution pipeline). Теперь контроллер строит план ОДИН раз и передаёт в движок (run_pipeline(plan=...) — не строит второй), создаёт WorkItem, пишет run-plan.yaml, регистрирует active-work, гоняет concurrency-preflight ДО правок, пишет единый run-report.json и ЗАКРЫВАЕТ active-work (done) по завершении"
      - "единый идентификатор: workitem_id общий для плана, WorkItem, ветки ai-ops/<id>, active-work и run-report (движок использует ПЕРЕданный план, а не строит свой -> id не расходятся). Координационные строки active-work идут в stderr (stdout чист для --json)"
      - "ЧЕСТНО (осталось на будущее): отдельный run_id на КАЖДЫЙ прогон и полноценный resume пока не введены — повторный прогон того же feature перезаписывает WorkItem/ветку (isolation-guard v2.79 не даёт потерять несохранённые коммиты). TaskState orchestrator-формата для pipeline не пишется — у движка свой evidence/commit-record в run-report"
    fixed_v2_93_truth_and_integrity:
      - "worktree-only контейнер (аудит #1): run-sandboxed.sh раньше монтировал ВЕСЬ child как writable /work — shell из allowlist мог писать в основной checkout мимо write_scope. Теперь wrapper делает `git clone --no-hardlinks` и монтирует ТОЛЬКО одноразовый клон; основной репо не смонтирован (модель физически не тронет). Доставка веток ai-ops/* обратно — доверенным host-слоем (git fetch) вне контейнера. validate_container_assets.py стережёт это (запрещённый паттерн: прямой монтаж child)"
      - "целостность коммита 4a (аудит): install/baseline мог создать НОВЫЕ untracked (напр. package-lock.json от npm install), а `git add -A` втягивал их в AI-коммит. Теперь снимаем снимок untracked ДО install и удаляем адресно только НОВЫЕ (untracked пользователя не трогаем; игнорируемые node_modules в porcelain не видны)"
      - "целостность коммита 4b (аудит): наличие правок считали только по успешным write-операциям -> правки через разрешённый shell (sed/форматтер) не коммитились и терялись. Теперь факт правок берём из git (_has_changes: tracked-diff ИЛИ новые untracked). Селфтест: правка через shell (applied_writes=0) всё равно даёт коммит"
      - "PR delivery (аудит #4.4): убран хардкод base='main' — pr_open определяет default_branch репо через GitHub API; идемпотентность — если PR для ветки уже открыт, возвращаем его (status=updated), не падаем дублем. Offline-тесты через стаб _gh_request"
      - "truth-sync (аудит #5): QUICKSTART больше НЕ утверждает, что --sandbox отключает сеть (allow_network=True — ложный safety-claim снят); S4 приведён к v2.86/2.89 (specification производится, блокирует security); p0_backlog: P0.2 контейнер и P0.4 specification отмечены сделанными (сняты внутренние противоречия манифеста); frozen=[] (заморозка снята — решение владельца)"
    fixed_v2_92_stack_qualification_rust_java:
      - "БАГ rust (найден стек-квалификацией, тот же класс, что go v2.91): _failure_ids не извлекал имя упавшего теста из `cargo test` -> id схлопывался в КОНСТАНТУ из строки 'error: test failed, to rerun pass --lib' (одинакова для ЛЮБОГО падения). rust печатает 'N failed', но при swap счётчик 1->1 не растёт -> 'починил test_sub, сломал test_add' не детектилось = ложный green для rust-репо. Фикс: паттерн \"thread '<test>' panicked at <file>.rs:<line>\" (pid в скобках отбрасывается)"
      - "БАГ java (найден стек-квалификацией): _failure_ids не ловил java-падение ВООБЩЕ (id пустой), а maven-surefire печатает 'Failures: 1' (слово ПЕРЕД числом) -> _failure_signal тоже 0 -> swap не ловился = ложный green для java-репо. Фикс: паттерны surefire (Class.method -- ... <<< FAILURE / [ERROR] Class.method:line) + gradle (Class > method() FAILED). Проверено на РЕАЛЬНОМ выводе maven+junit5 (online)"
      - "фикстуры расширены: qualification/fixtures/{rust,java} — настоящие мини-репо (cargo test / mvn test); golden/{rust,java}-test-*.txt — снятый живьём вывод раннеров. validate_stack_qualification.py покрывает все 5 декларированных детектором стеков (node уже был; python/go — v2.91; rust/java — v2.92). rust гоняется вживую при наличии cargo; java — golden-only (junit тянется из Maven Central, в CI кита не гоняем)"
      - "ИТОГ: все НЕ-node стеки, которые детектор объявляет поддерживаемыми (python/go/rust/java), проверены на РЕАЛЬНОМ выводе раннеров; go/rust/java прятали ложный green одного класса (парсер писался node-first) — найдены и закрыты. Осталось живьём-с-моделью: полные сценарии на этих стеках"
    fixed_v2_91_stack_qualification:
      - "БАГ go (найден стек-квалификацией): _failure_ids не извлекал имя упавшего теста из вывода `go test` (--- FAIL: TestName) -> id падения схлопывался в мусорный {'FAIL'} из summary. Так как go не печатает 'N failed', счётчик тоже молчал -> 'починил TestSub, сломал TestAdd в ОДНОМ пакете' не детектилось = ЛОЖНЫЙ GREEN для go-репо. Тот же класс, что баг vite v2.88, но для другого раннера"
      - "фикс: паттерны go в _failure_ids — '--- FAIL: <Test>' (обрывает волатильное '(0.00s)') и go build/vet 'file.go:line[:col]: msg'. Регрессия в execution_pipeline selftest на РЕАЛЬНОМ выводе go: swap TestSub<->TestAdd = регрессия; то же имя+другое время = не регрессия"
      - "постоянная стек-квалификация БЕЗ модели: qualification/fixtures/{python,go} — настоящие мини-репо; golden/*.txt — снятый живьём вывод pytest/go test. validate_stack_qualification.py гоняет детектор + _failure_ids/_diff_checks на golden (детерминированно, в CI кита) и ДОП. вживую, если тулчейн есть (страховка от дрейфа формата раннера). Закрывает разрыв 'квалификация только на node' без Mac/модели"
    fixed_v2_90_container_isolation:
      - "P0.2 полный jail: эталонный контейнер (containers/Dockerfile + run-sandboxed.sh) даёт изоляцию рантайма, которую брокер в процессе не может — read-only root, writable только смонтированный worktree, лимиты CPU/RAM/pids, cap-drop ALL, no-new-privileges, non-root (uid 10001). Два слоя честно разделены: брокер (in-process, best-effort) + контейнер (реальный jail ФС/ресурсов/привилегий)"
      - "validate_container_assets.py стережёт присутствие jail-флагов (регресс любого -> ошибка CI). Docker принял все флаги (flag-parse проверен). ЧЕСТНО: сборка образа (pull базового) в CI-песочнице кита закрыта egress-прокси -> выполняется на Docker-хосте пользователя; команда движка, которую оборачивает wrapper, подтверждена живыми прогонами"
      - "ЧЕСТНАЯ ГРАНИЦА: контейнер НЕ air-gap — движку нужен egress к API модели и реестрам (npm/pip). Жёсткий контроль egress — allowlist-прокси на уровне хоста (вне флагов docker), см. docs/container-isolation.md"
    fixed_v2_89_specification_authoring:
      - "гейт specification ЗАКРЫТ: author-модель даёт СТРУКТУРНЫЙ spec-change (capability + требования + сценарии), движок рендерит точный OpenSpec-markdown (proposal/tasks/specs) и валидирует РЕАЛЬНЫМ openspec CLI (validate --strict). Пройдено -> evidence openspec_valid + requirements_covered. validate_spec_artifact.py (check+render) проверен реальным CLI 1.6.0 (rc=0)"
      - "ЧЕСТНО: openspec CLI отсутствует в child -> гейт остаётся блокирующим (не фабрикуем); битый spec от автора -> тоже блок. Формат markdown контролирует движок (не модель) -> валидная структура надёжно проходит strict. Качество требований — человек. Механика тестируется offline (стаб openspec_validate), реальный CLI-путь подтверждён вживую"
      - "ИТОГ P0.4: полный RunPlan закрыт для ENGINEERING — requirements/plan_readiness (v2.86) + specification (v2.89) производятся и проверяются, code_review судит независимый ревьюер (v2.83). Осталось только: живой прогон полного ENGINEERING end-to-end с моделью + openspec на машине пользователя"
    fixed_v2_88_live_qual_ii_sreda:
      - "ЛОЖНАЯ РЕГРЕССИЯ (первый живой прогон на ii-sreda, node/vite): _failure_ids включал в id падения ВОЛАТИЛЬНОЕ время из строки vite '✗ Build failed in 1.41s' -> id менялся каждый прогон -> на неизменной красной сборке build ложно помечался регрессией. Фикс: нормализация id (выкидываем длительности N.NNs / N ms / hex-адреса) + паттерн реальной строки ошибки сборки (файл (строка:кол): сообщение), чтобы РЕАЛЬНУЮ новую поломку всё же различать. Селфтест воспроизводит кейс ii-sreda"
      - "подтверждено живьём: test-регрессия РЕАЛЬНА и поймана корректно (DeepSeek написала formatPrice без конвертации десятичного разделителя -> её же тест 1234.56 -> '1 234,56' падает); движок честно отказал в ready. База ii-sreda сама красная (предсуществующий build-break Markdown-экспорта + баг даты recentTimeGroup) — движок это уважает через baseline-diff"
    remaining_backlog:
      - "P0.2 контейнерный jail: ЗАКРЫТО эталоном (v2.90) — containers/Dockerfile + run-sandboxed.sh (read-only root, worktree-only write, лимиты ресурсов, cap-drop, non-root). ОСТАЛОСЬ у пользователя: собрать образ на своём Docker-хосте и, при желании, egress-allowlist прокси перед контейнером"
      - "живой ENGINEERING end-to-end: прогнать полный ENGINEERING-класс с --author --review и установленным openspec на машине пользователя (механика requirements/plan/specification/code_review закрыта в v2.83/2.86/2.89, но целиком вживую не прогонялась)"
      - "живая квалификация: продолжить матрицу ОС/стеков (первый node/vite-прогон дал фикс v2.88); baseline-diff по structured error-ids крепче, но на не-тестовом шумном выводе — best-effort. v2.91-92: разбор падений ВСЕХ декларированных детектором стеков (python/go/rust/java) покрыт ДЕТЕРМИНИРОВАННО (фикстуры + golden в validate_stack_qualification.py, без модели) — нашёл и закрыл ложный green одного класса для go, rust и java; осталось живьём-с-моделью прогнать полные сценарии на этих стеках"
      - "живая квалификация: прогнать 5 сценариев × матрица ОС/стеков на машине с моделью и приложить отчёты (харнесс+сценарии+runbook готовы, v2.84) — требует Mac/Linux пользователя"

effect_metrics:
  # v2.30: автонакопление истории эффекта — чтобы baseline закрывался сам.
  status: integrated
  history_dir: ".ai/project/report-history"
  recorder: tools/run_report.py                      # --record: срез в историю
  metrics: tools/effect_metrics.py                   # baseline_ready при 3 фичах x >=3 срезов
  auto_record:
    in_session: [commands/task/ai-plan-task.md, commands/task/ai-implement.md, commands/task/ai-verify.md, commands/task/ai-finish-task.md]  # процедуры, где рантайм пишет срез
    ci_net: templates/ci/ai-ops-record.yml           # на push фиксирует срез по затронутым фичам
    feature_binding: "ai-run --feature <имя> (v2.51) — иначе wi-<hash>, срезы не копятся на фичу"
  by_runtime:                                        # ЧЕСТНО (finding обкатки): «авто» зависит от рантайма
    generic-orchestrator: "оркестратор кита пишет срезы сам при прогоне стадий"
    claude-code: "срез пишется, когда рантайм исполняет finish (run_report --record); автозаписи 'за стадию' нет — процедура, не магия"
  note: >
    Запись срезов даёт >=3 на фичу; полностью автоматично — только в generic-orchestrator.
    В claude-code история копится, когда рантайм честно исполняет finish на ИМЕНОВАННОЙ фиче
    (ad-hoc wi-<hash> baseline не двигает). CI-часть исполняет GitHub Actions; из среды
    разработки кита не проверялась.

event_contract:
  # v2.29: единый каталог имён событий — против contract<->code<->analytics drift.
  status: integrated
  schema: schemas/event-catalog.schema.json
  validator: validation/validate_event_catalog.py   # + --scan по коду (best-effort)
  rule: rules/engineering/EventNamingConvention.md
  gate: event_contract_consistency                   # advisory до обкатки
  child_path: ".ai/project/contracts/events.yaml"
  example: examples/event-catalog-demo/events.yaml

governance:
  information_boundaries: governance/information-boundaries.md   # что можно/нельзя хранить (v2.9)

unified_product_path:
  # v2.17: единый продуктовый путь — одна сущность связывает два прежде раздельных
  # контура (прогон workflow и Feature Blueprint) одним id и одним статусом.
  status: integrated
  entity: tools/workitem.py                    # start (routing->blueprint->run) + status
  schema: schemas/workitem.schema.json
  entry_point: commands/task/ai-start-task.md  # единственная точка входа -> создаёт WorkItem
  record: "features/<id>/workitem.yaml"        # в child; один id = id фичи
  single_status: [done, blocked, needs_human_decision, needs_more_evidence]
  status_source: [tools/gate_executor.py, tools/run_report.py]   # детерминированный вывод

decision_intelligence:
  # v2.10: Decision Intelligence (идея team-os-toolkit init-team-decisions).
  status: integrated
  registry: decisions/registry.yaml                    # принципы + эпизоды + исходы
  schema: schemas/decisions-registry.schema.json
  validator: validation/validate_decisions.py
  skill: skills/decision-support/SKILL.md              # recommendation-first + one-way-door
  workflow: DECISION
  gate: decision_quality                                # non-blocking до обкатки
  child_registry_path: ".ai/project/decisions/registry.yaml"

security_policies:
  permission_levels: security/permission-levels.yaml   # 6 уровней
  protected_paths: config/protected-paths.yaml
  boundary_model: security/boundary-model.md
  secrets_in_repo: forbidden
  # v2.20: постура безопасности — карта по 13 областям (status/evidence/severity)
  posture: governance/security-posture.yaml
  posture_validator: validation/validate_security_posture.py
  policies: governance/security-policies.md
  information_boundaries: governance/information-boundaries.md
  audit_log: ".ai/runtime/interaction-log.jsonl"       # append-only действия ИИ (orchestrator)

session_orchestration:
  # v2.22: внешний слой автоматики вокруг ядра task->workflow->agents->gates.
  # Срез 1: онбординг репозитория + реестр активных работ + session bootstrap.
  # Кит даёт скиллы/команды/инструменты/схему; «само-срабатывание» (распознать «подключи
  # AI Ops», авто-старт bootstrap в новой сессии, worktree-per-WorkItem) — поведение
  # рантайма, объявляется как runtime-binding, не как возможность кита.
  status: partial
  verified_against_deploy: false            # ЧЕСТНО: авто-триггеры рантайма отсюда не проверялись
  repo_onboarding:
    skill: skills/repo-onboarding/SKILL.md
    checklist: rules/meta/repo-onboarding.yaml
    writes: context/**                       # черновики; источник истины подтверждает человек
  active_work_registry:
    schema: schemas/active-work.schema.json
    tool: tools/active_work.py               # register/list/check(conflict forecast)/finish
    child_path: ".ai/runtime/active-work.yaml"   # видна всем параллельным сессиям
    conflict_kinds: [area, contract, dependency, cycle]   # v2.23: явные связи задач + типы конфликта
  living_status:                              # v2.27: единая точка правды о «сейчас»
    doc: context/product/ProductStatus.md      # что реально готово/живёт; volatile + freshness
    policy: rules/core/ProductStatusPolicy.md  # читать первым; обновлять на PR, меняющем готовность
    read_first_in: commands/task/ai-session-start.md
    updated_in: commands/task/ai-finish-task.md
    anti_pattern: "CLAUDE.md держит только вечные правила; снимок статуса — ссылкой на ProductStatus"
  concurrency_preflight:                      # v2.28: коллизии параллельной работы до старта
    gate: concurrency_preflight                # quality/gates.yaml, stage intake, advisory
    tool: tools/concurrency_preflight.py       # base_changes (git) + open PRs (gh -> REST) + active-work
    rule: rules/engineering/ConcurrencyAwareness.md
    open_prs_sources: [gh-cli, github-rest]     # v2.43: REST-фоллбэк (urllib), токен GITHUB_TOKEN/GH_TOKEN из env
    note: >
      git-часть (свежие мержи в base под целевыми путями = устаревшая премисса) детерминирована;
      открытые PR: gh CLI (если авторизован) -> GitHub REST API (токен только из env, не в логах) ->
      unavailable (нет ни gh, ни токена; не выдаётся за clean). GHE — через GITHUB_API_URL.
  session_bootstrap:
    command: commands/task/ai-session-start.md   # runtime-исполняемая: читает, не меняет
  worktree_per_workitem:                      # v2.24: изоляция файлов на WorkItem
    tool: tools/worktree.py                    # add/list/remove — реальная git-операция
    command: commands/task/ai-worktree.md
    child_dir: ".ai/worktrees/<id>"            # держать в .gitignore
    note: >
      Инструмент создаёт worktree реально (тест на temp-репо); «сессия автоматически берёт
      свой worktree» — шаг рантайма через ai-start-task, не гарантия кита.
  merge_to_memory:                            # v2.25: обновление памяти при мердже WorkItem
    tool: tools/merge_memory.py                # record -> memory/lessons-learned/<дата>-<id>.md
    flow: commands/task/ai-finish-task.md      # шаг «обновить repository memory»
    note: >
      Инструмент записи и flow — в ките; «авто» на реальном событии мерджа (хук CI/рантайма)
      — шаг рантайма, не гарантия кита.
  conversational_install:                     # v2.26: «подключи AI Ops» -> установка+онбординг
    generated_command: ai-ops-init             # tools/generate_runtime.py -> .claude/commands/
    installer: installer/ai_ops.py             # реальную установку делает CLI (silent update запрещён)
    onboarding_skill: skills/repo-onboarding/SKILL.md
    note: >
      Кит генерирует команду ai-ops-init (установка -> doctor -> repo-onboarding -> предложить
      presets -> отчёт). Распознавание естественной фразы «подключи AI Ops» и запуск — шаг
      рантайма; verified_against_deploy: false.
  memory_split:
    shared: [context/**, decisions/registry.yaml, registry/entities.yaml]   # общая продуктовая память
    isolated: [".ai/runtime/**", ".ai/generated/**", ".ai/worktrees/**"]    # состояние прогона/сессии
  # not_yet закрыт: все четыре среза Session & Repository Orchestration поставлены
  # (onboarding, active-work+связи, worktree, merge->memory, conversational install).
  # Остаётся runtime-часть: авто-срабатывание триггеров — привязка на уровне рантайма.

runtime_spec:
  # v2.21: спецификация постоянного агента-ассистента (Robin), runtime-агностичная.
  # Кит даёт контракт+спеку+валидатор; привязка к конкретному рантайму — на уровне child.
  status: contract                          # спека+валидатор есть; деплой рантайма — child
  verified_against_deploy: false            # ЧЕСТНО: из среды разработки не проверялось
  contract: persistent-agent-runtime        # registry/runtimes.yaml -> runtime_contracts
  spec: runtime/robin/ROBIN.md
  duties_example: runtime/robin/duties.example.yaml
  duties_validator: validation/validate_duties.py
  binding_template: templates/runtime/runtime-binding.example.yaml
  child_duties_path: ".ai/project/runtime/robin/duties.yaml"
  read_mostly: true                          # нет записи в prod и в curated-память
  killswitch_runbook: governance/security-policies.md   # §3
  example_bindings: [Hermes, "cron+cli+webhook"]   # только примеры; не хардкод в ядре

update_policy:
  silent_update: forbidden
  updater: installer/ai_ops.py            # ai-ops status/diff/update/init/validate/doctor/migrate/verify-capabilities
  managed_set:                             # что копируется в .ai/managed при install/update
    - "registry/*.yaml"
    - "quality/gates.yaml"
    - "schemas/*.json"
    - "security/permission-levels.yaml"
    - "security/boundary-model.md"
    - "security/security-domains.yaml"   # v3.0-rc2: approvals/security_pack грузят универсально (любой diff)
    - "manifest/ai-ops-manifest.yaml"
    # полные контракты, на которые ссылаются реестры: тела агентов, правила/чек-листы,
    # шаблоны артефактов, контекст, прозаические workflow/команды — иначе registry
    # ссылается на файлы (agents/core/*.md, rules/**, templates/**), которых в child нет.
    - "agents/**/*.md"
    - "rules/**/*"
    - "templates/**/*"
    - "context/**/*"
    - "workflows/*.md"
    - "commands/**/*.md"
    # v2.82 Standalone Child: сам ДВИЖОК (инструменты + валидаторы + их данные) ставится в
    # child, чтобы `ai-ops run` и проверки работали БЕЗ внешнего клона кита. PKG движка =
    # .ai/managed/ (Path(__file__).parents[1]); registry/quality/security уже здесь, добавляем
    # код и остаток данных (config/*, VERSION). Пакетный фильтр применяется как обычно:
    # файлы, принадлежащие ai-ops-execution/quality/..., ставятся при выборе этих пакетов;
    # без выбора packages (дефолт) — ставится всё. Полный self-contained доказан
    # validate_standalone_engine.py (subprocess из .ai/managed без parent на path).
    - "tools/**/*.py"
    - "validation/**/*.py"
    - "config/**/*"
    - "qualification/**/*"
    - "containers/*"
    - "VERSION"
  managed_paths: [".ai/managed/**"]
  protected_paths: [".ai/project/**", ".ai/custom/**"]
  generated_paths: [".ai/generated/**"]
  runtime_paths: [".ai/runtime/**"]
  provenance: ".ai/managed/.provenance.json"
  checksums: ".ai/managed/.checksums.json"
  update_lock: ".ai/managed/.update-lock"
  drift_detection: "validation/ai_managed_checksums.py verify"
  example_install: "examples/child-install/"

package_migrations:
  chain: []                  # первый релиз; цепочка появится с 0.1.0-to-0.2.0

contracts_dir: schemas/
compatibility_check: python3 validation/validate_ai_first_registry.py

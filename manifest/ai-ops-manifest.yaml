      - "selftest + в checklist/CI. Живьём: `ai_ops_cli.py plan \"<задача>\" <repo>` печатает превью без изменений кода"
    fixed_v2_101_security_pack:
      - "этап 5 Security Pack: security/security-domains.yaml — 12 доменов (authentication, authorization/IDOR, input_validation, secrets, dependencies, rate_limiting, file_upload, network/SSRF, logging/monitoring, deployment/config, ai_prompt_injection, data_isolation) с applicability(signals+file_patterns), deterministic_checks, reviewer_checklist, required_evidence, severity_policy, blocking/human_approval conditions, remediation_template"
      - "tools/security_pack.py: выбирает ТОЛЬКО применимые к изменению домены (frontend-only не запускает database/tenant audit, но проверяет XSS/secrets), гоняет детерминированные проверки (secret_scan/dependency_audit/injection_scan из security_scan) и даёт доменный вердикт. Честность: домен нельзя закрыть фразой «уязвимостей нет» (allowed_evidence_sources); авто-закрыть можно ТОЛЬКО домены, чьё required_evidence целиком детерминированно (secrets/dependencies) и чисто; домены с security_reviewer/human -> needs_review; находка -> fail+блок по severity"
      - "гейт security в pipeline теперь domain-aware: проходит ТОЛЬКО при pack overall='clear' (все применимые домены закрыты детерминированным evidence); иначе честный блок с перечнем блокирующих/needs_review доменов. validation/validate_security_domains.py стережёт контракт (12 доменов, required_evidence ⊆ allowed, severity, remediation). В checklist и CI"
    fixed_v2_100_atomic_planning:

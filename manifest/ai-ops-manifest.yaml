      - "ЭПИК Context Engineering & Spec-Driven Execution ЗАВЕРШЁН (7/7): Context Compiler (v2.97) + Adaptive Spec-First (v2.98) + Context Lifecycle/Resume (v2.99) + Atomic Planning/Context Budget (v2.100) + Security Pack (v2.101) + Intent UX (v2.102) + Qualification (v2.103). Живые сценарии с моделью — на машине пользователя; механика слоя покрыта детерминированно в CI"
    fixed_v2_102_intent_ux:

# decisions/registry.yaml — реестр решений: принципы (способ мышления), эпизоды
# (конкретные решения) и исходы. Машинно проверяется validate_decisions.py.
# В child живёт в .ai/project/decisions/. Примеры ниже — реальные решения по киту
# (догфудинг): они же показывают, как извлекать принцип из повторяющихся эпизодов.
schema_version: 1
kind: decisions-registry

principles:
  - id: dp-001
    principle: >
      Внешний материал интегрируем курируемо: берём только недостающую механику,
      дубли уже построенного и структурные reorg'и отклоняем. «Главное — не излишним».
    scope: [package-evolution]
    status: ratified
    confidence: high
    recurrence_count: 4        # research-pack, systems-thinking, session-review, team-os
    counterexamples: []
    review_date: 2026-12-01
    supersedes: null
    derived_from: [ep-2026-07-13-teamos, ep-2026-07-13-systems]

  - id: dp-002
    principle: >
      Новая проверка/гейт вводится non-blocking и становится blocking только после
      обкатки; каждый механизм приносит свой валидатор и селфтест, который видели падающим.
    scope: [quality-gates, package-evolution]
    status: ratified
    confidence: high
    recurrence_count: 5
    counterexamples: []
    review_date: 2026-12-01
    supersedes: null
    derived_from: [ep-2026-07-13-teamos]

  - id: dp-003
    principle: >
      Не декларировать capability, которой нет: оркестратор sequential-only, постоянного
      runtime нет — Robin остаётся спекой, а не «реализованным агентом».
    scope: [honesty, runtime]
    status: ratified
    confidence: medium
    recurrence_count: 2
    counterexamples: []
    review_date: 2026-10-01
    supersedes: null
    derived_from: [ep-2026-07-13-teamos]

episodes:
  - id: ep-2026-07-13-teamos
    question: Как интегрировать team-os-toolkit — целиком или частично?
    decision: >
      Взять только недостающую механику (drift/claims, freshness, governance),
      reorg .ai/ и Robin-бот отклонить; Ф3 сделать, Ф4 оставить спекой.
    reason: >
      ~60% идей уже реализовано под другими именами; ковенант «аддитивно, без breaking
      в 2.x»; нет постоянного runtime под Robin.
    context: Сессия развития кита; предложение GPT взять всё как есть.
    reversibility: two-way
    date: 2026-07-13
    source: чат-сессия; ROADMAP «Интеграция team-os-toolkit»

  - id: ep-2026-07-13-systems
    question: Сколько скиллов systems-thinking брать из шести?
    decision: Два самодостаточных сейчас (constraint, contradiction); leverage — позже; why-tree и stockflow-builder отклонить.
    reason: leverage требует модель на входе; why-tree дублирует deep-research и он multi-agent; stockflow-builder — не дисциплина мышления.
    context: Оценка репозитория systems-thinking-skills.
    reversibility: two-way
    date: 2026-07-13
    source: чат-сессия; CHANGELOG v2.8.0

  - id: ep-2026-07-16-tree-split
    question: Делать ли физический разнос дерева по packages/<name>/ в 3.0?
    decision: >
      Физразнос отложить до 3.1 (раздельная публикация пакетов). В 3.0 оставить только
      аддитивные срезы: границы пакетов + валидатор (срез 0), ai-run канонический вход
      (срез 1), по-пакетная установка через .ai-ops.yaml packages (срез 2).
    reason: >
      Перенос ломает CI-контракт уже установленных child: их ai-ops-update.yml/ai-ops-validate.yml
      хардкодят /tmp/ai-ops-kit/installer/ai_ops.py и .../validation/validate_ai_ops_child.py —
      апдейт сломается на следующем запуске, а починить можно только апдейтом (замкнутый круг).
      Плюс 33 файла с PKG-путями и remap managed_set target. Польза «пакетов» (гранулярная
      установка) уже дана срезами 0–2 без переноса; единственный выигрыш разноса — раздельная
      дистрибуция, а это цель 3.1.
    context: Сессия развития кита; владелец дал go на срез 3, блокер найден при подготовке к переносу.
    reversibility: two-way
    date: 2026-07-16
    source: чат-сессия; docs/3.0-design.md

  - id: ep-2026-07-16-smart-loosening
    question: implementation_verification требует ВСЕ 4 проверки (build+lint+typecheck+tests) — оставить жёстко или ослабить?
    decision: >
      «Умное ослабление»: флаг освобождается, ТОЛЬКО если инструмента нет в ПОДТВЕРЖДЁННОМ
      стеке (build/lint/typecheck). tests — особый случай: по умолчанию тоже освобождаются +
      громкий warn, а policy allow_missing_tests=False эскалирует до блока. Освобождение всегда
      записывается в warnings гейта (видно, не тихо); объявленная-но-упавшая проверка блокирует.
    reason: >
      Требование всех 4 делало гейт НЕДОСТИЖИМЫМ для репо без линтера/тайпчекера -> ложный
      контроль, который приучает обходить гейты (прямое предупреждение аудитора). Нельзя
      требовать доказательство, которого физически нет (инвариант честных деклараций). Защиты
      от халявы: (1) освобождается только то, что ДЕТЕРМИНИРОВАННО отсутствует в манифестах
      стека (project_detector, не слово модели); (2) освобождение записано в warnings гейта;
      (3) объявленная-но-упавшая проверка не освобождается.
      ЧЕСТНО (adversarial-review): в offline-pipeline профиль — ДЕТЕКТИРОВАННЫЙ (status: draft),
      подтверждение человеком РЕКОМЕНДУЕТСЯ (writer≠judge), но НЕ enforced кодом pipeline;
      это защита от фабрикации моделью, а не от неверной детекции.
    context: После вопроса владельца по итогам живого прогона pipeline (гейт заблокировал пустой репо).
    reversibility: two-way
    date: 2026-07-16
    source: чат-сессия; аудит исполнения
    supersedes: null

  - id: ep-2026-07-16-execution-audit
    question: Внешний аудит исполнения — что делать дальше с китом?
    decision: >
      ЗАМОРОЗИТЬ фичи (новые агенты, lifecycle-стадии, Knowledge Graph, Robin, физразнос
      пакетов) и вести один P0-эпик: одна обычная задача на реальном репо проходит через
      кит до проверяемого draft PR. Сразу закрыты contained security/correctness дефекты
      (path traversal, слепая tool-loop); остальное — P0-backlog (единый движок вместо
      двух, установимый CLI с движком в child, sandbox shell, RunPlan-гейты в прогоне,
      условный approval, evidence на точный SHA, reviewer.json от оркестратора).
    reason: >
      Аудит верно показал: компоненты есть, но не собраны в один движок; generic-путь всё ещё
      гоняет doc-оркестратор, а не tool-loop; child не получает сам движок (только контракты);
      Policy не была настоящей security boundary. Польза команде «здесь и сейчас» — 4/10, пока
      нет пути task->PR. Достраивать вокруг исполнения дальше — вредно.
    context: Отчёт аудита исполнения на main 2.50; проверено по коду (дефекты подтверждены).
    reversibility: two-way
    date: 2026-07-16
    source: чат-сессия; аудит исполнения
    supersedes: null

outcomes:
  - decision: ep-2026-07-13-systems
    outcome: Оба скилла выпущены (v2.8), проводка в INSIGHTS/PRODUCT/ENGINEERING; обкатка в ии-среде предстоит.
    reviewed_at: 2026-07-13

  - decision: ep-2026-07-16-tree-split
    outcome: >
      3.0 объявлен additive-complete (v2.46–2.48: границы+валидатор, ai-run канонический,
      по-пакетная установка). Физразнос дерева -> 3.1, когда будет раздельная дистрибуция
      пакетов и миграция child-CI на путь-агностичный вызов.
    reviewed_at: 2026-07-16

  - decision: ep-2026-07-16-execution-audit
    outcome: >
      v2.53: закрыты contained дефекты — path traversal в Tool Broker (decide+execute guard)
      и слепая tool-loop (содержимое read/вывод shell идут в контекст модели). Фичи заморожены;
      P0-эпик task->draft PR открыт (единый движок, установимый CLI, sandbox, RunPlan-гейты в
      прогоне, условный approval, evidence на SHA, reviewer.json). Успех эпика = 2/3 реальных
      задачи доходят до draft PR с зелёным CI и без переписывания ревьюером.
    reviewed_at: 2026-07-16

  - decision: ep-2026-07-16-execution-audit
    outcome: >
      v2.54–2.66: движок собран (execution_pipeline) и подключён к контроллеру
      (ai-ops run --engine pipeline); подтверждён живьём на ограниченном QUICK-сценарии
      (v2.64, ready_for_pr=True). v2.66 «Trust Boundary» по следующему аудиту: P0.1
      (print_human/exit-code/CLI-флаги для pipeline), P0.2-contained (shell timeout + честная
      граница «shell не песочница»), P0.5 (полный SHA + tree-clean + строгий ready_for_pr),
      P1.1 (валидация WorkItem ID + containment worktree-путей). Overclaim'ы понижены до честной
      формулировки аудита. ОСТАЛОСЬ в p0_backlog: полный jail (контейнер), standalone-движок в
      child, постадийный RunPlan, усиление детектора, CI на пользовательском пути, живой PR,
      квалификация 3–5 задач.
    reviewed_at: 2026-07-16

schema_version: 1
kind: ArchitectureDecision
id: ADR-001
title: "AI Ops = control plane + тонкие адаптеры к open-source (не монолитный движок)"
status: accepted
date: "2026-07-24"
owner: architecture
context: >-
  Нужно исполнять задачи через агентов и управлять качеством, не переписывая зрелые
  open-source инструменты (git, тест-раннеры, линтеры, Storybook и т.п.). Соблазн —
  реализовать всё внутри монолитного движка.
decision: >-
  Ядро — control plane: машиночитаемые контракты (registry), quality gates,
  маршрутизация, транзакционный контроллер исполнения. Интеграции с внешними
  инструментами — тонкие заменяемые адаптеры. Движок не тянет реализацию доменов внутрь.
alternatives:
  - option: "Монолитный движок со своей реализацией всего стека"
    rejected_because: "дублирование зрелых инструментов, высокая стоимость поддержки, хрупкость"
  - option: "Прямые вызовы инструментов из бизнес-логики без слоя адаптеров"
    rejected_because: "жёсткая связанность с версиями инструментов, невозможность подмены"
consequences:
  positive:
    - "переиспользование зрелых инструментов вместо переизобретения"
    - "адаптеры тонкие и заменяемые — низкая стоимость смены инструмента"
    - "ядро остаётся маленьким и проверяемым (контракты + gates)"
  negative:
    - "зависимость от контрактов и версий внешних инструментов"
    - "нужна дисциплина: адаптер не должен протекать деталями инструмента в ядро"
  neutral:
    - "часть возможностей приходит через раннер, а не поставляется китом"
quality_attributes:
  - attribute: maintainability
    effect: improves
  - attribute: compatibility
    effect: tradeoff
    note: "версии внешних инструментов нужно отслеживать"
  - attribute: portability
    effect: improves
ui_impact: null
supersedes: null
superseded_by: null
related: []

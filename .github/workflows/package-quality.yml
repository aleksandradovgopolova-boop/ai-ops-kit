name: package-quality
on:
  pull_request: {}
  push:
    branches: [main]
  workflow_dispatch: {}
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}   # история нужна eval-гейту для diff изменённых агентов
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install pyyaml
      - name: Реестр агентов и манифест
        run: python3 validation/validate_ai_first_registry.py
      - name: Workflow-контракты и gates
        run: python3 validation/validate_ai_first_workflows.py
      - name: Конфиги
        run: python3 validation/validate_ai_first_config.py
      - name: Реестры провайдеров/сред + routing
        run: python3 validation/validate_ai_first_providers.py
      - name: Self-test маршрутизации
        run: python3 validation/ai_route.py --selftest
      - name: Capability self-test (offline)
        run: python3 validation/ai_capability_selftest.py
      - name: Stale-gates детектор (selftest)
        run: python3 validation/validate_stale_gates.py --selftest
      - name: Генератор runtime-файлов (selftest)
        run: python3 tools/generate_runtime.py --selftest
      - name: Генератор артефактов по blueprint (selftest)
        run: python3 tools/generate_artifacts.py --selftest
      - name: Отчёт-оценка прогона фичи (selftest)
        run: python3 tools/run_report.py --selftest
      - name: Метрики эффекта по истории (selftest)
        run: python3 tools/effect_metrics.py --selftest
      - name: Sequential-оркестратор (selftest)
        run: python3 tools/orchestrator.py --selftest
      - name: Execution budget — потолок вызовов модели (selftest)
        run: python3 tools/budget.py --selftest
      - name: Tool-calling петля — механика (selftest)
        run: python3 tools/tool_loop.py --selftest
      - name: Единый execution-pipeline — сборка движка (selftest)
        run: python3 tools/execution_pipeline.py --selftest
      - name: Открытие draft PR — механизм (selftest)
        run: python3 tools/pr_open.py --selftest
      - name: Gate executor — исполнение и блокировка гейтов (selftest)
        run: python3 tools/gate_executor.py --selftest
      - name: Structured reviewer-result (selftest)
        run: python3 validation/validate_reviewer_result.py --selftest
      - name: Tool Broker + Policy Engine (selftest)
        run: python3 tools/tool_broker.py --selftest
      - name: Согласованность workflow ↔ gate (applicability)
        run: |
          python3 validation/validate_workflow_gates.py --selftest
          python3 validation/validate_workflow_gates.py
      - name: WorkItem — единая сущность и статус (selftest)
        run: python3 tools/workitem.py --selftest
      - name: RunPlan — base_workflow + tracks (selftest + tracks integrity)
        run: |
          python3 tools/run_plan.py --selftest
          python3 tools/run_plan.py validate
      - name: ai-ops run — единый контроллер задачи (selftest)
        run: python3 tools/ai_ops_run.py --selftest
      - name: Project Detector -> RepositoryProfile (selftest)
        run: python3 tools/project_detector.py --selftest
      - name: Stack-aware evidence collector (selftest)
        run: python3 tools/evidence_collector.py --selftest
      - name: Реестр активных работ + conflict forecast (selftest)
        run: python3 tools/active_work.py --selftest
      - name: Изоляция работы через git worktree (selftest)
        run: python3 tools/worktree.py --selftest
      - name: merge->memory flow (selftest)
        run: python3 tools/merge_memory.py --selftest
      - name: Concurrency preflight — коллизии параллельной работы (selftest)
        run: python3 tools/concurrency_preflight.py --selftest
      - name: Квалификационный прогон-харнесс (selftest, offline)
        run: python3 tools/qual_run.py --selftest
      - name: Python-совместимость (PEP 604 union-аннотации не ломают <3.10)
        run: |
          python3 validation/validate_python_compat.py --selftest
          python3 validation/validate_python_compat.py
      - name: Событийный каталог — согласованность имён (selftest + пример)
        run: |
          python3 validation/validate_event_catalog.py --selftest
          python3 validation/validate_event_catalog.py examples/event-catalog-demo/events.yaml
      - name: Постура безопасности (selftest + evidence-drift)
        run: |
          python3 validation/validate_security_posture.py --selftest
          python3 validation/validate_security_posture.py
      - name: Обязанности постоянного агента (Robin)
        run: |
          python3 validation/validate_duties.py --selftest
          python3 validation/validate_duties.py
      - name: Presets
        run: python3 validation/validate_presets.py
      - name: Eval-кейсы изменённых агентов
        env:
          AI_OPS_DIFF_BASE: ${{ github.event.pull_request.base.sha || '' }}
        run: python3 validation/validate_agent_evals.py
      - name: Eval-кейсы — структура всех + покрытие (selftest + --all)
        run: |
          python3 validation/validate_agent_evals.py --selftest
          python3 validation/validate_agent_evals.py --all
      - name: OpenSpec guard (пример)
        run: python3 validation/validate_openspec_change.py examples/openspec-demo
      - name: Feature Blueprint (selftest + пример)
        run: |
          python3 validation/validate_feature_blueprint.py --selftest
          python3 validation/validate_feature_blueprint.py examples/feature-blueprint-demo/express-checkout
      - name: Кросс-артефактная консистентность (selftest + пример)
        run: |
          python3 validation/validate_cross_artifacts.py --selftest
          python3 validation/validate_cross_artifacts.py examples/feature-blueprint-demo/express-checkout
      - name: Knowledge Graph (selftest + пример)
        run: |
          python3 validation/validate_knowledge_graph.py --selftest
          python3 validation/validate_knowledge_graph.py examples/knowledge-graph-demo/graph.yaml
      - name: Product Health (selftest + пример)
        run: |
          python3 tools/product_health.py --selftest
          python3 tools/product_health.py examples/product-health-demo/input.yaml > /dev/null
      - name: Целостность ссылок пакета (drift-control)
        run: python3 validation/validate_references.py
      - name: Claims (selftest + self-claims кита)
        run: |
          python3 validation/validate_claims.py --selftest
          python3 validation/validate_claims.py
      - name: Свежесть знаний (selftest; context — информационно)
        run: |
          python3 validation/validate_freshness.py --selftest
          python3 validation/validate_freshness.py context > /dev/null
      - name: Реестр решений (selftest + реестр кита)
        run: |
          python3 validation/validate_decisions.py --selftest
          python3 validation/validate_decisions.py
      - name: Синхронность чеклиста AGENTS.md ↔ CI (drift-control)
        run: |
          python3 validation/validate_agents_checklist.py --selftest
          python3 validation/validate_agents_checklist.py
      - name: Границы пакетов 3.0 (selftest + декларации кита)
        run: |
          python3 validation/validate_package_boundaries.py --selftest
          python3 validation/validate_package_boundaries.py
      - name: "Standalone-движок: прогон из .ai/managed без parent-клона (selftest)"
        run: python3 validation/validate_standalone_engine.py --selftest
      - name: "Квалификация: пакет живых сценариев согласован (selftest + декларации)"
        run: |
          python3 validation/validate_qualification.py --selftest
          python3 validation/validate_qualification.py
      - name: "Стек-квалификация: детект+failure-id на реальных фикстурах python/go (golden+live)"
        run: python3 validation/validate_stack_qualification.py --selftest
      - name: "Product authoring: структурные валидаторы артефактов (selftest)"
        run: |
          python3 validation/validate_requirements_artifact.py --selftest
          python3 validation/validate_plan_artifact.py --selftest
          python3 validation/validate_spec_artifact.py --selftest
      - name: "Container isolation: ассеты jail'а декларируют изоляцию (selftest + проверка)"
        run: |
          python3 validation/validate_container_assets.py --selftest
          python3 validation/validate_container_assets.py
      - name: "Security evidence: детерминированный секрет/dep-скан для гейта security (selftest)"
        run: python3 tools/security_scan.py --selftest
      - name: "Канонический e2e: ai-ops run --engine pipeline на реальной фикстуре (без модели)"
        run: python3 validation/validate_pipeline_e2e.py --selftest
      - name: "Инсталлер: e2e init + child-валидатор (selftest)"
        run: python3 installer/ai_ops.py --selftest

  # v2.96 Real Qualification: канонический e2e движка на РЕАЛЬНОЙ фикстуре, на нескольких версиях
  # Python (раньше CI гонял только 3.12). Стек-квалификация failure-парсера — тоже здесь.
  pipeline-e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - uses: actions/setup-python@v5
        with: {python-version: "${{ matrix.python-version }}"}
      - run: pip install pyyaml
      - name: "Совместимость Python (stdlib + pyyaml)"
        run: python3 validation/validate_python_compat.py
      - name: "Канонический e2e движка (task -> commit -> evidence -> gates, без модели)"
        run: python3 validation/validate_pipeline_e2e.py --selftest
      - name: "Стек-квалификация failure-парсера (golden + live при наличии тулчейна)"
        run: python3 validation/validate_stack_qualification.py --selftest
      - name: "Ядро движка: контроллер + pipeline + broker + security-scan (selftest)"
        run: |
          python3 tools/ai_ops_run.py --selftest
          python3 tools/execution_pipeline.py --selftest
          python3 tools/tool_broker.py --selftest
          python3 tools/security_scan.py --selftest

name: package-quality
on:
  pull_request: {}
  push:
    branches: [main]
  workflow_dispatch: {}
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}   # история нужна eval-гейту для diff изменённых агентов
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install pyyaml
      - name: Реестр агентов и манифест
        run: python3 validation/validate_ai_first_registry.py
      - name: Workflow-контракты и gates
        run: python3 validation/validate_ai_first_workflows.py
      - name: Конфиги
        run: python3 validation/validate_ai_first_config.py
      - name: Реестры провайдеров/сред + routing
        run: python3 validation/validate_ai_first_providers.py
      - name: Self-test маршрутизации
        run: python3 validation/ai_route.py --selftest
      - name: Capability self-test (offline)
        run: python3 validation/ai_capability_selftest.py
      - name: Stale-gates детектор (selftest)
        run: python3 validation/validate_stale_gates.py --selftest
      - name: Генератор runtime-файлов (selftest)
        run: python3 tools/generate_runtime.py --selftest
      - name: Sequential-оркестратор (selftest)
        run: python3 tools/orchestrator.py --selftest
      - name: Presets
        run: python3 validation/validate_presets.py
      - name: Eval-кейсы изменённых агентов
        env:
          AI_OPS_DIFF_BASE: ${{ github.event.pull_request.base.sha || '' }}
        run: python3 validation/validate_agent_evals.py
      - name: OpenSpec guard (пример)
        run: python3 validation/validate_openspec_change.py examples/openspec-demo
      - name: Feature Blueprint (selftest + пример)
        run: |
          python3 validation/validate_feature_blueprint.py --selftest
          python3 validation/validate_feature_blueprint.py examples/feature-blueprint-demo/express-checkout
